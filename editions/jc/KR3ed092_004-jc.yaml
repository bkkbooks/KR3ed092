body:
  text: 卷四收澀之劑收者收其耗散也澀者澀其滑脫也凡一切外感內傷有餘之病治表治里之法皆已論之於前若夫正虛之中又有氣脫血脫或表陽不固或里陰下竭即以五臟論之如肺氣耗散則咳嗽不止心神不足則驚悸怔忡脾虛之瀉痢腎虛之遺泄肝虛則魂無所附夜臥不寧諸如此類莫不皆賴酸斂收澀之劑固之攝之至如女科之血崩經漏淋帶諸病宜固攝者為尤多以及小兒之遺尿脫肛大人之吐血衄血自汗盜汗種種虛脫之證難以枚舉故古人立方補偏救弊十劑中有澀可固脫一法茲集但採簡便常用者匯為一門學者博覽變通臨病參酌庶不致有誤人之實也訶子散東垣河間訶子散東垣訶子散神奇罌粟乾薑與橘皮泄瀉虛寒久不止澀能固脫此方醫河間訶子方名散甘草香連四味齊術芍煎湯用送服熱邪久痢便能稀東垣訶子散訶子煨去核七分御米殼去蒂蜜炙五分乾薑炮六分橘紅五分為末空心服治虛寒泄瀉完穀不化以及脫肛下血等證夫泄瀉之始起也有因寒因火因食因濕之不同其治固有或溫或清或消或燥之各異倘病久失治或誤治不痊則成虛脫之證當此之時又非溫補脾腎所能取效者必得澀劑以固之乃能應手訶子粟殼皆酸澀而溫澀腸固下乾薑溫其脾土陳皮燥其脾濕而復其健運之常則病自愈矣河間訶子散訶子一兩半生用煨木香五錢甘草一錢黃連三錢為末每服二錢用白朮芍藥湯調下治瀉久腹痛漸少用此竭其餘邪而止其瀉痢此治火邪下痢久而虛脫者也故以木香黃連行氣清火止痢厚腸甘草芍藥甘緩酸收和中止痛訶子澀以收脫白朮補以強脾亦虛邪兩治之法耳真人養臟湯謙甫謙甫真人養臟湯木香參朮芍甘當訶罌肉蔻安南桂瀉痢虛寒並脫肛真人養臟湯罌粟殼去蒂蜜炙三兩六錢木香一兩四錢肉桂八錢人參白朮炒訶子肉豆蔻當歸各六錢白芍炒一兩六錢生甘草一兩八錢每服四錢煎湯服之治瀉痢日久赤白已盡虛寒脫肛等證夫脫肛一證皆大腸之病寒熱虛實皆可致之虛而挾熱者如前之河間訶子散虛而有寒者即用此方然脫肛雖屬大腸推其致此之由皆多因脾虛而致故以人參白朮甘草大補其脾但瀉痢日久赤白雖無其氣分與血分不無虛而留滯故以木香理氣歸芍和血肉桂溫其下而散其寒肉蔻罌粟訶子三味皆可固腸止脫而為收澀之劑耳牡蠣散牡蠣散內用黃耆浮麥麻黃根最宜自汗陽虛表不固此方服後顯神奇牡蠣散牡蠣煅研黃耆麻黃根各一錢浮小麥百粒煎服治陽虛自汗夫自汗盜汗兩端昔人皆謂自汗屬陽虛盜汗屬陰虛立論然汗為心液心主血故在內則為血在外則為汗不過自汗盜汗雖有陽虛陰虛之分而所以致汗者無不皆由鬱蒸之火逼之使然故人之汗以天地之雨名之天地亦必鬱蒸而後有雨但火有在陰在陽之分屬虛屬實之異然二證雖有陰陽其為衛虛不固則一也此方用黃耆固衛益氣以麻黃根領之達表而止汗牡蠣鹹寒潛其虛陽斂其津液麥為心谷其麩則涼用以入心退其虛熱耳此治衛陽不固心有虛熱之自汗者也當歸六黃湯當歸六黃湯有力耆柏芩連二地協陰虛盜汗不能眠火擾營中難靜熄當歸六黃湯當歸生地熟地黃芩黃柏黃連各等分黃耆加倍治陰虛有火盜汗發熱等證夫心之所藏於內者為血發於外者為汗汗乃心之液也醒而汗出者為自汗因衛陽虛而不固也睡而汗出者為盜汗營陰虛而火擾也然陰虛火擾何以寐則汗出而寤則無汗以衛氣者寐則行於陰分而衛虛故汗出寤則衛氣仍出之陽而衛復固矣二地之益陰補血用當歸引之入心三黃之苦以瀉陰中之伏火火邪寧熄營血靜而汗自不出矣然火靜汗止恐衛氣不能永固於表故加用黃耆以固之耳茯菟丹局方茯菟丹療精滑遺石蓮五味總相宜還須山藥調脾土補澀仍兼淡滲奇茯菟丹菟絲子十兩五味子八兩石蓮肉白茯苓各三兩山藥六兩將菟絲用酒浸浸過余酒煮山藥糊丸漏精鹽湯下赤濁燈心湯下白濁茯苓湯下消渴米飲下治遺精白濁以及強中消渴等證由於腎虛者夫遺精白濁強中消渴四證雖皆有虛實之分無不皆由於腎病而起然腎為藏精之地而所以致精病者又當歸咎於心因君火上動則相火下隨於是精離其位而變證蜂起或中州之濕熱相乘或上焦之津液下降故凡治淋濁消渴等證皆當審脈察證以施治法此方以石蓮清心火下達於腎使上下之火邪安靜則精自守而不妄行然離位之精與不盡之火又宜使之皆出故以茯苓從上導下而分利之然後用五味固補於下山藥固補於中菟絲子補少陰之精能蒸騰腎水上升以復下注之津液耳金鎖固精丸欲知金鎖固精丸沙苑蓮鬚芡實安龍牡更兼蓮子肉精遺滑脫自能痊金鎖固精丸潼沙苑炒芡實蒸蓮鬚各二兩龍骨酥炙牡蠣鹽水煮一日一夜煅粉各一兩蓮子粉糊為丸鹽湯下治精滑不禁夫遺精一證不過分其有火無火虛實兩端而已其有夢者責相火之強當清心肝之火病自可已無夢者全屬腎虛不固又當專用補澀以固其脫既屬虛滑之證則無火可清無瘀可導故以潼沙苑補攝腎精益其不足牡蠣固下潛陽龍骨安魂平木二味皆有澀可固脫之能芡實益脾而止濁蓮肉入腎以交心復用其須者專賴其止澀之功而為治虛滑遺精者設也人參樗皮散人參樗皮散何藥兩味末之君不覺腸風臟毒久稽留血痢因循正又弱人參樗皮散人參樗根白皮東引者去粗皮醋炙各等分為末米飲下治腸風臟毒下血久而不愈以及久痢膿血不止等證夫腸風臟毒血痢三證其始也皆屬實邪或風入腸中或濕熱下注或積滯稽留於迴環曲折之處欲去不去以致逼迫營血妄行不止而成以上諸證故治之者或疏風導滯或清熱行瘀觀其脈證而立方藥自能取效及其久也皆屬虛而不固矣雖有不盡之邪亦當以固本為主使正旺而邪自除即欲用治邪之品還宜從末治之此方用人參大補氣血而固其虛樗皮之寒能清熱苦能燥濕澀能固脫一物而三善備合人參兩味為末米飲服之實為治久虛下血之良法也豈可以藥之少而忽之桑螵蛸散桑螵蛸散石菖蒲參茯當歸遠志俱龍走東方龜入北下虛便數力能扶桑螵蛸散人參茯苓遠志石菖蒲用鹽水炒桑螵蛸鹽水炒龍骨煅龜板醋炙當歸各等分為末臨臥服二錢人參湯下治小便頻數並能安神魂補心氣療健忘夫便數一證有屬火盛於下者有屬下虛不固者但有火者其便必短而赤或澀而痛自有脈證可據其不固者或水火不交或脾腎氣弱時欲便而不能禁止老人小兒多有之凡小兒睡中遺溺亦屬腎虛而致桑螵蛸補腎固精同遠志入腎能通腎氣上達於心菖蒲開心竅使君主得受參歸之補而用茯苓之下行者降心氣下交於腎如是則心腎自交龍與龜皆靈物一則入肝而安其魂一則入腎而寧其志以肝司疏泄腎主閉藏兩臟各守其職宜乎前證皆瘳也固真丸景岳固真丸治滑遺精菟牡金櫻與茯苓用蜜作丸酒送下新方固陣出張君固真丸菟絲餅一斤煅牡蠣四兩金櫻子去子蒸熟四兩茯苓酒拌蒸曬四兩蜜丸治夢遺精滑夫治遺精之大法不過通塞兩途通者通其瘀濁滲其濕清其熱使邪去正安精無擾攘自能固守閉藏而無遺滑之患塞者因其純虛無邪用止塞之劑以收其滑脫否則精關不固正氣下趨合汙同流無所休息矣然古人立方每每相需並用者以守位之精因虛而陷故不得不固離位之精因出而瘀又不得不通如此方之菟絲子大補腎中精氣蒸騰腎水使之上升而不下降牡蠣金櫻澀以固之茯苓通以利之以蜜丸者取其甘緩協和之意使通塞之劑各得其平耳鞏堤丸景岳鞏堤丸子治陽衰不約而遺病勢乖韭子地絲益智味藥苓朮附骨脂佳鞏堤丸熟地二兩菟絲餅炒白朮各二兩五味子益智仁酒炒破故紙酒炒製附子茯苓家韭子炒各一兩為末山藥糊丸治膀胱不藏水泉不止命門火衰小水不禁等證夫遺尿一證有虛寒有火迫然皆由下元不固而致者為多凡老人小兒多有之因老人腎氣已衰小兒腎氣未足之故蓋腎者胃之關也若關門不利則聚水而成病關門不固則水勢下趨不約而遺矣方中熟地菟絲骨脂韭子大補腎臟然所以約束腎中之氣者又在於脾故以白朮山藥大補脾土益智辛香溫暖獨入脾家且能於固攝之中仍寓流動之意附子助其真火茯苓去其邪水而以五味子一味固其關鞏其堤也人參定喘湯局方人參定喘首麻黃甘草阿膠夏曲桑五味生薑罌粟殼遠年久嗽妙非常人參定喘湯人參麻黃去節炙甘草阿膠半夏曲各一錢罌粟殼蜜炙一錢桑白皮蜜炙五味子各五分生薑三片治遠年咳逆上氣胸滿痞塞聲不出者夫咳嗽一證不過辨其有邪無邪之分失音一證亦不過審其金實金破之分總不離乎外感內傷之間但肺為清肅之臟其氣下行為順上行為逆若邪實肺中則失其下行之旨虛而氣逆亦每成上壅之虞故無論虛補實瀉法中皆當兼用肅降之品此方治久咳正虛留邪未盡用兩顧之法人參甘草益其氣阿膠復其血麻黃生薑宣其邪半夏行其濁五味罌粟斂其耗散桑皮清熱下行以順其秋金之令耳威喜丸威喜丸中黃蠟苓二般鎔合兩相勻元陽不固精遺濁久嗽金傷虛火刑威喜丸茯苓四兩即以豬苓二兩共入磁器內同煮十餘沸取出曬乾不用豬苓黃蠟四兩將茯苓四兩為末溶化黃蠟為丸如彈子大每服一丸細嚼津下小便青白為度治元陽虛憊精滑不固白濁遺尿婦人血海虛冷淫濁帶下夢泄等證專調斫喪之陽理潰亂之陰又治肺虛久嗽痰火未除者夫以上諸證皆從虛而不固中來治之者似宜純用斂澀之劑然淫濁帶下皆屬離位之精則又宜分消導濁茯苓黃蠟二味一通一澀交相互用性皆甘淡得天地之至味故能調理陰陽固虛降濁以奏全功耳斂肺湯久咳無邪斂肺湯藥煎訶子味相當耆皮白及胡桃肉罌粟還須甜杏霜斂肺湯百藥煎訶子皮五味子黃耆皮白及片胡桃肉罌粟殼甜杏霜此為久咳純虛無邪特設一斂固之法為學者採擇耳夫咳嗽一證當辨其內傷外感兩途外感者皆屬六淫之邪治法或溫散或清解邪去則肺氣清肅咳嗽自愈內傷者除痰飲氣火外皆屬肺氣耗散審其陰虛陽虛而斂固之即有虛火以及一切雜證相間亦不妨用兩顧之治也方中百藥煎訶子皮罌粟殼皆清虛之品入肺而斂其耗散五味子斂而兼補且能保肺滋腎耆皮固肺氣白及補肺損胡桃杏仁潤肺燥耳治瘧之劑夫瘧之一證內經論之甚詳其要領所云夏傷於暑秋為痎瘧又云夏暑汗不出者秋成風瘧由此觀之凡瘧之發無不由於伏暑而致人身邪正固勢不兩立然六淫之正邪皆可伏而後發乘人之虛處而伏之再遇外感之邪相觸外內相引新故相亂而病作矣伏邪既動必與人身營衛之氣交爭故寒熱按時而作正氣旺者一日一作正氣衰者或間日或二日必待正化邪盡而病愈蓋寒熱一次則邪減一分故每日發者易愈邪化之速也其間日與二日發者難愈以正虛不能與之連日相爭故休數日乃作如此則化之遲耳治之者必本其所伏之處疏之化之使其寒熱漸輕然後可用劫截之法其本之者何痰也血也蓋暑乃無形之邪其所以依踞者必賴有形之痰血為之留伏故古人有無痰不作瘧之論學者於此體會詳察之則治瘧之法無遺蘊矣清脾飲嚴用和清脾飲子樸芩柴苓朮甘青半夏加更益生薑草果服廓清脾部瘧為邪清脾飲青皮醋炒厚朴柴胡黃芩炒製半夏茯苓白朮土炒炙甘草草果加生薑煎原方主治瘧疾熱多寒少口苦咽乾小便赤澀脈來弦數等證然觀其方藥並非純用清利之品其所以為之清脾者後賢皆謂能廓清脾部之邪耳夫瘧邪雖伏於肝膽之間而所以致其伏者又在於脾因脾失運化之職遂致濕濁痰飲與伏邪互結耳方中白朮甘草補其脾復其健運半夏茯苓行其痰厚朴散其濕而獨以青皮入肝疏其伏邪草果入脾散其結滯柴胡升之散瘧邪於表黃芩降之清瘧邪於裡引用生薑亦祛邪辟惡以廓清脾部耳常山飲局方常山飲子局方垂久瘧難痊截病災知貝果檳薑棗酒水煎露宿共烏梅常山飲常山火酒炒五錢煨草果檳榔知母各一錢烏梅二枚貝母一錢生薑三片大棗一枚半酒半水煎露一宿日未出時面東空心溫服渣再用酒煎待瘧將發時先服治瘧久不已者用此截之夫截瘧一法古人相沿已久然考其截之之法並非有阻截之意不過使其伏邪潰散搗其巢窟寒熱自止耳常山善吐胸中痰結引之上升檳榔能破胸下癖囊導之下降使伏邪離而不合知母治陽明獨勝之熱草果治太陰獨勝之寒使寒熱解而自除貝母化其不盡之餘痰烏梅斂其既亡之氣血薑棗和營衛致津液酒水行經絡助藥力煎露一宿者以瘧由伏暑而起露能解暑白露至則炎暑退耳鱉甲煎丸金匱鱉甲煎丸鼠䗪蜣桃丹硝樸桂乾薑柴芩夏芍阿瞿藶石葦人參蜂大黃烏扇紫葳灶下土頻添清酒浸之良即將鱉甲和同煮搗爛為丸法異常鱉甲煎丸鱉甲十二分炙烏扇三分燒黃芩三分柴胡六分鼠婦三分熬乾薑大黃桂枝石葦厚朴紫葳半夏阿膠芍藥牡丹䗪蟲各五分葶藶人參各一分瞿麥二分蜂窠四分赤硝十二分蜣螂六分熬桃仁二分上二十三味為末取煅灶下灰一斗清酒一斛五斗浸灰俟酒盡一半著鱉甲於中煮令泛爛如膠漆絞取汁內諸藥為丸如梧子大空心服七丸日三服治瘧久結為癥瘕名曰瘧母此丸主之方中寒濕並用攻補兼施化淡行血無所不備而又以蟲蟻善走入絡之品搜剔其蘊結之邪柴桂領之出表硝黃導之降里煅灶下灰清酒助脾胃而溫運鱉甲入肝絡而搜邪空心服七丸日三服者取其緩以化之耳何人飲景岳何人飲子是新方久瘧雙虛法最良配入歸陳調氣血更須煨熟好生薑何人飲何首烏五錢人參三錢當歸二錢陳皮二錢煨生薑兩片水二鍾煎八分於未發前服之治氣血兩虛久瘧不止邪盡而寒熱仍作者所謂陽虛則寒陰虛則熱陰陽相併則寒熱仍作也然何以亦發作有時者皆由正氣餒弱至其時預為顧慮於是陽氣困束寒從中生久則陽氣仍復而熱矣方中首烏補肝腎之陰人參助脾肺之陽當歸和其營陳皮理其氣以為補藥之助生薑生則散表熟則溫中而益其陽氣耳杏仁湯鞠通加減銀翹散肺瘧宜求杏子湯芩苓翹蔻滑梨桑寒從背起苔多白咳嗽頻仍渴飲漿心瘧熱多煩渴盛昏狂舌赤又中黃元犀竹時門冬等加減銀翹即此方杏仁湯杏仁三錢黃芩一錢半連翹一錢半滑石三錢桑葉一錢半茯苓塊三錢白蔻皮八分梨皮二錢水三杯煮取二杯日再服治舌白渴飲咳嗽頻仍寒從背起伏暑所致名曰肺瘧此湯主之夫內經有五臟六腑之瘧惜未詳其治法茲特採溫病條辨中數方以廣學者見聞此為伏暑留於肺絡而發也故以一派輕宣肺氣清肅上焦之品治之自愈白蔻宣肺滯杏仁降肺氣使肺金復其清肅之令桑葉輕揚入絡散之於外黃芩苦寒清金降之於里連翹散上焦之血凝氣聚梨皮利肺部之熱蘊邪留滑石茯苓皆入肺引邪下導耳加減銀翹散連翹十分銀花八分元參五分犀角五分竹葉三分共為粗末每服五錢煎成去渣滴荷葉汁二三茶匙日三服治熱多昏狂讝語煩渴舌赤中黃脈弱而數名日心瘧此方主之心瘧者邪氣留伏於心包絡而化為熱也最多內閉之慮故以犀角輕靈尖銳之品直清其心臟而泄其邪麥冬護其心陰元參滋其腎水而火自不炎連翹銀花竹葉荷葉皆輕清滌熱之物且具解散之功使浮游之邪外出耳露姜飲鞠通加味露姜飲露姜飲子與參和脾瘧因寒吐利多加入青陳果夏品方名加味起沉疴露姜飲人參生薑各一錢水兩杯半煮成一杯露一宿重湯溫服治太陰脾瘧脈濡寒熱瘧來日遲腹微滿四肢不暖此方主之此亦脾陽不足瘧邪留戀邪少虛多之證也人參大補脾中之氣生薑辛溫以散餘邪補而不滯散而不泄合成甘溫方法煎成露一宿服者亦如前方常山飲中之意耳加味露姜飲人參一錢生薑二錢半夏二錢草果一錢廣皮一錢青皮一錢醋炒水二杯半煮成一杯滴荷葉露三匙溫服渣再煮服治太陰脾瘧脈弦而緩寒戰甚則嘔吐噫氣腹鳴溏泄此方主之此條較前條濕濁內盛而寒亦重故加草果以溫太陰之積寒半夏以化脾家之濕濁青皮陳皮行肝脾之氣使濕濁去而正氣存則瘧邪自止余法與前相同耳青蒿鱉甲湯鞠通膽瘧青蒿鱉甲湯早涼暮熱脈弦剛汗多渴飲營陰耗花粉丹皮知母桑青蒿鱉甲湯青蒿三錢知母二錢桑葉二錢鱉甲五錢丹皮二錢花粉二錢水五杯煮取二杯瘧來前分二次溫服治脈左弦暮熱早涼汗解渴飲少陽瘧偏於熱重營不足者此湯主之夫瘧邪固皆伏於肝膽者為多但當辨其氣分血分之異如小柴胡湯治邪在肝膽氣分者也若肝膽營血不足者則邪乘虛入而為前證矣故以鱉甲入肝膽養陰退熱搜其經絡之結邪丹皮涼其血熱知母安其腎水熱邪內發津液耗傷故用花粉清熱而止渴青蒿入肝膽血分疏邪出表然邪之由營達衛氣分未有不經擾攘者故用桑葉之入少陽氣分行經達絡以盡肝膽之餘邪耳厚朴草果湯鞠通厚朴草果湯苓塊杏仁半夏陳皮配寒多濕瘧白苔生脘悶肢寒邪作害厚朴草果湯厚朴一錢半杏仁一錢半草果一錢半夏二錢茯苓塊三錢廣皮一錢水五杯煮取二杯分二次溫服治舌白脘悶寒起四末渴喜熱飲濕蘊之故名曰濕瘧此湯主之夫瘧之一證多因伏暑所致然暑必兼濕若脾胃濕盛之人受之者發則已上等證作矣故雖熱渴而仍欲熱飲也治之者當以苦辛溫之法以化之使濕化則暑無依附而病自愈耳草果辛溫香燥氣猛而剛能治太陰獨勝之寒可化脾部稽留之濕助以半夏茯苓之燥厚朴廣皮之散以佐之濕阻則周身氣機皆滯肺主一身之氣故以杏仁開其肺使之清肅下行其濕焉有不去者乎扶陽湯鞠通少陰三瘧取扶陽嗜臥形寒氣血傷舌淡脈微口不渴桂枝蜀附鹿參當扶陽湯鹿茸五錢生銼末先用黃酒煎蜀漆炒黑熟附子桂枝各三錢人參當歸各二錢水八杯加入鹿茸酒煎成三小杯日三服治少陰三瘧久而不愈形寒嗜臥舌淡脈微發時不渴氣血兩虛此湯主之此方為腎臟真陽不足邪伏至深非輕淺藥餌所能療治者而設鹿茸大補腎臟之陽能通督脈督脈總督諸陽為衛氣之根本使周身陽氣充滿流行而後人參當歸大補氣血助以附子之溫隨鹿茸同歸於腎正氣內充伏邪自潰蜀漆提其蘊結之邪升之於上桂枝解其遊散之邪疏之於表耳立方之意學者宜究心焉減味烏梅丸鞠通減味烏梅丸用連厥陰三瘧服為先椒萸桂芍姜苓夏辛苦甘酸體用兼減味烏梅丸半夏黃連乾薑吳萸茯苓桂枝白芍川椒炒黑烏梅治厥陰三瘧日久不已勞則發熱或有痞結氣逆欲嘔等證此方主之夫瘧邪之發也雖皆不離乎肝膽之間但當分其臟腑經絡之異如在腑在經者其病淺故僅以小柴胡青蒿鱉甲等方可矣若瘧久不已結成痞塊而有氣逆欲嘔等證其為入臟可知然厥陰為兩陰交盡之臟體陰而用陽有相火內寄故其為病也與傷寒相類亦見氣逆欲嘔消渴吐蛔等證其治也亦如治傷寒之苦辛雜用寒熱並投剛藥以化其陰柔藥以和其陽斂者斂散者散體用相得以順厥陰之性然則此條之厥陰三瘧而見氣逆欲嘔等證其為邪犯肝臟動其肝用傷其肝體故用此方以治之耳殺蟲之劑蟲者因化而生固有五臟之不同種種之各異然總不離於土氣卑監不節飲食為濕蒸熱鬱而生成也如汙下之地則蟲生焉其生不息日以益繁若得風吹之日曬之則鬱者伸濕者燥而蟲自無矣人身之蟲亦猶是也但蟲之在腑者易治在臟者難除久則食人之膏血以致肌肉羸瘦而成癆瘵者有之豈可不節飲食慎寒暑而聽其蟲之滋患哉每見小兒多蟲病者皆由於不節飲食凡一切生冷瓜果皆為生蟲之源至於發癥鱉瘕以及噎膈蟲脹傳屍癆瘵等證皆有蟲者無不由於脾胃正氣不充失其健運之常有以致之是以治之者不得純用殺蟲之品當求其致病之源或補之或誘之或雖殺之而不損脾胃參酌進退神而明之則自無遺蘊矣烏梅丸仲景烏梅丸治厥陰邪蛔厥難安煩嘔加辛桂椒姜連柏附參歸苦酒蜜相諧烏梅丸烏梅二百枚細辛六兩乾薑十兩黃連十六兩當歸四兩附子六兩炮去皮蜀椒四兩炒出汗桂枝六兩去皮人參六兩黃柏六兩苦酒浸烏梅一宿去核蒸熟和蜜杵為丸如桐子大每服十丸治傷寒厥陰病煩躁吐蛔等證此方本為傷寒之方而列於此者以其有吐蛔一證故釋之以備學者之取用耳夫厥陰為兩陰交盡之處然有相火內寄故又為陰中之陽雖傷於寒其木火剛暴之氣仍不免上乘土位而見煩躁吐蛔等證方中用薑附辛椒大辛大熱之物溫其寒而安其體黃連黃柏大苦大寒之品折其火而制其用烏梅苦酒之酸斂以順其性參歸之大補氣血以固其正用桂枝者以肝為藏血之地從血分領邪出外耳至於蟲得酸則靜得辛則伏得苦則安之義固理之所當然但烏梅丸之功用未免小窺矣化蟲丸化蟲丸內楝檳礬鉛粉蕪荑鶴蝨談百部雷雄使君子蟲留腸胃欲除難化蟲丸鶴蝨鉛粉炒苦楝根檳榔各一兩使君子蕪荑百部雷丸雄黃各五錢枯礬二錢半為末酒煮麵糊作丸量人大小服之一歲兒五分治腸胃諸蟲為患汪訒庵曰夫腸胃之中無物不容其所以化生諸蟲者緣正氣衰弱或誤食生蟲之物或濕熱鬱蒸而成亦猶物必先腐而後蟲生之義也方中各藥皆殺蟲之物走腸胃之品單用尚可治之類萃為丸而蟲焉有不殺者乎此治正氣未虛蟲病初起輕淺易治者設也然學者總須臨病制方察其寒熱虛實與夫病之新久而參酌之切勿泥一方以治百病也甘草粉蜜湯金匱甘草粉蜜湯金匱吐涎心痛蟲為害誘之甘蜜令先嚐鉛粉和吞殊可貴甘草粉蜜湯甘草二兩白粉一兩白蜜四兩上三味以水三升先煮甘草取二升去滓內粉蜜攪令和煎如薄粥溫服一升差即止治蛔蟲之為病令人吐涎心痛發作有時毒藥不止者此湯主之吐涎心痛皆由蟲蝕上膈故俱作止有時所謂蛔飽而靜則不痛蛔飢求食擾亂胃中則痛而吐涎毒藥不止者用毒藥攻殺之品而蟲不去也大抵蟲之所食亦有喜惡故用正治之法而不去者必用其所喜之味以誘之甘草白蜜之甘而攪以白粉善殺蟲者誘之使食待甘味既盡毒性便發蟲患乃除此醫藥之變詐也理中安蛔丸理中方內有安蛔薑朮參苓椒與梅嘔吐胃寒胸膈痛溫扶脾土去蟲災理中安蛔丸白朮陳壁土炒二兩人參炮姜茯苓川椒烏梅各一兩蜜丸治胃寒吐蛔腹痛不止夫腹痛一證固有寒熱虛實之不同其為蟲積者尤多以其飲食不節生冷過度脾胃陽氣薄弱不能運化精微蘊釀而成蟲積矣其痛也腹中似有形攻擊之狀上下作止不一亦無喜按拒按之分喜熱喜冷之辨或好食泥土茶炭等物脈象三五不調唇色或赤或白自有病證可徵急用理中溫理中臟復其健運之職而杜其生蟲之源加入川椒烏梅大辛大酸之品以殺之用蜜丸者使之易入蟲口以緩椒梅之急耳秦椒剪紅丸秦椒剪紅丸大黃稜莪於漆木香榔椒紅貫眾雄黃曲蟲膈潛消血膈康秦椒剪紅丸秦椒大黃三稜莪朮乾漆木香檳榔貫眾雄黃為末神麯糊丸五更時用雞湯送下治蟲膈血膈等證夫蟲膈與血膈兩端皆飲食不下皆有痛處但蟲則作止無常攻動不一或飢則盛而稍得食則緩血則口中自覺有血腥氣時作呃逆或因大怒而血逆於上或因受傷而血鬱於中然蟲膈最易裹血血膈每易生蟲故出一方而兩治之方中行氣破血之藥居其大半而以殺蟲之藥輔之用神麯糊丸者助脾而復其健運之職送服用雞湯者以甘美之味而易入蟲口也學者神而明之變而通之切謂血膈蟲膈併為一證而混用一方也治目之劑目者肝之竅也雖古人有五輪八廓之分然總不離於肝病所致亦猶咳之不離肺也惟能辨其外感內傷而已矣外感者皆從六淫風火而來以外來之風火招引肝臟之風火兩相搏激為患特盛甚則亦見寒熱之表證此皆不過一時之時邪故患之者最易傳染然治之得法亦易愈也惟內傷則不止一端焉有腎水不足木無所涵肝火易動目赤腫痛眵淚羞明等證時作時止者有肝腎精華日減目視昏花者有肝虛不能夜視者大凡水能鑑物火能昏物故治目者皆以益陰滋水為事然亦有水中之真火不足不能蒸動真精上行於目以致目不能遠視者至若久而成翳成障亦有內外之分其因於外者由風火逼迫所致治法固當疏散其因於內者由肝氣鬱滯而成治之者亦當從木鬱達之火鬱發之之義或再助以外治之法斷不可妄用寒涼使之冰凝不化其他如內障之目無光者治之亦難見效即先哲有金針撥翳等法今亦罕見其人與夫瞳神之散大或收縮其為寒為火皆有證可據而治茲集略備應用之方十餘首以為學者之採擇其未詳者再求之專書可也消風養血湯消風養血芷防荊菊蔓芎歸兩決明麻芍桃紅甘草等時行赤眼效如神消風養血湯荊芥蔓荊子菊花白芷麻黃防風桃仁去皮尖紅花酒炒川芎各五分當歸酒洗白芍酒炒草決明石決明甘草各一錢治風火時行目赤腫痛此治目病之因於風火外感者也風氣通於肝肝藏血邪乾血分故目赤風為陽邪風火相搏內外相激故且腫且痛然邪之從外來也當知其從何經而入則用何藥以解之如紅之從上而下者屬太陽可用麻黃防風等藥如紅自下而上者屬陽明可用白芷等藥自外眥來者則屬少陽如荊芥蔓荊菊花等類皆可擇而用之以病從外來仍當使之外解若以寒涼遏之即不能速愈耳惟紅自內眥起者則為心火實邪可暫用苦寒之品清泄之方中歸芍川芎養肝之血桃仁紅花破肝之瘀甘草以緩其急兩決明者以決能明目其餘各隨其經之所病擇其所當用者用之可也洗肝散局方洗肝散治眼睛紅風毒邪傷火上攻羌薄芎歸防草散大黃梔子降能通洗肝散薄荷羌活防風當歸川芎梔子大黃炙甘草各等分為末每服二錢治風毒上攻暴作赤腫目痛難開隱澀眵淚等證夫肝火素盛之人一旦感召時行風火不特疊見如上之證每每致成裡實一端則小便赤澀大便閉艱矣治之者若僅知解外而不知清裡則表之風邪雖退而里之實熱未除無益也故方中羌活防風大開太陽之表使邪從外解薄荷能清利頭目輕宣上焦以助羌防之不逮於是表邪自無容留之地梔子專清上焦之火能屈曲下行導火邪從小便而出大黃瀉實火從大便而出於是里邪亦無留著矣甘草緩其急而和其諸藥歸芎和血養肝以善其後耳百點膏東垣翳障瞳神百點膏黃連甘草蕤仁調當歸和血防風散入蜜熬成點自消百點膏黃連二錢以水一碗煎至半碗再入後藥當歸甘草各六分防風八分蕤仁去皮尖二分一同熬滴水不散去渣入蜜少許再煎少時要病人淨心點之至目微痛為度一日五七點使藥力相續故曰百點臨臥尤妙治風火相搏翳遮瞳神此翳障之因於外來風火火旺者而起也然無形風火必挾有形之血滯始能為翳為障如火旺者雖祛風養血其翳亦總不能遽除故方中重用黃連以退其火然後以防風散其風邪當歸和其血絡甘草緩其急以和其各藥之性蕤仁入肝散結搜風為摩翳之需此方不特可以退翳且風火時行赤眼亦可用之耳石斛夜光丸石斛夜光杞菊參犀羚連味菟葙苓蓯蓉蒺膝芎甘枳杏藥防冬地決明石斛夜光丸石斛五錢酒洗人參生地熟地酒洗天冬麥冬去心白茯苓防風草決明黃連各一兩犀角羚羊角川芎炙甘草枳殼炒青葙子炒五味子炒蓯蓉酒洗各五錢懷牛膝酒洗白蒺藜去刺炒菟絲子菊花山藥杏仁去皮枸杞酒洗各七錢將石斛熬膏和藥末煉蜜為丸如桐子大每服三五十丸鹽湯下治神光散大昏如霧露眼前黑花睹物成二久而光不收斂及內障瞳神淡白綠色觀以上諸證皆氣血內虧風熱鬱滯所致方中參藥苓草皆補養元氣使之運行地冬蓯味能培益真陰冀其潤澤防風菊花青葙草決等以搜其風犀角羚羊黃連石斛以清其熱氣滯者用杏枳破之氣散者以五味收之其餘牛膝菟絲枸杞之類皆所以益腎補肝固其本臟也然藥味龐雜學者不可執一用之磁朱丸千金磁朱丸法出千金神麯調和糊合成內障能移鎮墜力神光散大自能明磁朱丸云磁石硃砂先以磁石置巨火中煅七次每煅必淬以醋研細水飛澄定曬乾取淨末二兩硃砂亦研細水飛曬乾取淨末一兩用生神麯末三兩與前二味和勻更以神麯末一兩水和作餅煮浮搜入前藥為丸如綠豆大每服三四十丸空心米飲送下治神水寬大漸散光采不收及內障撥後翳不能消用此鎮之硃砂稟南方離火之氣中懷陰質鎮邪蕩穢隨磁石吸引之能下行入腎自然神水肅清而陰霾退避矣用生曲者藉以發越丹石之性而助其建功也用米飲下者取穀氣以和脾胃使硃砂之入心磁石之入腎嬰兒奼女藉中土以既濟之耳立方之意豈淺鮮哉碧雲散碧雲散乃眼科奇外障攀睛眵淚迷青黛川芎不食草末之吹鼻立能移碧雲散鵝不食草一兩嗅之即嚏者真青黛川芎各五錢為散先噙水滿口每用綠豆許搐鼻內以嚏淚為效搐無時一方加北細辛牙皂末各一兩治外障攀睛眵淚稠黏等證夫治病之道有正取有旁取蓋目為肝竅治目者求之於肝此正治之法也若夫吹耳吹鼻求之肺腎此旁取者也以肝腎為子母之臟乙癸同源肝肺司升降之權左右相感青黛川芎清肝火而疏肝鬱鵝不食草能開肺而取嚏用治肺之藥吹入肺之竅使金令下行肝邪自愈翳障自除耳宣明丸宣明丸藥治何因赤腫羞明血灌睛四物芩連軍酒製薄荷蜜滴取來吞宣明丸赤芍當歸大黃酒蒸黃芩各二兩生地三兩黃連川芎薄荷各一兩蜜丸梧子大每服五十丸食後米飲服治瘀血灌睛赤腫澀痛等證夫肝為藏血之地一受熱邪即逼血上行於是血灌瞳神赤腫澀痛等證有自來矣治之者當正其本而清其源自然流清而標亦愈生地養肝之陰赤芍散肝之血當歸川芎併入肝經理血中之氣而遂其條達之性黃連大黃黃芩直清其上中下三焦之患故以薄荷輕揚上焦肅清餘孽蜜丸食後服者亦留戀之意耳煮肝散煮肝散內夜明砂雀目羞明夜視花蛤粉穀精石決等肝中煮服用之瘥煮肝散夜明砂淘淨蛤粉穀精草石決明各一兩為散每服三錢以豬肝竹刀批開勿犯鐵攤藥在內麻線纏定米泔水一碗煮肝至熟先取出湯傾碗內熏眼肝分三次細嚼用煮肝湯熱下一日服之治雀目羞明疳眼翳障等證夫雀目一證至夜則昏如霧露視物無光皆由肝有滯濁積結陰分以致精津血液至交入陰分之時不能上升於目故夜視無光耳至小兒疳眼亦因積滯起見流雖異而源則一也方中夜明砂專入肝經破滯化積況其矢食蚊而化蚊身雖化而眼不化故取之穀精草得谷之餘氣養肝磨翳為目疾所需蛤粉決明皆介類之品引之以入陰分以肝煮之者使藥性歸之於肝也定志丸局方定志丸療遠視難心虛志弱火光殘人參遠志菖蒲茯蜜滴辰砂衣可還定志丸遠志菖蒲各二兩人參茯苓各一兩蜜丸硃砂為衣治目能近視不能遠視者王海藏曰目能近視責其有水不能遠視責其無火法當補心夫心為一身之主宰元氣之所寓然目雖為肝竅而心亦寄竅於目何也蓋目之於色也其好其惡悉憑之於心故凡目之無力遠視者又豈滋水柔肝之法所可愈哉方中即以人參大補元氣而用菖蒲為之先導使之入心宣竅清宮除道則人參之力益見其長茯苓寧心氣下交於腎遠志通腎氣上達於心硃砂外赤內離中含陰汞有助陰之功以佐人參之不逮於是子足不盜氣於母肝病自能愈耳地芝丸東垣不能近視地芝丸水弱肝虛火勢燃生地天冬炒枳殼菊花去蒂蜜為圓地芝丸生地焙天冬各四兩甘菊花去蒂炒枳殼各二兩蜜丸茶清或酒下治目能遠視不能近視者王海藏曰目能遠視責其有火不能近視責其無水法當補腎夫火之力剛故能遠照水之力柔故能近視人之一身百病千端亦不過一陰陽水火而已然腎為主水之臟肺為生水之源故以生地大補腎水天冬潤養肺金使之金水相生則肝得所養菊花得金水之精專入肝經能祛風於外枳殼具苦降之性單行氣分為破滯之需庶幾風盡去而滯無留則補藥得力而病易愈耳用茶者欲火熱之下降用酒者欲藥力之上行也羊肝丸類苑羊肝丸治目昏花內障皆由肝滯遮木賊夜明蟬退等當歸酒洗效堪誇羊肝丸夜明砂淘淨蟬退木賊去節當歸酒炒各一兩羊肝四兩去筋膜水煮搗爛和丸治目疾內障夫內障與外障病雖不同然為肝邪上衝凝滯則一也肝為藏血之地其性條達若血病則肝失所養失其條達之性於是則鬱結凝滯隨其上升之氣而為內外諸障矣當歸芳香辛苦能潤養肝血而又兼行氣分以復其肝之本性夜明砂系蝙蝠矢食蚊而化但其眼不化蚊又為食血之蟲故能入肝破血為散結行滯之需蟬退木賊一則取其善脫一則取其善摩二味皆輕揚治上為退翳除障之專藥用羊肝者以羊食百草其精華皆聚於肝以為導引耳白蒺藜丸白蒺藜丸治眼奇時行赤腫淚淋漓蛋清拌入為丸服胬翳遮睛此可醫白蒺藜丸白蒺藜一升雞蛋十枚去黃存白拌蒺藜一宿炒磨水泛為丸治時行赤眼流淚紅腫胬翳遮睛怕火畏光等證夫先哲立方簡而備約而該用一藥而諸證皆除較今人之廣絡原野以冀一獲者其相去不啻如天壤矣白蒺藜辛苦性溫行瘀破滯有瀉肺疏肝之力具宣風導滯之功故凡一切目疾翳障等證悉可用之但蒺藜之性純乎疏逐見長恐一味單行誅伐無過故以雞子白之潤養陰血以復肝家生生之體剛柔相濟剿撫互施宜乎如上諸證皆得見功耳外科之劑外科者並非與內證截然兩途實同源而異流也故明乎內者未必不明於外形諸外者未必不本主於中經云營氣不從逆於肉裡乃生癰腫但須辨其寒熱虛實而治之使營氣返逆為順復其常度則可矣夫營者主血循行分肉之間得寒則凝澀行之不及乃失其常得熱則沸騰行之太過亦失其常失常則痰凝血結而成外證矣大抵寒熱虛實皆有形證可辨如形色淡白而不痛舌苔白滑而不渴小便清長脈來遲緩皆寒也色赤焮痛舌黃口渴二便不利脈象浮洪皆熱也而熱者多實寒者多虛初起者多實潰後者多虛不必拘拘乎大小陰陽之定論也至治之之法寒者熱之熱者寒之固無論矣然寒凝之證用溫散之法使既凝之血得溫則行自然解散事之常也有證之屬熱者其始也既結為腫以寒藥服之而不效反用溫藥而得散者何也蓋結者非溫不行兩熱相攻則散此又事之變者也此皆為外證之大者言之至若輕淺瘡癤之類又當觀其所以隨證治之或內服或外敷學者參互取效可耳茲集略採古法數方以備觀覽焉陽和湯陽和湯法解寒凝外證虛寒色屬陰熟地鹿膠薑炭桂麻黃白芥草相承陽和湯熟地五錢白芥子一錢半鹿角膠一錢半炮薑炭五分桂枝一錢麻黃一錢甘草五分煎服夫癰疽流注之屬於陰寒者人皆知用溫散之法矣然痰凝血滯之證若正氣充足者自可運行無阻所謂邪之所湊其氣必虛故其所虛之處即受邪之處病因於血分者仍必從血而求之故以熟地大補陰血之藥為君恐草木無情力難充足又以鹿角膠有形精血之屬以贊助之但既虛且寒又非平補之性可收速效再以炮姜之溫中散寒能入血分者引領熟地鹿膠直入其地以成其功白芥子能去皮裡膜外之痰桂枝入營麻黃達衛共成解散之勳以宣熟地鹿角膠之滯甘草不特協和諸藥且賴其為九土之精英百毒遇土則化耳真人活命飲真人活命芷歸銀乳沒防甘貝粉陳甲片皂針酒作引癰疽初起屬陽經真人活命飲金銀花二錢陳皮去白當歸酒洗各一錢半防風七分白芷甘草節貝母天花粉乳香各一錢沒藥皂刺各五分炙甲片一錢用好酒煎毒在上飽服在下飢服善飲者多飲酒以行藥勢忌酸物鐵器治一切腫毒初起未消偏於輕淺陽分者夫腫毒之初起也皆由營血阻滯鬱而為熱營衛之氣失其常度病既形之於外必有表證外見當此之時急須精銳直前之品搗其巢穴使阻者行滯者通再助之以各藥自然解散方中甲片角針皆能直達病所破除結積之邪乳香理氣沒藥行瘀二味皆芳香宣竅通達營衛為定痛之聖藥以佐甲片角針之不逮然腫堅之處必有伏陽痰血交凝定多蘊毒故又以天花粉清之金銀花甘草節解之腫毒既生於外即為表證故以防風解之於後白芷疏之於前使營衛不盡之邪皆從汗出如是則腫毒解矣至若當歸之和血貝母之化痰陳皮之理氣亦由善後者以理其餘氛酒煎則助其藥力耳琥珀蠟礬丸護心琥珀蠟礬丸毒盛元虛恐內干飛淨雄朱同白蜜白湯送下一錢安琥珀蠟礬丸黃蠟一兩白礬一兩二錢雄黃一錢二分硃砂一錢研細琥珀一錢另研極細白蜜二錢上四味各研細末另將蠟蜜入銅杓內溶化離火片時候蠟四旁稍凝方將藥味入內攪勻共成一塊將藥火上微烘急作小丸如綠豆大硃砂為衣磁罐收貯每服二三十丸食後白湯送下毒盛者早晚服其功甚速治癰疽發背瘡形已成其人即不虛弱恐毒氣不能外出內攻於裡預服此丸護膜護心亦且活血解毒方中黃蠟白礬皆固澀之品為護膜之主藥故以為君雄黃硃砂琥珀不特鎮心神安魂魄且皆有解毒之功白蜜甘平而潤護膜解毒兩擅其長此丸業瘍醫者皆當預備以應需用耳護心散護心散治火邪攻瘡毒純陽躁擾凶甘草辰砂綠豆粉乳香定痛妙無窮護心散綠豆粉一兩制乳香三錢硃砂甘草各一錢上藥四味研細末每服二錢白滾湯調服早晚二次有神功治瘡毒內攻口乾煩躁噁心嘔吐等證服此護心解毒此治外證之火毒熾盛者也其燎原之勢亟亟可危不特津液日被煎熬且有犯及心君之慮當此之時若以苦寒之法用之又恐苦燥惡劣之性有傷正氣且慮愈耗其陰經所謂炎上作苦古人有久服黃連反能助火之說故以綠豆甘寒清熱解毒無苦寒燥劣之性無耗陰傷正之虞以之為君而再以甘草佐之其功愈大其效愈彰然營血之既結為腫者又非綠豆甘草可以解散故以乳香之芳香和營理氣通徹表裡之藥以解散之硃砂鎮心安神特所以護君主耳透膿散透膿散治毒成膿服此能成速潰功芎芷歸耆甲片皂銀花大力霎時通透膿散生黃耆四錢白芷皂角刺川芎炙甲片各一錢當歸金銀花各五錢大力子一錢炒研酒水各半煎服治癰毒內已成膿不穿破者服此即潰夫癰毒之成膿也必由正氣充旺方得變化而成倘或氣血衰弱即不能鬱蒸為熱而膿之成也無期即既成膿矣亦須賴正氣以托之方能速潰否則有膿而不能即潰即用刀針決之潰後膿亦清稀流而不暢仍須補托之劑方得膿稠出暢方中黃耆大補元氣芎歸潤養陰血而以白芷牛蒡宣之於皮毛肌肉之間使之補而不滯甲片角針為精銳之品能直達病所以成速潰之功金銀花以化其餘毒酒則行其藥勢耳九龍丹九龍丹內木香巴乳沒兒茶血竭誇生蜜作丸服九粒橫痃癰毒立時瘥九龍丹兒茶血竭乳香沒藥木香巴豆去油各等分為末生蜜為丸豌豆大每服九丸空心熱酒一杯送下瀉利四五次方吃稀粥腫盛者間日再一服自消治魚口便毒騎馬癰橫痃毒一切因濕火鬱結初起未成膿者均可治之夫以上等證皆濕熱蘊結挾痰與血釀成大毒有牢不可破之勢若以輕淺通套之藥祛其濕熱解其鬱毒杯水車薪決難濟事即以大黃芒硝等寒藥下之亦如以水沃石水去而石依然故必以巴豆之大辛大熱無堅不破無閉不開腐化一切有形之物由大便盪滌而下方能剿寇擒巨悉無遺類至於血竭之行瘀木香之理氣兒茶之化痰乳香沒藥芳香通絡定痛疏邪皆為巴豆之輔佐而各搜求其病本耳大黃牡丹湯金匱大黃牡丹湯金匱腸癰濕熱瘀為害芒硝瓜子與桃仁服下膿行邪自退大黃牡丹湯大黃四兩丹皮一兩桃仁五十枚冬瓜仁半升芒硝三合上以水六升先將四味煮取一升去滓內芒硝再煎沸頓服之有膿當下膿無膿當下血治腸癰無論已成未成但覺少腹腫痞按之即痛如淋小便自調時時發熱自汗出復惡寒其脈或遲緊或洪數足屈不伸者此湯皆可主之夫腸癰之病皆由濕熱瘀聚鬱結而成病既在內與外癰之治又自不同然腸中既結聚不散為腫為毒非用下法不能解散故以大黃之苦寒行血芒硝之鹹寒軟堅盪滌一切濕熱瘀結之毒推之而下桃仁入肝破血瓜子潤肺行痰丹皮清散血分之鬱熱以除不盡之餘氛耳葦莖湯金匱葦莖湯乃號千金瓜子桃仁薏苡仁瘀熱肺癰咳有濁甘寒清肅上焦靈葦莖湯葦莖二升苡仁半升桃仁五十粒瓜瓣半升上四味以水一斗先煮葦莖得五升去滓內諸藥煮取二升服一升再服當吐如膿治咳吐臭痰膿血胸中隱隱作痛煩滿甲錯此湯主之夫肺癰肺痿二證金匱論之甚詳大抵肺癰屬實肺痿屬虛故痿者萎也猶草木之萎而不振也癰者壅也猶土地之壅而不通也是以肺癰之證皆由痰血火邪互結肺中久而成膿所致桃仁甜瓜子皆潤降之品一則行其瘀一則化其濁葦莖退熱而清上苡仁除濕而下行方雖平淡其散結通瘀化痰除熱之力實無所遺以病在上焦不欲以重濁之藥重傷其下也經產之劑婦人之病與男子無異所異者惟經與產耳蓋女子至十四歲天癸至任脈通太衝脈盛月事以時下故能有子以沖為血海任主胞胎衝任交通血盈則下一如月之盈虧有信故又謂之月信但男子則上榮唇口下潤宗筋故鬚眉巾幗則又有異也然須知血者因氣而行血病則氣未有不病者如經先期而色紫者氣之熱經後期而色晦者氣之寒經前痛者氣之滯經後痛者氣之虛無不皆因氣而為病也至若胎前產後治法又是不同胎前氣血壅滯治宜疏暢如有他證或表裡之寒熱不齊或上下之食痰互發皆可對證用藥無須顧慮胎氣所謂有故無殞亦無殞也產後則氣血大虛除惡露不盡自當行散外其餘一切諸證皆當以顧虛為主治病之藥兼而行之與夫崩帶等證或因火邪充斥或系痰濕下流或虛而不固者有之或淫濁不潔者亦有之當各求其生病之源而治之茲集特採應用之方十餘首略述大概學者又宜考之專書以期得心應手耳固經丸良方固經丸治血崩方因熱經行紫黑張龜板樗皮香附芍黃芩黃柏酒丸良固經丸炙龜板四兩芍藥酒炒黃柏酒炒各二兩酒芩二兩制香附樗皮各五錢酒丸治經行不止及崩中漏下紫黑成塊等證而屬於火者夫崩中一證有因氣虛血不固而下陷者有因熱盛血為熱逼而妄行者有因損傷肝脾衝任之絡而血驟下者當各因所病而治之如此方之治火盛而崩者則以黃芩清上黃柏清下龜板之潛陽芍藥之斂陰樗皮之固脫用香附者以順其氣氣順則血亦順耳升陽舉經湯東垣升陽舉經湯梔芍補中益氣全方酌氣虛經陷漏頻頻薑棗煎之病能卻升陽舉經湯即補中益氣湯全方加白芍黑山梔薑棗煎服治崩漏身熱自汗短氣倦怠懶食等證此為中氣不固經血下陷之證也故以補中益氣全方取虛者補之下者舉之之義加以白芍入血斂陰庶有所收攝不致如江河之日下黑山梔亦能入血取紅見黑則止血得寒則不妄行之意雖治本而兼治標耳白芷散良方良方白芷散如神帶下諸般赤白淋胎髮煅焦瘀可去螵蛸須用海中尋白芷散白芷一兩海螵蛸兩個煨胎髮一錢煨為末酒調下二錢治赤白帶下不禁凡婦人帶下之疾固有五色之不同虛實之各異然總不離乎濕濁浸淫帶脈不固而來其虛者皆由中氣之虛而濕濁即乘其所虛之臟隨虛下陷治之之法即可仿升陽舉經之意加減出入如帶下而無虛寒等證即可於此方求之白芷獨入陽明芳香辛苦其溫燥之性為祛風逐濕之專藥以陽明為五臟六腑之海水穀之所藏濕濁之所聚故以為君女子以肝用事海螵蛸入肝經血分其性燥而兼澀可固可宣為帶下崩中之要藥故以為臣胎髮得血之餘氣益陰之中又有去瘀之力使瘀者去而新者生以復婦人之常道不特赤白帶下可痊而一切瘀濁亦可愈耳四制香附丸四制香附丸四物丹參芩艾砂仁末陳皮甘草共為丸理氣調經帶赤白四制香附丸香附四兩當歸三兩廣艾絨二兩白芍黃芩丹參各二兩生地四兩川芍一兩五錢甘草廣皮砂仁各一兩治婦人經水不調赤白帶下氣血凝滯腹痛經閉或氣塊血塊兩脅脹滿及嘔吐噁心胎前產後一切等證夫婦人之病首重調經經調則諸病易愈即胎前產後亦當觀其氣血之盛衰寒熱而調之調之之法固不同而總不外乎先理其氣使氣順則血調之意此方以丹參四物和血調經必假香附之善行氣分者為之先導故以為君然所以資生血氣者又在於脾若脾虛氣滯則經血亦為之不調故以甘草陳砂補脾疏滯於是觀其病之偏於寒者則用廣艾絨以溫之偏於熱者則用黃芩以清之是以醫不執方加減在乎人用耳調經益母丸調經益母是丸方經水難調痛莫當熟地歸芎香附子炮姜胡索共蒲黃調經益母丸熟地八兩歸身三兩香附二兩川芎延胡索各二兩蒲黃一兩炮姜五分治婦人血氣虛寒或經行前後凝滯作痛及產後因虛惡露不行等證凡人之血氣充盛者自可運行而不滯若因病而滯者自當行之破之病愈則止若虛寒之人則氣血無有不滯者耳故方中以熟地大補陰血為君而佐之以川芎活血理氣使之補而不滯香附延胡行其氣蒲黃去其瘀炮姜之溫以助藥力則虛者得補而滯者可行耳啟宮丸啟宮丸子治何因脂滿胞宮難妊娠夏曲術芎香附草橘紅神麯與雲苓啟宮丸川芎白朮半夏曲香附各一兩茯苓神麯各五錢橘紅甘草各一錢粥丸治子宮脂滿不能孕育夫婦人經調而有子者事之常也若經候不調亦難成孕自當察其寒熱虛實因其病而調之至有肥盛之人絕無他病經水常調不能孕育者皆由脂滿子宮胞門壅塞之故方中以二陳除其濕化其痰神麯消其滯香附理其氣川芎行其血白朮苓草補脾以資其運化粥丸藉穀味以助生氣耳當歸散金匱當歸散治婦人娠白芍川芎術與芩為末酒調送服下安胎清熱效如神當歸散當歸川芎芍藥黃芩各一斤白朮半斤為末酒調服二錢日二服治妊娠之後宜常服之凡婦人懷妊以來固皆賴血為之養而所慮者火所重者又在於脾以土厚則自能載物火清則胎無妄動之虞故先哲皆以黃芩白朮為安胎之聖藥亦以白朮補脾黃芩清火之意今以二物之中加入歸芎之養血行氣芍藥之益陰斂營安脾御木宜乎婦人妊娠可常服者也宮中十二味宮中十二是神方臨產投之易若羊歸芍耆芎樸艾枳菟絲姜草貝荊羌宮中十二味炙黃耆川芎當歸身白芍藥菟絲子荊芥厚朴用薑汁炒羌活川貝母炒枳殼廣艾甘草加生薑水煎服治胎至七八九月每月服二三劑產時再服三四劑即易於分娩夫婦人懷妊之後固當血足氣固以為充養然至七八九月尤宜氣血流利表裡無滯上下宣通無一毫之壅閉方可臨盆易產方中黃耆甘草補中氣以達於衛歸芎白芍養陰血以和其營菟絲廣艾益肝腎以溫其下以血氣者喜溫而惡寒得溫則流行而無滯也荊芥羌活以宣表氣厚朴枳殼以疏裡氣貝母快胸膈之氣以化其痰生薑去穢惡之氣以通於神明耳脫花煎景岳臨盆將產脫花煎難產催生胞內連肉桂紅花歸重用川芎牛膝與車前脫花煎當歸五錢肉桂一錢川芎一錢牛膝二錢車前子二錢紅花一錢治臨盆將產服此催生最佳並治胞衣不下以及死胎不下等證此為妊娠稟氣素充血分有寒滯而不得通泰者設也故以當歸川芎紅花活血行氣再以肉桂之辛熱從血分可以散其積寒可以助其流動牛膝車前引之以下行能飲酒者服藥後飲酒數杯以助藥勢方後另有加減法如因氣虛者仍加人參血虛者仍加熟地活法在乎運化耳生化湯竹林產後偏宜生化湯腹留惡露痛難當炮姜歸草芎桃等童便還須和水當生化湯當歸身六錢川芎四錢炮姜五分桃仁五分炙甘草五分治產後惡露不行腹中疼痛等證夫產後血氣大虛固當培補然有敗血不去則新血亦無由而生故見腹中疼痛等證又不可不以去瘀為首務也方中當歸養血甘草補中川芎理血中之氣桃仁行血中之瘀炮姜色黑入營助歸草以生新佐芎桃而化舊生化之妙神乎其神用童便者可以益陰除熱引敗血下行故道耳參朮膏丹溪胞損丹溪參朮膏黃耆炙草茯陳桃收生不謹成淋瀝引用豬羊膀胱胞丹溪參朮膏人參二錢半白朮二錢黃耆一錢半茯苓陳皮桃仁各一錢炙甘草五分用豬羊胞各一枚煮湯入藥煎服治產後胞損成淋瀝證此證皆因收生不謹妄為動手以致損破膀胱所致昔丹溪治一婦患此因思肌肉破損在外者補之尚可長全胞雖在內想補之亦可完固因制此湯服一月後氣血驟充而愈方中參耆朮草大補元氣而生陰血然產後不無瘀濁垢滯之物故以陳皮行氣茯苓降濁桃仁去瘀豬羊胞假血肉有情之品以補其所損之處耳清魂散嚴氏清魂散用澤蘭參荊芥芎甘溫酒勻產後血虛風內襲忽然昏暈不知人清魂散澤蘭人參各三分川芎五分荊芥一錢炙甘草三分為末溫酒調下治產後惡露已盡因虛感風忽然昏暈不知人事凡產後惡露已盡氣血大虛偶一不慎即感風邪風氣通於肝肝為風臟內外相召即如類中之狀內閉外脫等證所由來也荊芥芳香辛苦獨走肝經血分搜散風邪故以為君病既因虛而來故仍以人參甘草之補正雖虛而得之產後不免血氣或有留滯故以澤蘭之去瘀行水川芎之活血理氣調以溫酒者助其解散之功耳加味芎歸湯加味芎歸開骨散血餘龜板共相贊臨盆交骨不能開服下安然產無難加味芎歸湯當歸一兩川芎七錢龜板手大一片醋炙研末頭髮取生育過婦人發雞子大一團煅存性治胎產五六日不下或初生女子交骨不開以及死胎不下等證當歸川芎二味古方謂之佛手散統治胎前產後一切諸證以及安生胎落死胎其功甚大蓋以二物於養血之中寓理氣之力其辛香之氣可散可宣溫潤之功能和能補胎產一證皆賴此氣血氣血一理故即能逆者順而病者愈矣炙龜板取其得至陰之氣而有解脫之功血餘則行水消瘀且能補益陰血還原神化耳小兒之劑小兒之證向有專科以其痘證驚風疳積等類為大人所無然痘之一證古人本無種痘之法其出也亦無分大人小兒故治法亦大小一例而論直至種痘之法行僅種之於小兒於是才為幼科專任至於疳積一證究亦與大人一理而治不過以小兒形體未充臟氣未足難於運化易於成積因積久不化肌膚乾槁腹大筋凸乃為之疳其實亦有虛實寒熱多寡輕重之分即大人之身體羸弱或因病致虛因虛成積者亦多有之不得妄立疳積之名獨歸之於小兒也所謂驚風者名目尤覺不通蓋因小兒元氣怯弱不勝外感六淫之邪一有所傷最易成痙或病久致虛亦易成痙當須辨其邪自何來虛從何起按證用藥自無不效豈可渾以急驚慢驚稱之哉然小兒治所難者因其不能言語不知病情其脈象又全無憑據不特三部九候之不能朗晰即喜笑啼哭脈亦為之變遷故醫者只得察其面色之浮沉音聲之壯弱問其二便按其胸腹與夫舌苔之黃白口氣之清濁合而得之其表裡寒熱虛實自可瞭然無誤由此觀之治大人小兒之法實一理也茲集特採世之所尚者數方以廣初學者之眼界至其中之是非曲直明眼者自能辨之啟脾散啟脾散法妙無窮參朮陳砂五穀蟲查炭建蓮共作粉兒童常服病消融啟脾散潞黨參元米炒黃去米制冬朮建蓮肉各三兩查炭五穀蟲炭各二兩陳皮砂仁各一兩共為末每服二錢開水下治小兒因病致虛食少形羸將成疳積等證或稟賦素虧脾胃薄弱最易生病者皆宜服之凡小兒之離母胎也皆謂之後天莫不藉穀食以為長養因先天之稟賦不足者難於接補後天之氣血虧弱者易於滋培故古人每有假後天以濟先天之法不特脾胃為後天之源抑且土為萬物之母土旺則四臟皆旺正自充而病自除耳方中黨參蓮肉冬朮大補脾元陳皮砂仁助其健運而以查炭谷蟲消磨不盡之滯兼廣補藥之功真立方之妙耳八珍糕健脾啟胃八珍糕白朮苓蓮臘米焦藥芡甘陳俱焙炒洋糖和作送兒曹八珍糕白朮白茯苓懷山藥蓮肉芡實以上皆放飯上蒸透曬乾微炒陳皮三兩焙甘草三兩焙臘米炒三升共為末加洋糖作糕食之治小兒脾胃虛弱食少便溏但覺形體羸瘦不能勝苦劣之藥者夫藥之治病也皆以偏治偏故藥能治病不能養人食能養人不能治病是以一切病之久而不愈者皆當調之以甘藥以食物之適於口者即脾胃之所補土旺則自能生物生生之氣自可源源而來以上諸品皆系純甘之味而無雜劣之性陳皮以行其滯氣米穀以致其沖和作而為糕香甘可口雖為食料之需實亦治病之一法也蘆薈肥兒丸蘆薈肥兒查曲陳二連二術樸砂仁稜莪穀麥銀柴草枳木苓檳蟾薄君一切諸般濕熱證疳蟲食積盡皆平蘆薈肥兒丸蒼朮白朮胡黃連陳皮厚朴麥芽乳炒穀芽使君子肉各二兩砂仁山稜甘草蘆薈莪朮枳殼檳榔各一兩神麯銀柴胡茯苓山查川連各一兩五錢木香四兩乾蟾五隻薄荷葉煎水泛丸治小兒骨蒸發熱面黃肌瘦肚腹膨脹積聚作痛五疳目翳證皆由濕熱疳蟲積聚所致當急去其邪凡所以去積盪滌濕熱者必先理氣氣順則邪自不留故方中以木香為君砂仁陳皮厚朴枳殼檳榔均佐之以行氣者也蒼朮燥其濕黃連清其熱銀柴胡胡黃連為治疳熱之方使君子乃殺疳蟲之劑山稜莪朮之峻攻查曲二芽之消導乾蟾茯苓之導水蘆薈之潤下皆所以開下行之路也然治病之法去邪必當顧正否則恐邪去而正亦傷故以白朮甘草固脾之元氣用薄荷葉煎水泛丸者取辛香之氣清上透表快膈宣中使各病隨藥力以施行之意至肥兒丸方種種甚多大抵不出此意然總非有益之物勿喜其名而忘其害也錢氏牛黃丸錢氏牛黃丸最良膽星全蠍麝臍香防風蟬退天麻棗白附殭蠶汞和嘗凡屬急驚癇閉證風痰迷悶細參詳錢氏牛黃丸膽星全蠍去足焙蟬退各二錢半牛黃白附子殭蠶洗焙防風天麻各一錢半麝香五分煮棗肉和水銀五分細研入藥末為丸荊芥湯下治風癇迷悶痰涎抽掣將成閉證此即大人所謂中風小兒所謂急驚也考其受病之由故治法亦無稍異大抵中之一證先須辨其內閉外脫兩途如見脫證急當溫補猶小兒之慢驚若閉證則又宜豁痰開竅搜風為首務矣病因於風故以全蠍蟬退白附殭蠶防風天麻等大隊搜風之藥為君而以麝香之香以開其閉牛黃之寶以通其靈水銀鎮墜痰涎為峻猛之劑然恐其陰寒攻劫之性直前無往故以大棗監之其他如抱龍丸回春丹一切治驚之藥無非芳香鎮墜之品皆誤會驚字之名義耳逐寒蕩驚湯福幼編逐寒蕩驚湯福幼慢驚臨死還能救胡椒薑桂與丁香每用一錢勿為過灶內龍肝三兩來煎湯共煮相和就寒痰頃刻即能開陰去陽生天保佑逐寒蕩驚湯胡椒一錢炮姜一錢肉桂一錢公丁香十粒上四味研末以灶心土三兩煮水澄極清煎藥大半茶杯頻灌之專冶小兒氣體本虛或久病不愈或痘疹後或誤服寒涼泄瀉嘔吐久則轉成慢驚醫者亂用清熱鎮驚豁痰開竅之藥愈治愈劇以致痰聲漉漉口噤不開氣息奄奄危如朝露急以此方投之自能開寒痰寬胸膈止嘔吐蕩驚邪待其元氣稍回穩睡片刻再服大劑溫補其效立見夫慢驚一證無不皆因久虛而來小兒為稚陽之體元氣未充虛則生寒以致生氣日索陰氣日甚斯時也若僅以區區溫補之劑緩不濟事故以炮薑肉桂丁香等破陰回陽以復下焦之生氣但寒痰之在上膈者格拒湯藥嘔不能下故以胡椒之大辛大熱者衝開寒痰而以伏龍肝散逆和中自不致嘔而不內藥力直行中下以建大功此證此法不特耳聞目見即親手治驗者皆效如應響學者識之保嬰出痘方福幼編保嬰出痘有良方福幼編中宜審詳芥穗銀花生地草桃紅歸芍共煎湯更須原落臍中帶炙研湯調服下良次日便能標點見此身可保永無殃保嬰出痘方生地當歸赤芍各二錢金銀花紅花桃仁荊芥穗各一錢生甘草五分上藥八味秤足用水二茶杯煎至一杯再用小兒本人落下臍帶二三寸炭火瓦上焙乾研末入藥盡日內陸續與小兒服完次日即出痘點三日收功不灌膿亦不結痂須在小兒初生十八日內服之有效過十八日外則不驗矣夫痘瘡之發悉由胎毒故為人之所難免然昔之出痘皆因時邪感召而起所出者每多重險厥後種痘之法行於是可擇小兒無病之時種之以痘苗相引而出乃保全者多可謂奪天地之化工矣考痘之所以出所以痂始終皆賴營血為之主持若血不虛不滯則自然順而且吉故方中生地歸芍益其虛桃仁紅花行其滯銀花甘草解其毒而以荊芥穗從營透表以達之於外然無所引之物則深藏之胎毒何由領出故特用本人落下之臍帶同氣相求以為導引且臍帶為生命之蒂元氣所繫其陰陽未剖之前先具此物靈通呼吸混合太虛較痘苗尤為功大耳柴歸飲景岳柴歸飲治痘瘡初達表松肌血自和芥穗更兼炙草芍臨時加減在人由柴歸飲當歸二錢芍藥一錢半柴胡一錢荊芥穗一錢炙甘草七分或加生薑血熱者加生地血虛者加熟地氣虛者加人參寒加姜熱加黃芩治痘瘡初起發熱未退無論是痘是邪疑似之間均宜用此平和養營之劑以為先著有毒者可托有邪者可散實者不致助邪虛者不致損氣大凡痘瘡標點之時皆宜氣血流暢若無表裡虛實寒熱等證但宜營血充足使之順行無滯助其達表而已故方中以當歸和營益血可導可宣而以柴胡荊芥領之出表然其解散之性與夫痘瘡之出沒誠恐擾亂營陰故特用白芍以護之炙甘草取其鎮守中州專資解毒庶邪盡化而正不傷耳涼血養營煎景岳新方涼血養營煎血熱陰虧痘不堅生地芩甘歸芍骨紅花紫草立方賢涼血養營煎生地當歸白芍生甘草地骨皮紫草黃芩紅花水一鍾半煎服分量量兒大小加減用之治痘瘡血虛血熱口渴便燥以致痘形色紅而薄或枯暗不起等證此因小兒素稟陰虛有火適逢出痘於是毒火相煽變證疊起故無論見點至結痂日期之遠近凡見以上等證者皆可用之方中取四物之益陰養血去川芎之香竄慮其辛散助火加黃芩地骨以清陰分之熱紅花紫草以行血分之瘀蓋痘必由營分而出若血中有火與痘毒相搏亦必為之瘀結也生甘草解毒和中且可緩寒藥之性耳搜毒煎景岳搜毒煎為痘熱方火邪壅盛痘難張翹通芩芍蒡蟬退地骨尤宜紫草良搜毒煎紫草地骨皮牛蒡子黃芩木通連翹蟬退白芍各等分水一鍾半煎服治痘瘡熱毒熾盛紫黑乾枯煩熱便結等證此證因出痘之時適逢六淫火邪外來襲留營分以致營熱沸騰與痘毒互相搏結故見以上諸證又非陰虛內熱者可比一切滋陰之品似不宜施當直清其邪熱使之達表松肌則可矣黃芩地骨為清熱邪之主藥然熱鬱於外者內必不通故以木通之通利下達州都使內通而外邪易達紫草連翹走營分以解其熱結牛蒡蟬退達肌表以疏其鬱邪白芍護營陰欲其邪解而正不傷賴以為安撫耳六氣煎景岳六氣煎醫痘證寒陽虛倒陷癢難安參耆朮草當歸桂加減隨人若轉丸六氣煎炙黃耆二錢人參一錢白朮二錢當歸二錢炙甘草五分肉桂五分治痘瘡陽氣虛寒不能起發以致癢塌倒陷等證夫痘瘡之出沒始終皆在乎血而能使血之所以行動所以敷布者又在乎氣若陽氣虛寒之人又逢時令之寒或誤用寒涼不特見點時㿠白不齊即起漿亦多虛殼清稀不能充足如何尚能載毒外出其不致於癢塌倒陷者鮮矣黃耆益衛氣人參補肺氣白朮助脾氣甘草解毒氣當歸養血氣肉桂從下焦溫養元氣自然氣載血行血載毒出陷者起而癢者平宜乎有六氣之意歟太乙保和湯金鏡錄催漿太乙保和湯解毒松肌內助漿參草地紅楂桔米川芎紫草木通姜太乙保和湯人參甘草生地紅花楂炭桔梗川芎紫草木通生薑粳米治痘瘡見點之後因氣虛血滯不能成漿之證大抵痘瘡一證始終皆以半月為期如發熱三日布點三日成漿三日回痂三日落痂三日或不能應期而變幻者當各求其所由而治之如此證之至成漿之時而不能成漿倘無表裡寒熱等證其氣虛血滯可知方中人參甘草大補元氣生地滋養陰血川芎行血中之氣紅花楂炭紫草宣血中之瘀然既鬱滯於外者其內必有伏陽故以木通之苦寒清上達下里和而表自松也凡痘毒之發皆由腎臟而起以痘毒藏於腎中自腎而肝而脾而心以及於肺由里達表移深居淺以收全功故以桔梗領之入肺生薑助其達表且生薑入於人參地黃之中不特無橫散之劣且有助漿之優粳米和中培穀氣以資其運用耳痘後落痂諸方痘證緣何不落痂皆因脾肺熱邪遮益元甘露五皮等審察休教氣血乖治痘之法本有專書自發熱見點灌膿結痂落痂總以三五十五日為期若依期無變端者皆為順證如不應朝數種種逆證亦不過於虛實寒熱毒盛毒輕之間而辨之即如落痂一端當於十四五朝漸次依期脫盡為順若過期黏滯不脫即當審其所以不脫之由或因氣血虛弱不能充足於外或因肺脾餘熱留滯於皮毛肌肉之間或六淫之外加或七情之內起皆能黏滯不脫醫者當審其致病之由於望聞問切四者之間悉心推究胸中自有成竹固不得以脾肺熱邪為定論亦不得以益元甘露之法為定法也由此觀之不特落痂如此即自發熱以至灌膿所有不應朝數種種逆證無不皆由於此也但天花盛行之時自出之痘皆由時邪感觸而起時邪為天地疫癘之氣故出痘者皆有疫邪夾雜於痘毒之間是以所出之痘多逆少順且當察其時邪之為寒疫溫疫須知人身之毒皆隨感而化不可拘定前人痘宜溫疹宜涼之一說假令為冬月寒疫所觸者用溫法適時逢夏令君火炎蒸之氣與身中之毒氣煎熬焦灼不戢自焚則羚羊犀角又當必用也以二物皆甘寒解毒有輕靈透發之功無苦寒遏伏之患故無論治痘治疫悉宜法之豈可與黃柏黃連等味同日語哉
