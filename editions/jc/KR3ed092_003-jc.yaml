body:
  text: 卷三清暑之劑暑者夏令君火炎蒸之氣也清者清涼之使元氣不受熱逼而耗散也當此之時日行南陸地氣上升人在氣交之中其蒸騰之氣高於岑樓不可見也暑既為君火之氣內通於心故暑必先傷於心金畏火刑而後及於肺肺主氣故又暑必傷氣也然暑必挾濕者以地之濕隨氣而升惟人之虛者受之是以前人有清心利小便為治暑兩大法門若人之元氣虛而感受者則又必參以生脈散人參白虎以及東垣清暑益氣等法隨時加減治之昔人有陰暑陽暑之分或因暑而外受寒邪內傷生冷此所謂靜而得之者陰暑也或暴日長途躬耕南畝為熱邪所中此所謂動而得之者陽暑也一有此說後人皆謂暑證有陰有陽竟無的一不知暑為君火有熱無寒止有傷暑中暑之分其因暑受寒一證仍歸寒邪論治不得以陰暑亂之也如夏月靜而得之者可為陰暑則冬月感寒在動而得之者可名陽寒乎然習俗相承其來有久一時斷難改易且有各方今人所常用者故不得不備載一二使學者有所遵循方後各有詳註當前後參觀自能胸有成竹臨證不難耳香薷飲四物香薷飲五物香薷飲二香散三物香薷扁樸先若云熱盛入黃連或增苓草名五物清暑和脾兩法兼再合香蘇煎配服二香名號出先賢內傷外感均堪治加減臨時無執偏三物香薷飲香薷一兩厚朴薑汁炒扁豆炒各五錢治夏月傷暑感冒嘔逆泄瀉等證此因傷暑而兼感外寒之證也夫暑必挾濕而濕必歸土乘胃則嘔乘脾則瀉是以夏月因暑感寒每多嘔泄之證以濕盛於內脾胃皆困也此方以香薷之辛溫香散能入脾肺氣分發越陽氣以解外感之邪厚朴苦溫寬中散滿以祛脾胃之濕扁豆和脾利水寓匡正御邪之意耳本方加黃連薑汁炒三錢名四物香薷飲治暑熱上盛口渴心煩或見吐血下血等證以暑必傷心心熱熾盛則必傷肺且心主血熱則逼血妄行故見以上諸證不得不用黃連苦寒入心以直折之本方去黃連加茯苓甘草名五物香薷飲治前證中虛濕盛者故以甘草助扁豆而補中茯苓協厚朴而祛濕本方用香薷厚朴扁豆甘草香附陳皮紫蘇名二香散治外感內傷身熱腹脹等證但此之外感不過風寒此之內傷亦不離濕濁故加香附陳皮以理氣燥濕紫蘇甘草以溫中散寒此四味即為香蘇散或用木瓜者惟恐濕熱不攘有傷筋脈耳清暑益氣湯東垣清暑益氣參耆麥青陳二術澤神麯味甘升葛與當歸黃柏還同薑棗服清暑益氣湯黃耆人參白朮土炒蒼朮神麯青皮麩炒陳皮留白炙甘草麥冬五味子當歸酒洗黃柏酒炒澤瀉升麻葛根薑棗煎治長夏濕熱炎蒸四肢困倦精神衰少胸滿氣促身熱心煩口渴自汗身重肢體疼痛小便赤澀大便溏黃而脈虛者夫長夏炎熱之際濕氣蒸騰人在氣交之中受此熏灼其元氣壯盛者原可無病衰弱者即不能支持為病百出矣其病也皆邪少虛多濕熱交攻之象熱傷氣肺受火刑故以參耆甘草培土以保肺氣麥冬五味得人參生脈以保肺陰濕盛於中故以二術燥濕安中濕盛則氣滯故以二皮理之脾虛濕阻則清濁相干故以升麻葛根升其清黃柏澤瀉降其濁脾主運化病則失其運化之權故以神麯化之脾為統血之臟病則血無所統故以當歸使血各歸其經庶不為暑熱所逼而妄行用薑棗者因病關表裡以之和營衛致津液也方名清暑而不用清暑之藥者以暑為無形之邪必據有形之濕以為依附故去濕即所以清暑也生脈散千金千金生脈散神奇麥味人參三物齊暑熱內傷元氣短肺虛喘咳卻能醫生脈散人參麥冬各五分五味子十一粒炒治熱傷元氣氣短倦怠口渴多汗肺虛而咳等證夫肺主一身之氣為百脈所朝宗肺氣旺則臟腑之氣皆旺精自生而形自盛脈自不絕矣一受暑熱之氣金受火刑肺氣被灼則以上諸證疊出矣然暑為夏月之正邪人之元氣充實者原可不病故邪之所湊其氣必虛方中但以人參保肺氣麥冬保肺陰五味以斂其耗散不治暑而單治其正以暑為無形之邪若暑中無濕則不致留戀之患畢竟又無大熱則清之亦無可清故保肺一法即所以卻暑耳此又治邪少虛多熱傷元氣之一法也在夏月肺虛者可以服之六一散河間益元散雞蘇散碧玉散清六散溫六散六一滑石同甘草解肌行水兼清燥益元碧玉與雞蘇砂黛薄荷加之好紅曲更添清六名熱傷血分痢難了若云溫六和乾薑白痢頻仍治須早六一散滑石六兩甘草一兩為末燈心湯下治傷暑感冒表裡俱熱煩躁口渴小便不通一切瀉痢淋濁等證屬於熱者此解肌行水而為卻暑之劑也滑石氣清能解肌質重能清降寒能勝熱滑能通竅淡能利水加甘草者和其中以緩滑石之寒滑庶滑石之功得以徹表徹里使邪去而正不傷故能治如上諸證耳本方加辰砂少許名益元散以鎮心神而瀉丙丁之邪熱蓋暑為君火之氣物從其類也河間曰此方能統治上下表裡三焦濕熱然必暑而挾濕者用之為宜若津液虧而無濕者又當以生脈散之類參用之本方加薄荷少許名雞蘇散治前證兼肺部風熱者本方加青黛少許名碧玉散治前證而兼有肝火者本方加紅曲五錢名清六散治暑傷營而為赤痢者本方加乾薑五錢名溫六散治暑濕傷於氣分而成白痢者神而明之存乎其人總貴於臨病制宜耳白虎湯仲景人參白虎湯蒼朮白虎湯桂枝白虎湯白虎湯中生石膏知甘粳米四般調金風退暑除炎熱加入人參法更高蒼朮取增前藥內濕溫脈細本兼標桂枝白虎相和服溫瘧難痊法實超白虎湯石膏一斤知母六兩甘草二兩粳米六合治肺胃大熱津液被灼口渴煩躁脈洪大不惡寒反惡熱頭痛自汗鼻乾不得臥等證此足陽明手太陰藥也熱淫於內治以甘寒凡暑熱炎蒸之氣無不有傷於肺肺傷必求救於胃於是胃汁被耗則燎原之火不戢自焚故見如上等證方中用石膏以清胃知母以清肺且二味互為其功既可退熱又可存陰更恐知母之苦降石膏之寒重有傷於中特加甘草粳米養胃安脾使熱除而正氣無傷耳本方加人參三兩名人參白虎湯治前證肺胃陰津被焚而元氣亦虛者故加人參保護肺胃之元氣此治暑熱傷氣之正法也本方加蒼朮名蒼朮白虎湯治濕溫病脈沉細者濕溫證必預有濕邪內伏復感外來之溫氣而成故外雖發熱脈則沉細或胸中痞悶或兩脛自冷皆由濕為陰邪沉著黏膩故加蒼朮燥濕強脾發越鬱伏之氣然後以白虎清其溫邪一舉而兩得耳本方加桂枝名桂枝白虎湯治溫瘧熱多寒少或但熱無寒表裡不解者夫夏暑秋風感而成瘧故瘧之一證皆有伏暑復感外邪兩相搏激而致溫瘧者先有伏暑又感風溫之氣故與常瘧稍異是以用桂枝以解外感之風邪白虎以清內伏之暑熱表裡兩解寒熱自止然必內之伏邪化熱熱盛者方可用之新加香薷飲鞠通鞠通新加香薷飲銀翹厚朴共相等再入新鮮扁豆花暑客肺經風邪並新加香薷飲香薷二錢銀花三錢鮮扁豆花三錢厚朴二錢連翹二錢治暑風外感發熱無汗夫夏月暑熱炎蒸人在氣交之中似乎得風則爽何得有暑風之證然風有虛邪賊風從克賊之方來者皆能致病故感之者即見發熱無汗之表證香薷辛溫芳香能由肺之經而達其絡以解外感之風邪鮮扁豆花產於夏月凡夏月所生之物均能解暑又凡花皆散且輕清入肺又能保液存陰連翹銀花辛涼解散以清上焦之暑熱厚朴辛溫苦降能散能宣燥濕而除滿以暑必兼濕故治暑方中每加厚朴相須佐使用其廓清胸中之濕使暑熱自離而易解耳決無治上犯中治熱用溫之害也清營湯鞠通清營湯是鞠通方暑入心胞營血傷犀角丹元連地麥銀翹竹葉捲心藏清營湯犀角三錢生地五錢元參三錢竹葉心一錢麥冬三錢丹參二錢黃連二錢半銀花三錢連翹二錢治暑溫內入心胞煩渴舌赤身熱讝語等證夫暑為君火其氣通心故暑必傷心然心為君主義不受邪所受者皆胞絡代之但心藏神邪擾則神不寧故讝語心主血熱傷血分故舌赤金受火刑故煩渴暑為六淫之正邪溫乃時令之乖氣兩邪相合發為暑溫與春溫秋溫等證大抵相類不過暑邪最易傷心方中犀角黃連皆入心而清火犀角有輕靈之性能解夫疫毒黃連具苦降之質可燥乎濕邪二味為治溫之正藥熱犯心胞營陰受灼故以生地元參滋腎水麥冬養肺金而以丹參領之入心皆得遂其增液救焚之助連翹銀花竹葉三味皆能內徹於心外通於表辛涼輕解自可神安熱退邪自不留耳六合定中丸局方局方六合定中丸暑濕傷中食滯干枳桔芩甘查樸扁穀芽神麯木瓜全六合定中丸枳殼桔梗茯苓甘草查炭厚朴扁豆穀芽神麯炒木瓜治暑濕傷中食滯交阻而為霍亂等證夫夏月霍亂一證皆由脾胃受邪乘胃則吐乘脾則瀉若兩傷脾胃則吐瀉交作然霍亂一證雖寒熱均有而傷濕傷食尤多故治病總不可執一當合脈證用藥方無舛誤但此證最易轉筋如轉筋在霍亂之先者邪乘筋脈所致在吐瀉之後而見者津枯液涸筋脈失養而然方中谷芽神麯查炭消磨食積厚朴茯苓除濕宣邪桔梗開提肺氣表散外邪枳殼破氣行痰宣中導滯扁豆解暑和脾甘草和中化毒木瓜舒筋達絡無論在前在後皆可用之所謂筋急者得之即舒筋緩者遇之即利耳竹葉石膏湯仲景先師竹葉石膏湯嘔吐虛煩元氣傷參半麥冬甘草等生薑粳米水煎嘗竹葉石膏湯竹葉石膏人參麥冬炙甘草半夏粳米加姜煎治病後餘熱留中虛煩少氣上逆欲吐亦治傷暑發渴脈虛等證夫熱病之後餘邪尚未肅清肺胃陰津早為枯槁故見虛煩少氣嘔吐等證即夏月暑傷肺胃元氣虛者亦有之故方中以竹葉石膏清肺胃之熱然熱則生痰恐留戀於中痰不去熱終不除故以半夏辛溫體滑之品化痰逐濕而通陰陽且其性善散逆氣故又為止嘔之聖藥況生薑之辛散以助半夏之不及一散一清邪自不能留戀人參甘草梗米以養胃麥冬以保肺此方雖云清熱而卻不用苦寒雖養陰又仍能益氣不傷中和之意耳桂苓甘露飲河間桂苓甘露飲河間暑濕傷中煩渴連滑石石膏寒水石五苓甘草一方煎桂苓甘露飲滑石四兩石膏寒水石甘草各二兩白朮茯苓澤瀉各一兩豬苓肉桂各五錢和研為末每服五錢治中暑受濕引飲過多頭痛煩渴濕熱便閉等證夫暑濕一證有傷於表者有傷於裡者在表者邪留經絡當因其輕而揚之在裡者邪留臟腑非用重劑清熱利濕終歸無濟石膏寒水石大寒質重直清肺胃之熱滑石寒能清熱滑能利竅外開肌表內達州都豬苓茯苓澤瀉導濕於下從小便而出然濕為陰邪無陽則不能化雖利濕而濕亦不能盡除故用肉桂之辛熱以散陰邪加白朮扶土和中安內攘外此方用三石以清上焦五苓以利下焦甘草以和上下亦治暑之大法耳漿水散古方漿水散名稀因暑中寒痛瀉宜甘草良薑醋半夏乾薑附桂並能醫漿水散乾薑附子肉桂甘草各五錢良薑半夏各二錢五分二味皆用醋炒地漿水煎去滓冷服治暑月中寒腹痛泄瀉汗多脈弱純陰無陽之證夫六淫之氣皆隨感而病不必拘定時令如冬月非節之暖感之者即為溫病夏月違時之寒犯之者即為寒病治溫以清治寒以熱勿得再以陰暑陽寒而惑之也凡寒邪中人必犯太陰少陰兩臟以脾腎之陽不虛寒邪決不能深入若脾腎陽氣虛則寒邪直入於是痛瀉諸證所由來矣乾薑附子肉桂大辛大熱以溫脾腎之元陽以驅中下之寒濕良薑散寒止痛半夏燥濕行痰二味俱用醋炒者所謂凡欲散之必先斂之一如征剿寇盜當使之斂聚一方然後一攻而盡不留余患用甘草者一以緩熱藥之急一則固中州之虛也薷苓湯薷苓湯法最詳明四味香薷合五苓暑濕兩傷泄瀉作清心利便表邪輕薷苓湯即四味香薷飲合五苓散為一方煎服治暑濕兩傷泄瀉等證夫暑為無形之氣感則僅傷上焦心肺之分惟濕為有形之邪傷則必及乎脾胃而為泄瀉等證矣濕多成瀉古訓昭然然暑必兼濕暑濕相合故夏月水瀉之證尤多古人云治濕不利小便非其治也是以清心利小便為治暑兩大法門四味香薷飲是香薷厚朴扁豆黃連四味清心解暑方論已見於前五苓散是白朮茯苓豬苓澤瀉肉桂崇土勝濕化氣利水與後文濕門可以合看自能悟其深意耳來復丹來復丹為霍亂方陰陽錯雜暑邪傷五靈硝石元精石硫與青陳醋糊良來復丹元精石倭硫黃朴硝各一兩一方用火硝五靈脂青皮陳皮各一兩硝黃二味用微火同炒柳條攪結成砂子醋糊丸米飲下治伏暑陰陽乖隔中脘不通而為霍亂等證夫陰陽乖隔清濁相干以致中脘不通而為霍亂者必用分利陰陽之品而兩治之硫黃大熱之物火之精也朴硝大寒之物水之精也二物各稟陰陽之偏勝皆能通利大腸以之同炒而治陰陽互結之邪頗為得當然病因伏暑而起暑乃君火之氣最易傷陰故以元精石稟太陰之精者復其陰而退其暑但暑必兼濕故用青皮陳皮疏其氣而燥其濕如五靈脂者以其濁陰之物能引吾身中濁陰之物同歸下竅以類相從也用火硝者亦各有理故藥店皆用之利濕之劑濕者六淫之一中央脾土所生從地氣上升由天氣下降盛於夏藏於冬聚於東南斂於西北但土無成位濕無專主故或從外得或從內生或上受或下受其受病雖不同而大要不過化熱化寒兩途無論其表裡上下知其為寒濕者溫之燥之知其為濕熱者清之利之從化而來當從化而去也然病有初中末之分其病之始若在上在表均可以風藥治之在裡在下者或崇土以勝之或滲利以導之所謂中者即化熱化寒之異若病至於末傳則有濕熱傷陰寒濕傷陽之別濕熱傷陰者宜補陰以利其濕寒濕傷陽者當助陽以化其邪神而明之變而通之庶信手拈來頭頭是道矣今將通用各方略備於後以為初學者之應用可也五苓散仲景胃苓湯茵陳五苓散五苓散治太陽邪利水分消表未諧澤術二苓都內導桂枝達外法頗佳胃苓即此加平胃濕瀉傷中邪氣乖若治黃疸濕熱蘊茵陳加入五苓齊五苓散豬苓茯苓白朮炒各十八銖澤瀉一兩六銖桂半兩用肉用枝隨證去取共為末每服三錢服後多飲熱水汗出愈治傷寒太陽證表不解邪入於腑熱結膀胱小便不通以及諸濕腫滿盛於下焦或趨於下則為泄瀉或逆於上則為嘔咳等證然太陽有經有腑經者即為表證可汗之而愈若傳入於腑腑者膀胱也膀胱為水腑熱則水結不行少腹滿小便不利由是內外之濕悉皆趨附下行極而上者有之故用二苓澤瀉直入膀胱瀉其熱結之水邪表既未除故用桂枝以解不盡之表濕盛則土衰故用白朮崇土以勝其濕使脾土有健運之功表裡兩解正氣不傷耳如濕邪在裡外無表證者則用肉桂假其大辛大熱以入下焦化其陰濕開之導之隨苓澤滲利自無留滯也胃苓湯本方加蒼朮厚朴陳皮甘草治濕邪內傷胸痞腹滿以及傷暑泄瀉等證故以平胃宣散上中之濕五苓分利下焦之邪凡泄瀉則水穀併入大腸其小便必少今分利其水歸於前陰自然小便多而泄瀉止矣茵陳五苓散本方加茵陳一味和服治濕鬱於裡不得宣化發為黃疸者茵陳草類性味苦寒能內蠲水濕助苓澤以分消外達皮膚協桂枝而解表故為治黃疸病之方法耳豬苓湯仲景獵苓湯法在陽明滑石阿膠澤二苓膀胱腑邪初入胃宣通達下又存陰豬苓湯豬苓茯苓澤瀉滑石阿膠各一兩治太陽病裡熱不解熱傳陽明渴欲飲水小便不利恐津液內亡轉成胃實之證以及濕熱傷陰須補陰利濕並用為治者夫太陽陽明其位最近且論傳變之次第亦皆太陽傳入陽明陽明者胃也胃者土也萬物所歸無所復傳但陽明一經最慮者亡津液津液一傷即成胃實不大便之證故仲景治陽明處處以存陰救陰為務如此之證熱在膀胱久而不解則熱傷津液於是渴欲飲水傳胃之象已形而小便仍不利膀胱之邪依然不化若不先治其本則熱勢終不得除故以二苓澤瀉分消膀胱之水使熱勢下趨滑石甘寒內清六腑之熱外徹肌表之邪通行上下表裡之濕恐單治其濕以致陰愈耗而熱愈熾故加阿膠養陰熄風以存津液又為治陰虛濕熱之一法也平胃散局方平胃散中蒼朮甘陳皮燥濕助脾元土邪敦阜宜宣導水濕停痰嵐瘴蠲平胃散蒼朮泔浸二錢厚朴姜炒陳皮去白甘草炙各一錢加薑棗煎治脾胃土濕太過胸腹痞滿或嘔或瀉以及宿食不消山嵐瘴霧不服水土等證夫土曰稼穡不及為之卑堅太過則曰敦阜平胃者平胃中之敦阜也然土無成位濕無專主皆從化而來從化而去隨人之臟氣使然陰虛者化為濕熱陽虛者化為寒濕故治此者當因其未化而化之乃無後患故用蒼朮辛溫燥濕辟惡強脾可散可宣者為化濕之正藥厚朴苦溫除濕而散滿陳皮辛溫理氣而行痰以佐蒼朮之不及但物不可太過過剛則折當如有制之師能戡禍亂而致太平故以甘草中州之藥能補能和者贊輔之使濕去而土不傷致於平和也防己黃耆湯仲景防子黃耆金匱湯更加朮草細參詳脈浮風濕邪留表達衛和營藉棗姜防己黃耆湯防己一兩炙甘草半兩白朮七錢半黃耆一兩生薑四片大棗八枚煎服後如蟲行皮中從腰以下如冰坐被上又以一被繞腰下溫令微汗差治風濕脈浮身重汗出惡風者此治衛陽不足風濕乘虛客於表也風濕在表本當以風藥勝之從汗出而愈此為表虛有汗即有風去濕不去之意故不可更用麻黃桂枝等藥再發其汗使表益虛防風防己二物皆走表行散之藥但一主風而一主濕用各不同方中不用防風之散風而以防己之行濕然病因表虛而來若不振其衛陽則雖用防己亦不能使邪逕去而病愈故用黃耆助衛氣於外白朮甘草補土德於中佐以薑棗通行營衛使防己大彰厥效服後如蟲行皮中上部之濕欲解也或腰以下如冰用被繞之令微汗出差下部之濕仍從下解雖下部而邪仍在表仍當以汗而解耳麻黃加朮湯金匱麻黃加朮有奇勳甘草還宜桂杏仁表受濕邪身體痛微微汗出病安寧麻黃加朮湯麻黃三兩去節桂枝二兩灸甘草一兩白朮四兩杏仁七十枚去皮尖上五味以水九升先煮麻黃減二升去上沫內諸藥煮取二升半去滓溫服八合覆取微汗治風濕在表身體疼痛當發其汗者夫風濕之客表也即見身煩疼痛之表證固當汗以勝之然治風濕之表不可大汗大汗則風去濕存治法止可微微汗出然後風濕乃能皆去故方中用麻黃湯祛風以發表即以白朮除濕而固里且麻黃湯內有白朮則雖發汗而不至多汗而術得麻黃並可以行表裡之濕即兩味足以治病況又有桂枝和營達衛助麻黃以發表杏仁疏肺降氣導白朮以宣中更加甘草協和表裡使之行者行守者守並行不悖立方者真不可思議耳實脾飲嚴氏實脾飲用術苓瓜陰水肢浮色不華甘樸木香姜附腹棗姜草蔻並相誇實脾飲白朮土炒茯苓炙甘草厚朴姜炒大腹皮草豆蔻木香木瓜附子炮姜加薑棗煎治肢體浮腫色悴聲短口中不渴二便通利此為陰水夫水有陰陽治宜各別陽水者其人素稟陽盛或酒飲蓄聚或濕熱蘊留久則脾胃日虛不能運化或發於內或溢於外為腫為脹所由來也陰水者純是陽虛土敗土不制水而然經云濕勝則地泥故脾旺則運化行而清濁分其清者為氣為血為津為液濁者則為汗為溺而分消矣則知治水當以實脾為首務也白朮甘草補脾之正藥然非薑附之大辛大熱助火生土何以建其溫補健運之功而後腹皮茯苓之行水厚朴木香之快氣各奏厥功草豆蔻芳香而燥治太陰獨勝之寒宣木瓜酸澀而溫疏脾土不平之木祛邪匡正標本得宜耳舟車丸河間舟車丸子木香輕戟遂芫花牛與軍陽水腫堅形氣實前驅水陸賴青陳舟車丸牽牛四兩炒大黃二兩酒浸甘遂麵裹煨大戟麵裹煨芫花醋炒青皮炒橘紅各一兩木香五錢輕粉一錢水丸治水腫水脹形氣俱實口渴面赤氣粗腹堅大小便閉脈來沉數有力此為陽水夫陽水先腫上體陰水先腫下體陰水脈沉遲陽水脈沉數固皆有脈證可辨然腫與脹尤有兩途腫則陽氣猶行邪實者居多脹則為木橫剋土正氣全虛最為難治若見唇黑傷肝缺盆平傷心臍凸傷脾足心平傷腎背平傷肺皆不可治也此方用牽牛瀉氣分大黃瀉血分協同大戟甘遂芫花三味大劑攻水者水陸並行再以青皮陳皮木香通理諸氣為之先導而以輕粉之無竅不入者助之故無堅不破無水不行宜乎有舟車之名然非形氣俱實者不可輕投五皮飲澹寮五皮飲用五般皮陳茯姜桑大腹齊水溢皮膚喘咳腫肺脾俱病此方宜五皮飲陳皮茯苓皮生薑皮大腹皮桑白皮治水病腫滿上氣喘急或腰以下腫此亦肺之治節不行以致水溢皮膚而為以上諸證故以桑皮之瀉肺降氣肺氣清肅則水自下趨而以茯苓之從上導下大腹之宣胸行水姜皮辛涼解散陳皮理氣行痰皆用皮者因病在皮以皮行皮之意然肺脾為子母之臟子病未有不累及其母也故腫滿一證脾實相關否則脾有健運之能土旺則自可制水雖肺之治節不行決無腫滿之患是以陳皮茯苓兩味本為脾藥其功用皆能行中帶補匡正除邪一舉而兩治之則上下之邪悉皆渙散耳中滿分消丸東垣中滿分消丸夏陳四君豬澤與砂仁芩連樸實乾薑配知母薑黃餅用蒸中滿分消丸厚朴炒一兩枳實炒黃連炒黃芩炒半夏薑製各五錢薑黃人參白朮炒甘草豬苓各一錢陳皮知母炒各四錢澤瀉三錢茯苓砂仁乾薑各二錢蒸餅為丸治中滿鼓脹氣脹水脹皆屬於熱者夫諸脹固受邪不同治法亦異然大勢不越脾胃為病以腫屬無形脹為有形有形者必歸於胃胃者五臟六腑之海萬物所歸若脾旺有運化之能決不致滯而為脹若脾土一虛則積而成病矣但土衰則濕盛濕從土化寒熱不同如此方之治脾虛濕熱為脹為滿則用六君之補脾以芩連之清熱枳樸之辛苦以行其氣豬澤之淡滲以利其濕然濕熱既結即清之行之利之尚不足以解其黏膩之氣故用乾薑之辛熱燥以散之薑黃砂仁之香烈熱以動之而後濕熱之邪從茲解化用知母者因病起於胃不特清陽明獨勝之熱且恐燥藥過多假此以護胃家之津液也丸以蒸餅者助土以使其化耳茵陳蒿湯茵陳湯法治疸黃濕熱瘀留脈實強梔子大黃前後泄陽明邪實病能康若然寒濕為災咎乃是陰黃當審詳宜去梔黃另換法須加附子與乾薑茵陳蒿湯茵陳六兩大黃二兩酒浸梔子十四枚炒治傷寒陽明病但頭汗出腹滿口渴二便不利濕熱發黃脈沉實者夫黃之為病其源不同金匱論之甚詳大抵不越寒熱虛實四者之間而其要皆由濕鬱所致即脾虛之真色外現女勞疸之內有瘀血亦不無內兼濕濁故雖補虛行血而仍不可忘卻治濕一端以黃者土之正色濕居長夏而屬土內通脾胃故也此方純治邪氣實而不虛者如濕熱內結而成實證則茵陳五苓等藥又屬無濟非用下奪之法不足以殺其邪而導其結故以梔子泄其前大黃泄其後茵陳辛苦微寒得春初生髮之氣能入太陽陽明發汗利水為治黃主藥三味合而用之前證自然奏效耳若寒濕內鬱而為陰黃者其證則與前純乎相反但陰黃之色瘀而晦陽黃之色明而鮮陽黃則口渴便閉陰黃則口不渴二便和以此為別薑附大辛大熱使寒濕之邪從乎陽化則茵陳又為治寒濕之用耳足見一物之功各隨佐使而用不必拘拘乎一物一用也小溫中丸小溫中丸是古方脾虛濕熱病為殃苦參香附針砂曲陳夏苓甘連術藏小溫中丸白朮一兩茯苓半夏甘草神麯陳皮針砂醋煅各一兩苦參黃連各五錢香附一兩五錢醋水各半打神麯為丸每服七八十丸薑湯下治脾虛濕熱不化足腫便溏腹滿等證此因脾虛濕從熱化久積腹中以致腹滿便溏足腫等證所由起也然濕熱之邪雖盛皆由土虛而成故治法亦不忘其本白朮補脾燥濕使運化有權贊助藥力自然邪盡化而正不傷半夏化其濕茯苓利其水陳皮理其氣甘草和其中且皆可寓宣於補黃連苦參清濕中之瘀熱針砂神麯化積滯之陳邪用醋水為丸者凡欲散之必先斂之不使其邪有散漫之意耳二妙丸三妙丸四妙丸二妙丸中蒼朮先和同黃柏兩相兼若增牛膝名三妙苡薏加之四妙賢二妙丸蒼朮黃柏治濕熱盛於下焦而成痿證者夫痿者萎也有軟弱不振之象其病筋脈弛長足不任地步履歪斜此皆濕熱不攘蘊留經絡之中所致然濕熱之邪雖盛於下其始未嘗不從脾胃而起故治病者必求其本清流者必潔其源方中蒼朮辛苦而溫芳香而燥直達中州為燥濕強脾之主藥但病既傳於下焦又非治中可愈故以黃柏苦寒下降之品入肝腎直清下焦之濕熱標本並治中下兩宣如邪氣盛而正不虛者即可用之本方加牛膝為三妙丸以邪之所湊其氣必虛若肝腎不虛濕熱決不流入筋骨牛膝補肝腎強筋骨領蒼朮黃柏入下焦而祛濕熱也再加苡仁為四妙丸因內經有云治痿獨取陽明陽明者主潤宗筋宗筋主束筋骨而利機關也苡仁獨入陽明祛濕熱而利筋絡故四味合而用之為治痿之妙藥也八正散局方八正車前與木通草梢滑石黑梔同大黃萹蓄和瞿麥加入燈心分利功八正散車前子木通瞿麥萹蓄滑石甘草梢黑山梔大黃加燈心煎治濕熱下注咽乾口渴少腹急滿小便不通或淋痛尿血等證夫淋之為病雖有多端其辨別不過虛實兩途若有邪而實者其來必痛或濕熱或瘀血有邪證邪脈可據者悉從膀胱溺道而來若不痛而屬虛者由腎臟精道而來蓋前陰雖一內有兩竅一為溺竅一為精竅故淋之一證無不出於腎與膀胱也然膀胱一腑有下口而無上口其水皆從大小腸之分別清濁而下滲為溺則知濕濁瘀血亦由此處而滲入膀胱為病焉故此方以大黃導濕熱直下大腸不使其再入膀胱庶幾源清而流自潔耳其既蓄於膀胱者又不得不疏其流以上諸藥或清心而下降或導濁以分消自然痛可止熱可蠲濕熱之邪盡從溺道而出矣潤燥之劑燥者有金燥有火燥金燥為六淫之邪不為重病故經無秋傷於燥之文但云西方生燥燥生金又云神在天為燥在地為金又云清氣大來燥之勝也夫金在氣則天蒼蒼悠悠星漢光明而不變也在質則金堅強瑩潔萬古而不磨滅也在位則西東作而西成也在時則秋春華而秋實也在病則毛髮蒼隕等疾猶秋葉之搖落而根干精華內蘊也譬之盛夏之時百草繁茂林木流津一至秋風肅殺萬物催枯其於人也亦然此金氣主成功燥不為重病故內經諸篇皆以秋傷於濕為病不言秋傷於燥者是也至於火燥者皆陰虧液涸而致易曰火就燥又云燥萬物者莫熯乎火其為病燥於外則皮膚皺揭燥於中則精血枯涸燥於上則咽鼻焦乾燥於下則便溺閉結此皆言火氣之燥也燥萬物之不燥就萬物之已燥火也不待火而自燥火不能就之燥金也金則自燥不能燥物火不止燥能燥萬物皆可濕金不可濕此金燥與萬物之燥所以不同也篇中所採皆火燥之方僅謹錄鞠通吳氏二方為金燥之一法耳杏蘇散杏蘇散是鞠通方金燥微寒肺受戕枳桔二陳薑棗引前胡降氣下痰良杏蘇散杏仁蘇葉半夏陳皮茯苓甘草枳殼桔梗前胡生薑大棗治秋分以後小雪以前秋燥寒微之氣外束皮毛肺金受病頭微痛惡寒咳嗽稀痰鼻塞嗌塞脈象微弦等證夫燥淫所勝平以苦溫即可見金燥之治法經又云陽明之勝清發於中大涼肅殺華英改容當此之時人身為驟涼所束肺氣不舒則周身氣機為之不利故見以上等證方中用杏仁前胡苦以入肺外則達皮毛而解散內可降金令以下行蘇葉辛苦芳香內能快膈外可疏肌凡邪束於表肺氣不降則內之津液蘊聚為痰故以二陳化之枳桔升降上下之氣薑棗協和營衛生津液達腠理且寓攘外安內之功為治金燥微邪之一則耳瓊玉膏申先生乾咳無痰瓊玉膏地黃參蜜茯苓熬臞仙加入沉香珀培土生金痰自消瓊玉膏地黃四斤茯苓十二兩人參六兩白蜜二斤先將地黃熬汁去渣入蜜煉稠再將參苓為末和入磁罐封水煮半日白湯化服臞仙加琥珀沉香各五錢調入自云奇妙治肺陰虧損乾咳無痰夫咳嗽一證古人雖分肺燥脾濕兩途然其病總不離於肺臟所致蓋肺為嬌臟畏熱畏寒其間不容毫髮故無論飲食偶一失慎嗆入必咳出方已雖有外感內傷之不同因熱因寒之互異其屬於外者無非邪束於肺屬於內者或為火熏或為寒逼其為寒飲上凌者固有寒飲之脈證可據即火之為病亦尚有虛實之不同實火者或清或散虛火者皆因金水虧竭而來故雖被火熏肺中無津液為痰僅作癢而乾咳也方中以地黃滋腎水白蜜養肺陰使金水相生而燥咳自止用人參者取土旺金生虛則補母之義茯苓色白入肺使金令下行即有濁痰亦可隨之而下矣加沉香琥珀者一則流利其氣一則通達其血耳炙甘草湯仲景一方用棗仁炙甘草湯生地黃麻仁參麥棗生薑桂枝酒水阿膠等邪少虛多脈結嘗炙甘草湯炙甘草四兩桂枝三兩生薑三兩麥冬半升麻仁半升人參阿膠各二兩大棗三十枚生地黃一斤上九味以酒七升水八升先煮八味取三升去滓內膠烊化溫服一升日三服治傷寒脈結代心動悸寒傷心主陰正內亡邪少虛多之候以及肺痿咳唾心中溫溫液液者夫心為君主義不受邪於象為離為陽中之太陽然離中有陰一陰居於二陽之中心雖牡藏而主血主脈者皆屬於心也若心中陰血不足而為寒邪所傷故見以上之證矣方中生地阿膠麥冬補心之陰人參甘草益心之陽桂枝生薑清酒以散外來之寒邪麻仁大棗以潤內腑之枯槁具治肺痿一證亦為虛寒所致皆邪少虛多之候故咳唾多心中溫溫液液讀者細觀金匱可也麥門冬湯金匱麥門冬湯半夏參棗甘粳米合煎成咽喉不利因虛火養胃除煩逆氣平麥門冬湯麥門冬七升半夏一斤人參三兩甘草二兩大棗十二枚粳米三合治火逆上氣咽喉不利止逆下氣此湯主之此手太陰足陽明之方也夫肺與胃之氣皆以下行為順上行為逆若肺胃陰傷虛火內動則氣上逆矣氣上逆則痰涎隨之於是咽喉不利所由來也麥冬甘苦而寒養肺胃之陰而降火故以為君然胃者肺之母氣也為水穀之海後天之源凡人有胃則生無胃則死故人之生氣出胃中雖陰虛火逆不可純用甘寒潤降之品有傷生氣故以參甘棗米等藥甘溫潤澤益氣生陰補而不燥同麥冬即可大補中氣大生津液而以半夏辛溫之品參贊其間可以利咽喉散結氣行痰降逆以之為臣然後立方之功益彰其大耳滋燥養營湯滋燥養營兩地黃苓甘歸芍及艽防爪枯膚燥兼風閉火爍金傷血液亡滋燥養營湯當歸酒洗生地黃熟地黃芍藥酒炒黃芩酒炒秦艽各一錢防風甘草各五分治火爍肺金血虛風燥皮膚皺揭筋急爪枯或大便風閉等證此血虛火燥之方也夫營血者所以營養經絡灌溉臟腑潤澤一身者也然人之氣血稟賦不無偏勝氣屬陽而血屬陰故陰血不足者則內熱自生熱生則風動風火既動於內則外來六淫之風火交相併合於是風火相灼於營血之中營陰日枯風火日盛外不能營於皮毛則皮膚皺揭內不能營於筋骨則筋急爪枯燥於上則口渴燥於下則便難種種燥象所由來矣治內生之風熱養陰則熱自退活血則風自消故以生地熟地補陰壯水當歸和血活血芍藥酸苦微寒平內風清虛熱兩擅其長但既有外來風火雜合其間又不得不略用治標之法故以秦艽防風以散風凡風藥皆燥血虛者忌燥此二味為風藥中潤劑黃芩以清其邪火甘草不特協和中外且以緩病勢之急耳潤腸丸東垣潤腸丸內大麻仁歸尾羌桃軍用生或入艽防皂角子津枯風燥火瘀凝潤腸丸大黃歸尾羌活各五錢桃仁研大麻仁去殼各一兩蜜丸一方有防風或入秦艽皂角子燒存性用治腸胃有伏火或風血相搏結於腸中大便閉澀不思納穀等證夫胃與大腸皆屬陽明陽明主津液腸胃既有伏火則津液耗亡其無形之火即挾腸胃中之渣滓並素有之留血結而為燥然火疾則風生更不待外風之至也但既結為燥實即為有形留著於內又非僅用潤藥可能盪滌故方中雖用潤燥通腸不足以下其堅凝之質必藉大黃之推陳致新乃能有效歸尾桃仁破其血羌活宣其風風散瘀行閉自通而津液自復矣其加艽防皂子者亦由風勝而用之耳韭汁牛乳飲丹溪五汁安中飲丹溪韭汁牛乳飲胃中血膈稱妙品或益姜梨藕汁和五汁安中治亦等韭汁牛乳飲韭菜汁牛乳等分和合時時呷之治胃脘有死血乾燥胃陰枯槁以致食下作痛而成膈證夫噎膈反胃關格四證其始也固屬不同其終也皆為津血枯槁故槁在吸門飲可下而食不可下此為噎吸門即喉間之會厭也如槁在賁門飲食雖可下咽入胃即痛此為膈賁門乃胃之上口也如槁在腸中則食下良久復出或朝食暮吐暮食朝吐此為反胃若病極而至於關格則上不得入下不得出上下俱槁矣然膈之一證病情亦各有不同大抵因七情而起者為多經云大怒則形氣絕而血菀於上此為薄厥即血膈之證也始則因於氣鬱郁盛則成火火盛則津枯津枯則血結矣血結胃中則飲湯必呃口有血腥治此者不可再散其氣氣愈散則津愈耗病愈盛耳故以牛乳潤燥養血韭汁益胃消瘀瘀去則胃無阻血潤則大腸通而食得下矣其加後三味者薑汁豁痰和胃以散逆結之氣梨能清熱藕可消瘀皆不外乎前法之意也桑杏湯鞠通秋燥津虧桑杏湯沙參象貝炒豉香梨皮清上梔皮降邪束金傷肺受殃桑杏湯桑葉一錢杏仁一錢半沙參二錢象貝一錢香豉一錢梔皮一錢梨皮一錢治秋感燥氣右脈數大傷手太陰氣分者夫秋燥微寒之氣感而為病者前於杏蘇散中已論之矣此因燥邪傷上肺之津液素虧故見右脈數大之象而辛苦溫散之法似又不可用矣止宜輕揚解外涼潤清金耳桑乃箕星之精箕好風故善搜風其葉輕揚其紋象絡其味辛苦而平故能輕解上焦脈絡之邪杏仁苦辛溫潤外解風寒內降肺氣但微寒驟束胸中必為不舒或痰或滯壅於上焦久而化熱故以香豉散肌表之客邪宣胸中之陳腐象貝化痰梔皮清熱沙參梨皮養陰降火兩者兼之使邪去而津液不傷乃為合法耳清燥救肺湯喻氏清燥救肺湯喻氏桑葉石膏參草使胡麻麥杏與阿膠葉取枇杷功備至清燥救肺湯冬桑葉三錢煨石膏二錢半甘草一錢人參七分胡麻仁炒研一錢真阿膠八分麥冬去心一錢二分杏仁去皮尖炒七分枇杷葉一片刷去毛蜜塗炙黃喻氏治諸氣膹郁諸痿喘嘔之屬於肺燥者夫燥之一證有金燥有火燥前已論之詳矣此方為喻氏獨創另具卓識發為議論後人亦無從置辨雖其主治固無金燥火燥之分而細閱其方仍從火燥一端起見此必六淫火邪外傷於肺而肺之津液素虧為火刑逼是以見諸氣膹郁諸痿喘嘔之象然外來之火非徒用清降可愈經有火鬱發之之說故以桑葉之輕宣肌表者以解外來之邪且此物得金氣而柔潤不凋取之為君石膏甘寒色白直清肺部之火稟西方清肅之氣以治其主病肺與大腸為表裡火逼津枯肺燥則大腸亦燥故以杏仁麻仁降肺而潤腸阿膠麥冬以保肺之津液人參甘草以補肺之母氣枇杷葉苦平降氣除熱消痰使金令得以下行則膹郁喘嘔之證皆可痊矣增液湯鞠通條辨書中增液湯津枯便閉熱邪傷麥冬生地元參等增水行舟法最良增液湯元參一兩麥冬八錢細生地八錢治陽明溫病無上焦證數日不大便當下之若其人陰液素虛不可行承氣者此湯主之夫大便閉結一證有虛有實其實者或熱積於中或寒結於內而寒下溫下之法固當詳察至其虛者或因氣餒或因津枯氣餒者宜用辛溫補運以助其傳送其津枯者非甘寒養陰增水行舟之法何以使腸中堅結之濁順流而下此方妙在寓瀉於補以補藥之體作瀉藥之用既可攻實又可防虛元參味苦鹹微寒壯水制火通二便啟腎水上潮於天其能治液涸固不待言本經稱其主治腹中寒熱積聚又能解熱結可知麥冬生地補肺陰壯腎水使金水相生津自充而腸自潤熱邪自解閉結自通矣益胃湯鞠通益胃湯能養胃陰冰糖玉竹與沙參麥冬生地同煎服溫病須知顧慮津益胃湯沙參三錢麥冬五錢冰糖細生地各五錢玉竹一錢半治陽明溫病汗下後病已解當復其陰此湯主之夫傷寒傳入陽明首慮亡津液而況溫病傳入陽明更加汗下後者乎故雖邪解胃中之津液枯槁已甚若不急復其陰恐將來液虧燥起乾咳身熱等證有自來矣陽明主津液胃者五臟六腑之海凡人之常氣皆稟於胃胃中津液一枯則臟腑皆失其潤澤故以一派甘寒潤澤之品使之飲入胃中以復其陰自然輸精於脾脾氣散精上輸於肺通調水道下輸膀胱五經並行津自生而形自復耳五汁飲鞠通五汁飲方條辨中藕梨薺蔗四般春蘆根取汁相和服肺胃溫邪熱上攻五汁飲梨汁荸薺汁鮮蘆根汁藕汁甘蔗汁臨時斟酌多少和勻涼服不喜涼者重湯燉溫服之治手太陰溫病口渴甚者此湯主之夫溫病之來皆從口鼻而入無不先傷肺胃倘肺胃之陰素傷則津枯液涸之象早見一斑急以甘寒之屬滋液救焚其無形之邪不清自解故方中五物皆用鮮汁取其甘涼退熱而其力較乾者煎湯為尤甚且五物之中雖皆屬甘寒而各自為用如梨之清肺蘆之清胃二味皆能流利大腸溫邪雖屬無形恐內有痰滯荸薺可以消導之熱傷陰血則血熱相瘀藕汁可以行散之甘蔗甘平和中養胃一如方中用甘草之意此亦善於立方者耳冬地三黃湯鞠通冬地三黃芩柏連元參甘草共相添蘆根汁與銀花露溫病陰虧濕熱兼冬地三黃湯麥冬八錢黃連一錢蘆根汁半酒杯沖元參四錢黃柏一錢銀花露半酒杯沖細生地四錢黃芩一錢生甘草三錢水八杯煮取三杯分三次服以小便得利為度治陽明溫病實證未劇濕熱相兼不可下小便不利陰津不足者此湯主之夫溫病一證與傷寒迥異傷寒慮在亡陽及至寒邪化熱傳入胃腑證見燥實乃成下證溫病慮在傷陰內多濕熱即使邪入陽明而成可下之證其黏膩交固之氣有非下法可以去者而陰氣愈熱愈傷勢不得不兩顧而治故以生地元參麥冬之養陰津三黃之化濕熱銀花露蘆根汁皆系甘涼清潤之品一可解溫邪於外一可清溫邪於中用甘草者緩病之急和藥之性耳清火之劑蔣寶素曰火者有君火有相火君火以明相火以位天之日人之心君火也萬物百病之火皆相火也明位相生君相相資如環無端亢變則病生焉以天地言之如溽暑流行爍石流金此天地六淫之火君火傷人之證也龍雷振盪光焰詣天此天地之藏火火不歸元之證赤旱千里川源枯竭此天地之府火火從邪化之證陰霾四翳此天地無火之證皆相火也以人言之則斑疹瘡瘍一時暴起此人之六淫之火君火傷己之證也若肝腎陽升面戴陽色此人之藏火火不歸原之證伏邪化熱苔刺唇焦此人之府火火從邪化之證形神暗淡食少便溏此人之無火之證皆相火也其君相二火論之甚詳而治法尤宜細辨大抵五臟六腑七情六淫皆有火病總不外乎表里虛實四者之間而表裡之間又不外乎虛實兩途但能知其虛實則虛者補之攝之實者清之散之於是治火之法無餘蘊矣茲集但列治實火諸方於後以供採擇其餘一切虛火諸法皆散見各門學者尋繹可也黃連解毒湯黃連解毒柏芩梔熱勢猖狂不可持一切火邪充上下躁煩吐衄急宜施黃連解毒湯黃連黃芩黃柏梔子等分治一切火邪表裡俱盛狂躁煩心口燥咽乾大熱乾嘔錯語不眠吐血衄血熱盛發斑等證汪訒庵曰毒者即火邪之盛也邪入於陽則狂心為熱所擾則煩躁則煩之盛也口燥咽乾火盛津枯也乾嘔者熱毒上衝也錯語者熱毒其神也不眠者熱盛而陰不靜也至於吐衄發斑等證熱攻入胃逼血妄行也此皆六淫火邪充斥上下表裡有實無虛之證故治法非緩劑可以了事者黃芩清上焦之火黃連清中焦之火黃柏清下焦之火梔子瀉三焦之火從心肺之分屈曲下行由小腸膀胱而出蓋四味皆大苦大寒之藥清其亢甚之火而救其欲絕之水也然非實熱不可輕投耳升陽散火湯東垣升陽散火葛升柴羌獨防風參芍加甘草更加薑棗配陽經火鬱發之諧升陽散火湯柴胡八錢防風二錢半葛根升麻羌活獨活人參白芍各五錢生熟甘草各三錢每服五錢加薑棗煎治六淫火邪外郁肌表熱如火燎捫之烙手無汗不解清之不愈者用此發之夫六淫有火七情亦有火皆有表裡虛實學者固當省察此方治外來之火鬱於表分而不得解散者然火之為病疾如奔馬其客於表也則不能拘據於一經故以柴胡以發少陽之火升葛以發陽明之火羌防以發太陽之火但外來之邪雖充斥三陽然其來也必始自太陽其去也亦必還返太陽太陽與少陰為表裡其界最近不免有侵犯之虞故以獨活從少陰解其渙散之邪而以人參甘草益元氣芍藥斂陰血薑棗和營衛皆欲使邪不犯於內耳涼膈散局方涼膈散中梔子翹黃芩甘草大黃硝薄荷竹葉同生蜜中上焦煩熱勢燎涼膈散連翹四兩大黃酒浸芒硝甘草各二兩黑山梔酒芩薄荷各一兩為末每服三錢加竹葉生蜜煎治火邪上盛中焦燥實煩躁口渴目赤頭眩口瘡唇裂吐血衄血大小便閉以及斑黃狂亂等證夫火邪至於上中二焦與胃中宿食渣滓之物結而不散則為以上種種諸證若火之散漫者或在裡或在表皆可清之散之而愈如挾有形之物結而不散者非去其結則病終不痊故以大黃芒硝之盪滌下行者去其結而逐其熱然恐結邪雖去尚有浮游之火散漫上中故以黃芩薄荷竹葉清徹上中之火連翹解散經絡中之餘火梔子自上而下引火邪屈曲下行如是則有形無形上下表裡諸邪悉從解散用甘草生蜜者病在膈甘以緩之也左金丸左金丸子出先賢一兩吳萸六兩連金令左行平木火吞酸脅痛病纏綿左金丸黃連六兩薑汁炒吳萸一兩鹽水泡水丸治肝火燥盛左脅作痛吞酸吐酸一切疝氣之屬於肝火者夫吞酸吐酸疝氣等證各有寒熱之不同而屬於肝火者為尤多以肝居於左其味酸有相火內寄其脈絡陰器抵少腹故為諸證蓋氣有餘即是火肝火有餘不得不假金令以平之黃連苦寒入心直折心火不特實則瀉其子且使火不刑金則金令得以下行而木自平矣吳萸辛熱能入厥陰行氣解鬱又能引熱下行且引黃連入肝一寒一熱一苦一辛同治厥陰氣火有餘故疝氣之偏於熱者亦能取效耳龍膽瀉肝湯局方局方龍膽瀉肝湯車澤柴芩生地黃歸草木通梔子等厥陰濕火力能匡龍膽瀉肝湯龍膽草酒炒梔子酒炒黃岑炒澤瀉木通車前子當歸酒洗生地酒炒柴胡生甘草治肝膽濕火熾盛脅痛耳聾或筋痿陰汗以及陰腫陰痛淋濁溲血等證夫相火寄於肝膽其性易動動則猖狂莫制挾身中素有之濕濁擾攘下焦則為種種諸證或其人肝陰不足相火素強正值六淫濕火司令之時內外相引其氣並居則肝膽所過之經界所主之筋脈亦皆為患矣故以龍膽草大苦大寒大瀉肝膽之濕火肝膽屬木木喜條達邪火抑鬱則木不舒故以柴胡疏肝膽之氣更以黃芩清上山梔導下佐之以木通車前澤瀉引邪熱從小腸膀胱而出古人治病瀉邪必兼顧正否則邪去正傷恐犯藥過病所之弊故以歸地養肝血甘草緩中氣且協和各藥使苦寒之性不傷胃氣耳瀉白散錢乙瀉白方醫肺火蒸桑皮地骨降而清更須甘草和粳米助土生金妙入神瀉白散桑白皮地骨皮各一錢甘草五分粳米百粒治肺火皮膚蒸熱灑淅惡寒日晡益盛喘嗽氣急等證夫肺為嬌臟而屬金主皮毛其性以下行為順上行為逆一受火逼則以上之證見矣治此者皆宜清之降之使復其清肅之令桑白皮皮可行皮白能歸肺其甘寒之性能入肺而清熱固不待言而根者入土最深能清而復降又可推想地骨皮深入黃泉無所底止其甘淡而寒之性雖能瀉肺之伏火然觀其命名取意能入肝腎涼血退蒸可知二皮之用皆在降肺氣降則火自除也甘草瀉火而益脾粳米清肺而養胃瀉中兼補寓補於宣雖清肺而仍固本耳紫雪丹局方紫雪黃金砂麝玄滑磁寒水石膏甘二硝丁木沉升等犀角羚羊熱可安紫雪丹黃金百兩寒水石石膏滑石磁石各三斤升麻玄參炙甘草各半斤犀角羚羊角沉香木香各五兩丁香一兩以上並搗銼入水中煎去滓入後藥朴硝硝石各二斤提淨入前藥汁中微火煎不住手將柳木攪候汁欲凝再加入後二味水飛辰砂三兩當門子一兩二錢二味另研細入前藥拌勻合成退火氣冷水調服一二錢治內外皆熱狂叫奔走發斑發黃口瘡腳氣一切蟲毒藥毒等證方中獨以砂麝二硝四味用其質以之為君朴硝下導硝石上散二物皆水滷結成性峻而易消為破滯散邪之專藥辰砂辟邪安神麝香通關達竅為之臣其餘諸藥皆取其氣不用其質如黃金之鎮邪犀角羚羊清之於上寒滑石磁清之於下升麻之上升沉玄之下降甘草守中而解毒丁術散氣而疏邪用為佐使在用者之得心應手耳萬氏牛黃清心丸牛黃萬氏可清心梔子芩連共鬱金蒸餅辰砂作丸子熱邪內閉服之靈萬氏牛黃清心丸西牛黃二分黃芩五錢黃連五錢鬱金二錢黑山梔二錢蒸餅糊丸飛淨硃砂一錢半為衣每丸計重一錢治溫邪內陷熱入心胞痰涎壅塞神昏譫語發厥發暈牙關緊閉以及小兒急驚風等證夫熱邪內陷不傳陽明胃腑則傳入心胞若邪入心胞則見神昏譫語諸證其勢最慮內閉牛黃芳香氣清之品輕靈之物直入心胞辟邪而解穢然溫邪內陷之證必有黏膩穢濁之氣留戀於膈間故以鬱金芳香辛苦散氣行血直達病所為之先聲而後芩連苦寒性燥者祛逐上焦之濕熱黑梔清上而導下以除不盡之邪辰砂色赤氣寒內含真汞清心熱護心陰安神明鎮君主辟邪解毒兩者兼優丸以蒸餅者取其化滯耳清骨散清骨散中鱉甲秦銀柴地骨草知青故黃連可除邪熱水竭陰消骨內蒸清骨散銀柴胡一錢半胡黃連秦艽鱉甲童便炙地骨皮青蒿知母各二錢炙甘草五分治骨蒸勞熱夫骨蒸一證肌膚按之不熱自覺骨內熱勢蒸蒸而出每夜五心煩熱皆由水虧火熾邪熱伏於陰血之中而致久則陰愈虧而熱愈盛熱愈盛而陰愈虧其煎熬之勢不至陰竭不已耳故每至身體羸瘦脈形細數而勞證成矣然病始於熱伏陰中若不去其熱徒養其陰則病根不除無益也故以銀柴青蒿秦艽之苦寒直入陰分者宣熱邪而出之於表胡黃連鱉甲地骨知母苦寒甘寒之性從陰分以清伏熱於裡用炙甘草者緩其中而和其內外使邪去正安之意耳香連丸香連丸子痢門方赤白相兼膿血殃連用吳萸同炒去木香生研醋丸良香連丸黃連二十兩以吳萸十兩同炒去萸不用木香四兩八錢不見火醋糊丸治下痢赤白膿血相雜裡急後重夫痢之為病固有寒熱虛實新久之不同假令在暑令之時由於暴起者皆由濕熱鬱蒸腸胃而致傷於血分者則赤傷於氣分者則白氣血兩傷則赤白交下如膿血者其濕熱之氣鬱於腸中挾腸中滓穢膏血之屬蒸化而成也裡急者腹中絞痛邪正相搏也後重者數至圊而不能便如暴注下迫火性急速也然後重亦有氣虛下陷者當察其腹痛在於便前便後便前為實便後為虛而再加以望聞問切參之則病無遁情矣黃連苦燥濕寒勝熱直折心脾之火故以為君用吳萸同炒者取其疏大腸之壅氣且以殺大寒之性也裡急出於氣滯木香辛溫行氣通利三焦一寒一熱一陰一陽有相濟之妙也榆槐臟連丸臟連丸內用榆槐三味相和方法佳共入豬腸煮爛作久新痔漏效堪誇榆槐臟連丸川連二兩槐米地榆炭各一兩五錢豬大腸二尺洗淨先將地榆槐米裝入豬大腸內用米泔水煮爛和入川連打為丸治新久痔漏腸風下血脫肛痛癢腸癰臟毒等證夫以上之證其病各有新久之不同其血亦有鮮晦之不一然大抵由乎濕熱鬱於大腸逼於血分者為多故以黃連之苦寒性燥專除濕熱者為君而以地榆槐米之涼血疏風者佐之因病在大腸故以豬大腸引之入腸然後三藥得以建其功而除其病耳臟連丸一方種種不同似推此方為獨得其藥鋪亦皆置備故錄之玉女煎景岳景岳新方玉女煎石膏知膝地冬兼水虧火盛邪留胃脈象浮洪須細研玉女煎石膏熟地各五錢麥冬二錢知母牛膝各一錢半治水虧火盛六脈浮洪滑大少陰不足陽明有餘煩熱口渴頭痛牙疼失血等證夫人之真陰充足水火均平決不致有火盛之病若肺腎真陰不足不能濡潤於胃胃汁乾枯一受火邪則燎原之勢而為似白虎之證矣方中熟地牛膝以滋腎水麥冬以保肺金知母上益肺陰下滋腎水能治陽明獨勝之火石膏甘寒質重獨入陽明清胃中有餘之熱雖然理雖如此而其中熟地一味若胃火熾盛者尤宜斟酌用之即虛火一證亦宜改用生地為是在用方者神而明之變而通之可也三黃石膏湯三黃石膏芩柏連梔豉麻黃薑棗煎溫病三焦陽毒盛縱橫表裡火如炎三黃石膏湯石膏一兩五錢黃芩黃連黃柏各七錢梔子三十枚麻黃一兩淡豉二合每服一兩姜三片棗二枚細茶一撮煎熱服治溫疫病表裡三焦大熱不解或煩躁大渴面赤鼻乾兩目如火身形拘急而不得汗六脈洪數及陽毒發斑等證黃芩清上焦之火黃連清中焦之火黃柏清下焦之火梔子通瀉三焦之火使之屈曲下行夫疫之來也必從口鼻而入鼻氣通於肺口氣通於胃肺胃為受邪之藪故重用石膏以清肺胃以杜其傳化之源裡熱既清表尚未解故以麻黃淡豉之發汗解表者一行於肺一行於胃如是則表裡均解耳用薑棗者亦不過扶正散邪細茶者所以清肅上焦耳黃連阿膠湯黃連阿膠湯芩芍雞子黃鬚衝入藥不臥心煩屬少陰陽邪內陷陰津灼黃連阿膠湯黃連四兩阿膠三兩黃芩芍藥各二兩雞子黃三枚上五味以水六升先煮三物取二升去滓內阿膠烊盡少冷內雞子黃攪令相得溫服七合日三服治少陰病得之二三日心中煩不得臥者此病發於陰熱為在裡夫少陰屬腎腎藏精主閉藏今為陽邪內擾則陰精不能閉藏何以上交於心主故心煩不寐所由來也此方以阿膠色黑入腎者填補陰精雞子黃之色赤入心者奠安君主且驢皮黑而居外雞子黃赤而居內得陰陽交互之理更加芍藥以護陰而和陽然後以芩連從陰中直泄其陽邪庶不復傷其陰耳除痰之劑痰者其源不同其來各異有燥濕之分寒熱之別皆津液所化昔人所謂脾為生痰之源肺為貯痰之器故咳出之痰皆出於肺因肺主皮毛其氣下行或外感風寒肺氣鬱而不降則肺中津液蒸而為痰如肺為火逼津液亦易成痰此等之痰皆出於肺而從咳出者也若脾為生痰之源者因脾虛不能運化則胃中之津液與一切濕濁食飲皆易成痰而從吐出故痰從吐出者皆出於胃中因脾虛所致故云脾為生痰之源也其間或挾外感之六淫或挾內傷之七氣或腎陽不足水邪上泛或腎陰虧損津液煎熬皆能成痰是以古人有云痰為百病之母奇病怪證皆屬於痰痰之變幻不一醫者各察其因而治之則痰自化矣又龐安常云善治痰者不治痰而治氣氣順則一身津液亦隨氣而順自無痰患此亦先哲名言耳此集會聚各方治濕痰實痰者居多其他治燥痰虛痰等方散列各門參觀可也二陳湯局方導痰湯二陳半夏與陳皮甘草茯苓四味宜枳實膽星加入此導痰湯號力頗奇二陳湯半夏薑製二錢陳皮去白茯苓各一錢甘草五分加姜煎治一切痰飲為患咳嗽脹滿嘔吐噁心頭眩心悸等證夫痰之為病先當辨其燥濕兩途燥痰者由於火灼肺金津液被灼為痰其咳則痰少而難出治之宜用潤降清金濕痰者由於濕困脾陽水飲積而成痰其嗽則痰多而易出治之又當燥濕崇土如此方者是也半夏辛溫體滑性燥行水利痰為治濕痰之本藥故以為君痰因氣滯故以陳皮理氣而行滯痰因濕生用茯苓滲濕而導下二物為臣濕痰之生由於脾不和故以甘草和中補土為佐也導痰湯即本方加膽星枳實治頑痰膠固非二陳所能除者加膽星以助半夏化痰加枳實以成沖牆倒壁之功耳清氣化痰丸清氣化痰星夏陳芩苓枳實杏蔞仁丸須薑汁調成糊痰火能除氣亦純清氣化痰丸薑製半夏膽星各一兩五錢橘紅枳實麩炒杏仁去皮尖瓜蔞仁去油黃芩酒炒茯苓各一兩薑汁糊丸淡薑湯下治熱痰汪訒庵曰熱痰者痰因火而成也痰即有形之火火即無形之痰痰隨火而升降火引痰而橫行變生諸證不可紀極火借氣於五臟痰借液於五味氣有餘則為火液有餘則為痰故治痰者必降其火治火者必順其氣此方所由設也方中半夏膽星為治痰之君藥痰由於火故以黃芩之苦寒降之瓜蔞之甘寒潤之火因於氣即以陳皮順之枳實破之然脾為生痰之源肺為貯痰之器故以杏仁之苦溫疏肺而降氣茯苓之甘淡滲濕而宣脾肺脾肅清則痰不存留矣以薑汁糊丸者用為開痰之先導耳順氣消食化痰丸瑞竹堂順氣消食化痰丸星夏青陳蘇子安查麥萊神葛杏附丸宜蒸餅服之寬順氣消食化痰丸姜半夏膽星各二兩青皮陳皮去白萊菔子生黑蘇子炒山查炒麥芽神麯炒葛根杏仁去皮尖制香附各一兩薑汁和蒸餅糊丸治酒食生痰胸膈膨悶等證夫嗜酒之人飲積於中多生痰疾各隨人之臟氣而變如陽虛者即為寒痰陽盛者即為熱痰之類若過食辛熱油膩之物亦易於生痰然此等之痰皆由於酒食黏膩滯濁而得方中半夏膽星化痰燥濕者以之為君治痰者必先順氣故以蘇子杏仁降氣以化其痰青陳香附理氣以行其滯葛根神麯以解其酒查麥萊餅以消其食薑汁開痰快膈用使前驅耳指迷茯苓丸指迷方指迷方有茯苓丸風化芒硝枳殼圓薑汁糊成半夏曲痰停臂痛病能蠲指迷茯苓丸半夏曲二兩茯苓一兩乳拌枳殼五錢麩炒風化硝二錢半薑汁糊丸薑湯下治痰停中脘兩臂疼痛夫痰之為病在腑者易治在臟者難醫在絡者更難搜剔四肢者皆稟氣於脾若脾病不能運化則痰停中脘充溢四肢有自來矣治之者當乘其正氣未虛之時而攻擊之使脘中之痰去而不留然後脾復其健運之職則絡中之痰自可還之於腑潛消默運以成其功故方中以半夏化其痰茯苓行其濕枳殼破其氣而以薑汁開之芒硝下之用法之周到佐使之得宜其痰有不去者乎如病甚而絡中之痰不除者則可以控涎丹參酌用之可也控涎丹三因三因妙應控涎丹散結搜邪攻頑痰芥子戟甘利臟腑薑湯服下即時寬控涎丹甘遂去皮大戟去皮白芥子各等分為末糊丸臨臥薑湯送下五分至一錢當瀉利治人忽患胸背手足腰項筋骨牽引釣痛走易不定或手足冷痹氣脈不通此乃痰涎在胸膈上下不可誤認癱瘓宜此方主之李時珍曰痰涎為物隨氣升降無處不到入心則迷成癲癇人肺則塞竅喘咳背冷入肝則膈痛乾嘔寒熱往來入經絡則麻痹疼痛入筋骨則牽引釣痛入皮肉則瘰癧癰腫皆可以此方服之殊有奇效此乃治痰之本痰之本水也濕也得氣與火則結而為痰大戟能泄臟腑水濕甘遂能行經隧水濕二味皆能直達水氣所結之處以攻決為用白芥子能散皮裡膜外之痰惟在善用者能收奇功耳三子養親湯韓氏三子養親蘇子仁炒香萊菔子相尋更加芥子和同研氣壅痰多食積因三子養親湯紫蘇子沉水者白芥子萊菔子各微炒研煎服治老人氣實痰盛喘滿懶食等證夫痰之生也或因津液所化或由水飲所成然亦有因食而化者皆由脾運失常以致所食之物不化精微而化為痰然痰壅則氣滯氣滯則肺氣失下行之令於是為咳嗽為喘逆等證矣病因食積而起故方中以萊菔子消食行痰痰壅則氣滯以蘇子降氣行痰氣滯則膈塞白芥子暢膈行痰三者皆治痰之藥而又能於治痰之中各逞其長食消氣順喘咳自寧而諸證自愈矣又在用者之得宜耳礞石滾痰丸王隱君礞石滾痰王隱君沉香和入共黃芩大黃酒製為丸服百病多緣痰作成礞石滾痰丸青礞石一兩沉香五錢大黃酒製黃芩各八兩將礞石打碎用硝石一兩同入瓦罐鹽泥固濟曬乾火煅石色如金為度研末和諸藥水丸量人虛實服之薑湯送下服後仰臥令藥在胸膈之間除逐上焦痰滯不宜飲水行動通治實熱老痰怪證百病夫痰之清者為飲飲之濁者為痰故痰者皆因火灼而成而老痰一證其為火之尤盛者也變幻諸病多端難以枚舉然治病者必求其本芟草者必除其根故方中以黃芩之苦寒以清上焦之火大黃之苦寒以開下行之路故二味分兩為獨多但既成之痰亦不能隨火俱去特以礞石稟剽悍之性而能攻陳積之痰者以硝石同煅使其自上焦行散而下然一身之主宰者惟氣而已倘或痰因火病則氣不能調故以沉香升降諸氣上至天而下至泉以導諸藥為之使耳白金丸白金丸子治癲狂心竅痰迷惡血戕七兩鬱金川出者明礬三兩薄荷漿白金丸白明礬三兩川鬱金七兩薄荷糊丸治癲狂失心夫癲狂一證癲多喜笑尚知畏懼證屬不足狂多忿怒人不能制證屬有餘故經云重陽者狂重陰者癲又云邪入於陽則狂邪入於陰則癲但狂病出於肝由盛怒而得者為多即不由怒而亦必傳及於肝乃成斯證以肝者將軍之官有相火內寄其性剛暴故經有怒狂一證治之以生鐵落飲之文癲病則出於心脾皆由憂鬱思想而致然兩病悉能鬱而成火火盛則灼而為痰痰火上乘迷亂君主則失心風等證所由來也鬱金苦降辛開專入心臟開其竅破其結白礬酸鹹而寒能化頑痰能除痼熱以薄荷糊丸者亦辛香宣散其上耳五癇神應丸五癇神應麝砂礬星夏蠶蛇蜈蠍還白附須同薑汁曲仍宜皂角使開關五癇神應丸白附子五錢炮半夏二兩洗南星烏蛇酒浸生礬各一兩全蠍二錢炒娛蚣半條白殭蠶一兩五錢炒麝香三字另研皂角二兩搥碎用水半升揉汁去渣同白礬一處熬干為度生薑汁煮曲糊丸如桐子大飛硃砂二錢半為衣每服三十丸生薑湯食後送下治癇證不論久新時發時止夫癇之為病發則正氣暴厥昏不知人或有聲或無聲病之形態不一時之久暫亦不一必待正氣復返乃已故蘇則其病若失皆由風痰膠痼經絡之中因所感而觸發隨其經絡之所稟而見證及其久也正氣漸虛發時日近然治此病者必乘正氣未虛之時而攻擊之方中白附殭蠶南星半夏皆祛風豁痰之品匯粹用之而又以白礬除其痼熱破其積痰然非靈變善走之物不足以通其經而入其絡故用烏蛇全蠍蜈蚣之善竄者以入絡搜風皂角薑汁所以開其關麝香通其竅而以硃砂安其神寧其君主耳大半夏湯金匱小半夏湯大半夏湯白蜜參胃虛嘔吐病相因須知小半方名異配入生薑或茯苓大半夏湯半夏二升人參三兩白蜜一升上三味以水一斗二升和蜜揚之二百四十遍煮藥取二升半溫服一升余分再服治胃反嘔吐者此湯主之尤氏云胃反嘔吐者由胃虛不能納穀朝食而暮吐也胃脈本下行虛則反逆故以半夏降逆參蜜益虛東垣云生薑之治嘔但治上焦氣壅表實之病若胃虛穀氣不行胸中閉塞而嘔者惟宜益胃推揚穀氣而已此大半夏湯之旨也小半夏湯半夏一升生薑半斤煎服治嘔家本渴渴者為欲解今反不渴心下有支飲故也此湯主之因其雖嘔而飲仍在故以半夏味辛性燥有散結蠲飲之能生薑製半夏之毒且以散逆止嘔也竹瀝達痰丸肆中竹瀝達痰丸礞石沉香半夏甘芩橘大黃參用黨竹油薑汁泛為圓竹瀝達痰丸礞石沉香大黃黃芩半夏橘皮黨參甘草用竹油薑汁泛丸治頑痰膠痼經絡不得解化正氣又虛不能勝滾痰丸之峻劑者夫痰者皆津液所化而膠痼之痰又為火灼所致故治痰者必先降火而降火者又必先理氣方中黃芩清上大黃導下沉香升降諸氣而後礞石得成其消痰散結之功半夏陳皮以匡礞石之不逮人參甘草以助正氣之運行竹瀝行經入絡用其以化皮裡膜外之痰薑汁豁痰和胃又解竹瀝之寒互相為用耳溫膽湯集驗十味溫膽湯溫膽湯方即二陳竹茹枳實兩和勻痰多不寐魂難寄地遠參仁十味名溫膽湯陳皮製半夏茯苓甘草麩炒枳實竹茹加姜煎治膽虛痰擾驚悸不眠等證夫人之六腑皆瀉而不藏惟膽為清淨之腑無出無入寄附於肝又與肝相為表裡肝藏魂夜臥則魂歸於肝膽有邪豈有不波及於肝哉且膽為甲木其象應春今膽虛即不能遂其生長髮陳之令於是土得木而達者因木鬱而不達矣土不達則痰涎易生痰為百病之母所虛之處即受邪之處故有驚悸之狀此方純以二陳竹茹枳實生薑和胃豁痰破氣開鬱之品內中並無溫膽之藥而以溫膽名方者亦以膽為甲木常欲其得春氣溫和之意耳十味溫膽湯本方加人參遠志棗仁熟地治前證因虛而得以致夢遺驚惕虛多邪少之象恐一於除痰則虛者益虛其病益盛故以人參熟地之大補氣血協同棗仁以入於肝膽之地用遠志者取其辛散宣泄之品一則可行補藥之滯一則可交通心腎心腎交則魂亦可賴以安耳金水六君煎景岳新方金水六君煎脾腎營虛痰咳連歸地二陳姜作引潤枯燥濕兩般賢金水六君煎當歸二錢熟地五錢陳皮一錢半半夏二錢茯苓二錢炙甘草一錢原方治肺腎虛寒水泛為痰或年邁陰虛血氣不足外受風寒咳嗽嘔惡多痰喘急等證夫肺腎虛寒水泛為痰之證似宜溫養攝納之藥為妥非泛泛二陳歸地可以治之或老年脾腎兩虛陰血不足而濕痰內盛咳嗽不已者乃可用之凡年高之人血脈枯澀經絡隧道多不流利若有濕邪內盛肺失治節之令則咳嗽連聲斷續不已甚則周身經絡掣痛或悶氣心痛斯時也不得不以二陳之屬化其痰然恐血枯之人不足以當其燥故特加歸地以濡其血而澤其枯方為不偏不倚兩得其宜全在學者酌宜用之耳和胃二陳煎景岳和胃二陳煎亦新乾薑略炒與砂仁胃寒嘔吐痰生膈服下胸中氣自寧和胃二陳煎炒乾姜一錢砂仁五分陳皮製半夏茯苓各二錢炙甘草七分治胃寒生痰噁心嘔吐胸膈滿悶噯氣等證夫胃者為後天生氣之源凡人自有生以來莫不賴此胃中之生氣以為生長故經云有胃則生無胃則死而常賴腎中之真火以為溫養若火土衰微一遇寒邪則痰生飲聚於是嘔惡痞悶等證所由來矣然嘔惡痞噯等疾雖皆為胃病而寒熱虛實皆有之更須察其脈辨其舌詳審病源而施治否則毫釐千里遺誤實多此方以乾薑入胃散寒砂仁入胃理氣寒散氣調再以二陳化痰蠲飲治胃寒而不甚虛者為合法耳消導之劑消者消其積導者行其氣導其滯也凡人之臟腑經絡氣血通暢流行纖毫不滯一有停阻則無形之邪挾有形之痰血飲食互相搏結稽留不去如是則氣道不利日以滋盛則為積為聚為癥為瘕種種諸證所由來也然考其停阻之由皆由脾虛不能運化所致夫脾者具坤順之德有乾健之能消磨穀食變化精微和調五臟灑陳六腑為後天之源為倉廩之本凡人之有生以來莫不賴此以為充長或火力不足或土德衰殘失其運化之職則停阻等病成矣故古人於消導之劑每每與補藥並行以正氣不旺邪滯終不得去若正氣不虛驟為痰血邪滯所困者原可純用攻消之法一切峻劑皆散見各門此類均是緩攻平治等方以及食積內留並消補兼施之法與夫雜治各積之所當知者皆匯於此篇學者參觀可也香砂枳朮丸香砂枳朮夏陳皮六品相和治法奇理氣寬胸痰飲去助脾消導用之醫香砂枳朮丸白朮三兩土蒸枳實一兩麩炒製半夏陳皮木香砂仁各一兩荷葉包陳米飯煨乾為丸治飲食停滯痞悶不消或痰或氣阻塞等證凡醫者之治病也必先定其為外感為內傷而內傷之中又必論其有餘不足夫七情勞倦皆為不足飲食痰血皆為有餘即飲食痰血中亦有屬虛屬實實者固當攻擊虛者則當消而去之枳實破滯削堅行胃中之氣化胃中之食能消能磨無所不至然必以白朮補脾之元氣助脾之健運而贊輔之積之所停氣必為滯故以香砂理之氣滯則痰必聚故以橘半化之用荷葉燒飯為丸者助清陽之氣上升藉穀氣以和脾胃耳保和丸保和丸內夏苓陳查曲連翹菔子尋曲糊作丸痰食去麥芽湯下滯能清保和丸山查三兩神麯炒茯苓半夏各一兩陳皮萊菔子炒連翹各五錢曲糊作丸麥芽湯下或以麥芽入藥亦可治食積停留腹痛痞滿或泄瀉或吐酸等證此為食積痰滯內瘀脾胃正氣未虛者而設也山查酸溫性緊善消腥膻油膩之積行瘀破滯為克化之藥故以為君神麯系蒸冖八音而成其辛溫之性能消酒食陳腐之積萊菔子辛甘下氣而化面積麥芽鹹溫消穀而行瘀積二味以之為輔然痞堅之處必有伏陽故以連翹之苦寒散結而清熱積鬱之凝必多痰滯故以二陳化痰而行氣此方雖純用消導畢竟是平和之劑故特謂之保和耳參朮健脾丸東垣成方參朮健脾丸枳實陳皮查麥傳神麯糊丸米飲下脾虛食滯服之安參朮健脾丸人參二兩陳皮一兩白朮土炒二兩麥芽炒一兩山查一兩五錢枳實三兩神麯糊丸米飲下治脾虛飲食不消此為食積痰滯內瘀脾胃已虛者而設也夫脾胃之虛其來也漸固為病之本而食積停滯其來也驟則為病之標治病當明標本緩急急則治其標故方中雖消補並行而仍以治標為急故君以枳實之苦寒破氣行血消食消痰為磨積之主藥而後以參術駕馭之不使其過而傷正且枳實得參術之力而用益彰參術得枳實則補而不滯兩者互相為用然必竟因食積起見故又以麥芽之化谷山查之化肉而贊助之脾虛停積則氣不行故以陳皮理之用神麯糊丸者助其蒸化米飲下者藉穀氣以和脾胃耳枳實消痞丸東垣枳實消痞丸參朮茯苓甘草乾姜合黃連樸夏麥芽焦虛痞潛消脾自得枳實消痞丸枳實麩炒黃連薑汁炒四錢半夏曲麥芽炒人參白朮土炒茯苓各三錢炙甘草乾薑各二錢厚朴三錢蒸餅糊丸治心下虛痞懶倦惡食右關脈弦夫滿而不痛者為痞痞屬無形之邪自外而入客於胸胃之間未經有形之痰血飲食互結僅與正氣搏聚一處為患故以黃連乾薑並用一辛一苦一散一降則無論寒熱之邪皆可開泄二味實為治痞之主藥然痞結於中則氣壅濕聚必漸至痰食交阻故以枳實破氣厚朴散濕麥芽化食半夏行痰自無膠固難愈之勢但邪之所湊其氣必虛故必以四君子坐鎮中州祛邪扶正並駕齊驅故此方無論虛實之痞皆可治之用蒸餅糊丸者以穀氣助脾胃之蒸化耳葛花解酲湯葛花解酲白蔻砂青陳參朮木香誇二苓澤瀉乾薑曲過飲傷脾濕病查葛花解酲湯葛花白豆蔻砂仁各一錢木香一分青皮陳皮人參白朮炒茯苓各四分炒神麯乾薑豬苓澤瀉各三分治酒積或嘔吐或泄瀉痞滿頭痛小便不利等證夫酒之為物其質雖陰其性則陽故多飲則身熱面赤久則性去而質留質者水也陰也但隨人之臟氣而為病若陽盛者多化濕熱陰盛者多化濕寒然脾胃正氣不虛則隨飲隨化亦無以上諸證治之者先宜以參術補脾之正氣復以乾薑溫脾中之陽而助其健運濕性黏膩故以豆蔻砂仁木香青皮陳皮一派辛香燥烈之品以佐之酒乃谷所釀成故以神麯消之論治酒之法解表利小便亦為兩大法門故以葛花入陽明以解在表之酒濕苓瀉達小腸以滲在裡之酒濕耳陰陽攻積丸喬氏喬氏陰陽攻積丸姜萸烏桂夏苓全巴霜沉珀參延皂酒麴川連萬病安陰陽攻積丸吳茱萸炮姜官桂川烏川連製半夏茯苓元胡索人參各一兩沉香另研琥珀另研各五錢巴豆霜另研一錢為末用皂角四兩煎汁糊丸綠豆大每服八分加至一錢半薑湯下與補脾胃藥間服一方用酒麴糊丸夫積者陰也必有濕痰死血留結於三陰之界其所以成積之由莫不由正虛而得故治積諸方皆以人參駕馭其間為扶正逐邪地步然三陰之結積非辛熱無以開通故以萸桂走肝乾薑入脾烏頭達腎專取辛烈以破至陰之固壘半夏茯苓以開痰閉延胡琥珀以散血結黃連以降其伏陽沉香以理其氣滯而後以巴豆之無堅不破仗辛熱之性盪滌有形之物銳利下行用皂角者取其為破積之先鋒用酒麴者假穀氣以入脾胃消磨其不盡之邪為後隊耳丁香爛飯丸導滯丁香爛飯丸食傷冷積脹難寬木香香附稜莪朮砂智苓皮炙草甘丁香爛飯丸公丁香一兩茯苓皮三兩炙甘草一兩甘松三兩砂仁益智仁各三兩母丁香山稜莪朮香附木香各一兩蒸飯為丸每服一錢半治飲冷傷中食滯不化脘腹疼痛等證夫人之臟腑氣血喜溫而惡寒寒則澀不能流溫則消而去之故凡積之所成無不皆由寒滯而來於是氣為之滯血為之凝飲食亦為之不化則稽留而成積矣方中丁香益智補火以生土木香砂仁導滯而宣中甘松香附通理一切諸氣六藥皆香烈之性各逞其長而行其效則脾胃得其所喜而復其健運之常又以甘草培其不足苓皮行其痰水山稜莪朮行氣破血互為其功為治積之專藥丸以蒸飯者取穀氣而為之資助耳統治諸積方諸般積聚亦須詳何病還宜何藥方酒積葛化神麯蔻茶須椒殼與萸姜谷宜穀麥雞金曲肉賴山查阿魏康蛋積豆豉姜蔻橘面求菔子炒焦香紫蘇姜橘消魚積狗肉宜求杏子霜種種不能詳細記須教藥病兩相當
