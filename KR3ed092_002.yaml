body:
  text: 卷二和解之劑和者和其不和也解者解化之使之不爭而協其平者也凡人之臟腑氣血貴於平和一有偏勝則失其常度由是互為勝負六淫之邪外來七情之病內起夫六淫之邪外來在表者汗而發之在裡者下而竭之皆有方法列於前矣惟傷寒邪傳少陽一經當宜和解以少陽為三陽出表入里之樞紐汗下諸法均非所宜故仲景特立和解一門至若七情內起氣血乖違或脾肝鬱結而不舒或虛邪互並而難解病狀多端有不可以枚舉者皆不得其平而失其和也醫者當詳察其不和而和之此篇皆病之不專在表不專在裡不專於虛不專於實難任汗下補瀉之藥而又總不離汗下補瀉虛實互為乘除者悉類聚於此為和解之劑小柴胡湯仲景少陽和解小柴胡芩夏參甘薑棗居寒熱往來胸脅痛欲知加減讀來蘇小柴胡湯柴胡八兩半夏半升人參甘草黃芩生薑各三兩大棗十二枚另有加減法治傷寒中風少陽證往來寒熱胸脅痞滿默默不欲飲食心煩喜嘔口苦耳聾脈弦或腹痛或脅痛或渴或咳或利或悸或小便不利以及春月時邪瘧發寒熱與夫婦人傷寒熱入血室等證此仲景治少陽傷寒之方也以少陽為樞其經在表之入里里之出表處故邪客少陽之經其治法即不可汗不可攻且補瀉溫清之法皆不得專或為之證不定故特立此和解一法以少陽為稚陽生氣內寓猶草木初萌之時一遇寒氣即萎弱而不能生長是以少陽受寒即有默默不欲飲食之狀本方之意無論其在表在裡或寒或熱且扶其生氣為主故以人參甘草補正而和中正旺即自可御邪然後以柴胡得春初生髮之氣者入少陽之經解表祛邪黃芩色青屬木能清泄少陽之鬱熱乃表裡兩解之意如是則寒熱可愈心煩喜嘔口苦耳聾等證亦可皆平半夏雖生於盛夏然得夏至陰氣而始生能和胃而通陰陽為嘔家聖藥其辛溫之性能散逆豁痰加以薑棗者以寒熱往來皆關營衛使之和營衛通津液也逍遙散局方加味逍遙散逍遙散內芍苓歸柴術荷甘姜用煨血燥肝虛寒熱作調經散逆郁能開山梔並與丹皮入加味逍遙用者裁木鬱難舒易化火有餘怒氣擾成災逍遙散柴胡當歸酒拌白芍酒炒白朮土炒茯苓薄荷煨姜各一錢炙甘草五分治血虛肝燥木鬱不達以致化火化風往來寒熱勞嗽骨蒸以及月經不調等證夫肝屬木乃生氣所寓為藏血之地其性剛介而喜條達必須水以涵之土以培之然後得遂其生長之意若七情內傷或六淫外來犯之則木鬱而病變多矣此方以當歸白芍之養血以涵其肝苓朮甘草之補土以培其本柴胡薄荷煨生薑俱系辛散氣升之物以順肝之性而使之不郁如是則六淫七情之邪皆治而前證豈有不愈者哉本方加丹皮黑山梔各一錢名加味逍遙散治怒氣傷肝血少化火之證故以丹皮之能入肝膽血分者以清泄其火邪黑山梔亦入營分能引上焦心肺之熱屈曲下行合於前方中自能解鬱散火火退則諸病皆愈耳藿香正氣散局方藿香正氣二陳君外感風寒內濕停桔樸紫蘇白芷術腹皮薑棗共相成藿香正氣散藿香紫蘇白芷大腹皮茯苓各三兩白朮土炒陳皮半夏曲桔梗厚朴薑製各二兩甘草一兩每服五錢加薑棗煎治外感風寒內傷濕滯寒熱頭痛胸膈滿悶及傷冷傷暑傷濕瘧疾霍亂吐瀉凡感嵐瘴不正之氣者並宜增減用之夫四時不正之氣與嵐瘴瘧疾等證無不皆由中氣不足者方能受之而中虛之人每多痰滯然後無形之氣挾有形之痰互結為患故此方以白朮甘草補土建中者即以半夏陳皮茯苓化痰除濕繼之但不正之氣從口鼻而入者居多故復以桔梗之宣肺厚朴之平胃以鼻通於肺而口達乎胃也藿香紫蘇白芷皆為芳香辛散之品俱能發表宣里辟惡祛邪大腹皮獨入脾胃行水散滿破氣寬中加薑棗以和營衛致津液和中達表如是則邪有不退氣有不正者哉越鞠丸丹溪越鞠丸方越郁奇諸般鬱結總相宜芎蒼香附山梔曲嘔吐吞酸自可稀越鞠丸醋炒香附蒼朮泔浸炒撫芎神麯炒黑山梔各等分曲糊為丸治諸般鬱結胸膈痞悶吞酸嘔吐飲食不消等證越鞠者發越郁鞠之意也郁者抑鬱不伸之謂也內經本有五郁之治此特以五運而言然五運六氣之郁皆屬無形之邪故雖鬱而易愈若夫濕痰瘀血食積等物有形者一有郁遏則為患多矣而治郁者必先理氣以氣行則鬱行氣阻則鬱結耳故首以香附流行氣分之品為君而以蒼朮燥濕鬱川芎行血鬱神麯消食鬱三者皆能調有形之郁而致平和但鬱則必熱所謂痞堅之處必有伏陽故以山梔之降火化陰中之伏熱使之屈曲下行而合之香附開氣鬱山梔降火鬱亦仿內經五郁之治此丹溪之大法學者尤當臨證變通觀病之所在加減可也橘皮竹茹湯橘皮竹茹治嘔呃久病虛羸胃氣逆半夏麥冬甘草參茯苓薑棗枇杷葉橘皮竹茹湯橘皮竹茹人參甘草半夏麥冬赤茯苓枇杷葉加薑棗煎胃寒者去竹茹麥冬加丁香實火去人參治久病胃虛氣火上逆而成嘔呃等證夫人之常氣皆稟於胃胃者五臟六腑之海其氣常下行虛則逆而上行所謂氣有餘即是火火蒸津液則為痰於是嘔呃之證所由來矣故嘔呃一證無論其寒熱虛實悉因胃病而起也如此方之治胃虛嘔呃病因虛而起者仍以治虛為先故以參甘之助胃氣麥冬之養胃陰二陳除痰散逆竹茹和胃清煩然虛火上逆肺必受戕故以枇杷葉之清金降氣者助胃氣以下行用薑棗者以胃乃衛之源脾乃營之本營衛和則脾胃自不失其常度耳定喘湯定喘湯療哮病方款芩白果杏麻黃蘇桑夏草生薑引寒束金家肺受殃定喘湯白果十粒炒黃麻黃製半夏款冬花各三錢桑白皮蜜炙蘇子各二錢杏仁去皮尖黃芩各一錢半甘草一錢加生薑煎治肺虛感寒氣逆膈熱而成哮喘等證夫肺為嬌臟畏熱畏寒其間毫髮不容其性亦以下行為順上行為逆若為風寒外束則肺氣塑閉失其下行之令久則鬱熱內生於是肺中之津液鬱而為痰哮嗽等疾所由來也然寒不去則鬱不開郁不開則熱不解熱不解則痰亦不能遽除哮咳等疾何由而止故必以麻黃杏仁生薑開肺疏邪半夏白果蘇子化痰降濁黃芩桑皮之苦寒除鬱熱而降肺款冬甘草之甘潤養肺燥而益金數者相助為理以成其功宜乎喘哮痼疾皆可愈也酸棗仁湯金匱酸棗仁湯知茯芎更加甘草妙無窮虛勞煩熱難安寐魂不歸肝邪在中酸棗仁湯棗仁二升甘草一兩知母茯苓川芎各二兩治虛勞虛煩不得眠此湯主之夫肝藏魂有相火內寄煩自心生心火動則相火隨之於是內火擾亂則魂無所歸故凡有夜臥魂夢不安之證無不皆以治肝為主欲藏其魂則必先去其邪方中以知母之清相火茯苓之滲濕邪川芎獨入肝家行氣走血流而不滯帶引知茯搜剔而無餘然後棗仁可斂其耗散之魂甘草以緩其急悍之性也雖曰虛勞觀其治法較之一於呆補者不同也駐車丸千金阿膠梅連丸駐車丸治痢難痊醋煮阿膠搗作丸配入姜連調冷熱當歸和血急能寬若還五色頻頻下夜熱難除陰漸干加入烏梅赤茯苓炒焦黃柏另方傳駐車丸阿膠三兩當歸黃連炒黑各一兩五錢乾薑一兩炮上四味搗篩醋煮阿膠為丸梧子大每服四五十丸晝夜三服米飲下治陰虛下痢發熱膿血稠黏及休息痢原方注云三車運精氣神分治三焦以調適陰陽此因陽熱過旺陰精受傷故用黃連以駐鹿車之驟乾薑以策牛車之疲阿膠以挽羊車之陷當歸以和精氣神之散亂也總之此證因陽熱過旺陰精受傷所有陽邪羈留陰分可知故以阿膠之補血當歸之和血用炮姜引之入陰而復其精血以炒黑黃連從陰分中而祛其陽陷之邪且黃連之苦得乾薑之辛一開一降邪自不留陰自可復耳阿膠梅連丸阿膠黃連炒黑各三兩當歸一兩五錢炮姜一兩黃柏炒黑赤芍藥赤茯苓烏梅肉炒枯各一兩五錢醋煮阿膠為丸梧子大每服三五十丸晝夜三服米飲下治陰虛下痢五色至夜發熱此方主治與前略同但多下痢五色一證夫下痢而五色此為五液下注五臟真陰皆竭若不急去其邪則陰終不能遽復痢仍不止故以黃柏苓芍以助黃連之祛邪而特加烏梅以斂陰不欲其下注耳半夏瀉心湯仲景半夏瀉心連草芩乾薑大棗並人參中虛邪陷因成痞苦降辛開病乃亨半夏瀉心湯半夏半升黃連一兩黃芩炙甘草人參乾薑各三兩大棗十二枚治傷寒嘔而發熱者柴胡湯證具而以他藥下之若表邪內陷胸滿而不痛者此為痞此湯主之夫痞之為病皆由表邪乘虛陷里與胸中素有濕濁交相互結所致表證既無不必復用表藥裡氣又虛又不得不兼顧其里然邪既互結於胸次必鬱而為熱所謂痞堅之處必有伏陽故以芩連之苦以降之寒以清之且二味之性皆燥凡濕熱為病者皆可用之但濕濁黏膩之氣與外來之邪既相混合又非苦降直泄之藥所能去故必以乾薑之大辛大熱以開散之一開一降一苦一辛而以半夏通陰陽行濕濁散邪和胃得建治痞之功用甘草人參大棗者病因裡虛又恐苦辛開泄之藥過當故當助其正氣協之使化耳四逆散仲景四逆散為陽厥方少陰傳熱四肢涼柴胡枳芍和甘草細味傷寒貴審詳四逆散炙甘草枳實柴胡芍藥上四味各等分搗篩白飲和服方寸匕日三服治少陰病陽邪傳裡四逆其人或咳或悸或小便不利或腹中痛等證夫少陰病而見四肢厥冷似乎直中陰寒之證然直中陰寒者決無許多或然之證因寒屬陰而熱屬陽陽主動而陰主靜也此條即於或然證內故可必其為傳經之邪少陽為陽樞少陰為陰樞兩者為陰陽之樞鈕是以小柴胡湯條內所載或然之證與此相同然則此條之邪定自少陽傳來可想矣故仍以柴胡自陰而達陽邪自表而里者仍自里而出表使無形之邪從茲解散然邪既自表而里未免有形之痰食留戀其邪結不開邪終不能盡徹故以枳實破結除痰與柴胡一表一里各得其宜而以芍藥甘草護陰和中相需相濟自然邪散厥回耳進退黃連湯喻嘉言進退黃連喻氏方桂枝參夏棗乾薑緣因上下成關格握運中樞透達良進退黃連湯黃連薑汁炒乾薑炮製半夏人參人乳拌蒸各一錢半桂枝一錢大棗二枚此即仲景黃連湯以大棗易甘草也喻氏治關格證上則嘔吐不納下則二便不通用此方或進或退猶握樞而運使之透達於上下蓋關則不得小便格則吐逆如傷寒論之胸中有熱胃中有寒之意故其治格之盛者當進而從陽本方俱不用制水煎溫服如關之盛者即退而從陰方中黃連減半或加肉桂五分其意以人參大棗坐鎮中樞半夏能和胃而通陰陽於是飲入胃中聽胃氣之敷布或協黃連以除其上熱或偕薑桂以溫其下寒然此法止可治有邪之關格若由噎膈反胃陰枯液涸而成關格者又非此方可治也理氣之劑氣者人身之元氣也自上而下自表而里五臟六腑四肢九竅無不一氣貫通故陽氣者若天與日失其所則折壽而不彰於是六淫之邪外侵七情之病內起無有不關於氣者氣病則血亦病是以治血必先治氣未有血病而氣不病者即血虛一證尚且以補氣為主且人之一身有形者皆屬於陰惟有此氣屬陽若無此氣則一團陰魄豈尚能溫暖一身而日用動作哉修煉家有云分陰不盡則不仙分陽不盡則不死由是觀之氣病則諸病從生矣即以其諸病之因於氣者論之如怒則氣上喜則氣緩悲則氣消恐則氣下寒則氣收熱則氣泄驚則氣亂勞則氣耗思則氣結九氣不同百病多生於氣也全在醫者調之得宜無過無不及以致於平氣冷者溫之熱者清之上逆者降而下之下陷者舉而升之鬱則開之虛則補之如是則理氣之法亦思過半矣補中益氣湯東垣補中益氣出東垣氣陷中虛邪外於參朮升柴歸草等陳皮薑棗炙耆傳補中益氣湯蜜炙黃耆一錢半人參一錢炙甘草一錢冬朮五分土炒當歸五分陳皮五分升麻三分柴胡三分生薑三片大棗二枚治中氣不足營衛衰弱易感風寒頭疼身熱及煩勞內傷清陽下陷等證人身中真陽之氣雖藏於兩腎之中然自有生以來莫不藉脾胃以為充長故東垣發脾胃論言之最詳若脾胃一虛則陽氣生化之源衰少且所以為之敷布而運行者亦失其權於是陽氣下陷衛氣不固則外邪易感但此等寒熱皆邪少虛多之候自當補正以御邪若因表證而僅用表藥則失之過矣方中參朮甘草大補脾胃中氣恐補藥多滯故加陳皮以宣利之黃耆益衛氣而達表當歸和血脈而調營升麻升脾胃之清氣從右而上以達於表柴胡升肝膽之清氣從左而上以達於表加之以薑棗和營衛開腠理致津液御邪扶正兩者兼優此東垣治勞倦內傷之法假之以治外感者也補陰益氣煎景岳補陰益氣取名煎勞倦傷陰外感兼參草地歸陳與藥升柴舉下妙無邊補陰益氣煎人參一錢炙甘草五分生地三錢當歸一錢半懷山藥二錢陳皮一錢升麻三分柴胡三分此方乃小變東垣之制而為勞倦傷陰營虛氣陷易於外感者立法也夫胃者衛之源脾者營之本脾陰虛即營血虧耗故於前方去黃耆之益衛除白朮之燥脾而以地黃之色黃味甘者同山藥補養脾陰藉當歸之力以達於營參草陳皮補中州而益元氣升麻柴胡舉下陷而解表邪不用薑棗者無欲過於辛散耳蘇子降氣湯局方蘇子降氣橘半歸前胡桂樸草姜隨下虛上盛痰多喘或納沉香用者裁蘇子降氣湯蘇子半夏前胡厚朴橘紅當歸各一錢炙甘草肉桂各五分加姜煎治風痰上感喘嗽不寧大便不利或虛陽上攻氣升不降以致上盛下虛而為嘔血等證夫風邪外來必先犯肺於是肺中之氣壅而不行肺中之津液鬱而為痰故喘嗽不寧肺與大腸相表裡肺津虛則大腸不潤故大便不利甚則引動下焦虛陽上逆而為嘔血等證先哲有見痰休治痰見血休治血之論雖證見痰血仍必究其受病之源方中蘇子前胡厚朴皆降氣之品有疏邪之能半夏橘紅化其痰火載血上故以肉桂引火歸元當歸導血歸經上下交病者治其中故以甘草培中補土加姜煎者病因風邪而來仍不離辛散之意耳四磨飲嚴氏四磨飲治七情侵氣逆填胸喘急頻烏藥檳沉參等分濃磨煎服效如神四磨飲檳榔沉香烏藥人參各等分濃磨煎三四沸溫服治七情氣逆上氣喘急妨悶不食等證夫七情之病所因各自不同有虛實之分臟腑之異大抵此方所治皆為憂愁思怒得之者多因思則氣結怒則氣上憂愁不已氣多厥逆故為上氣喘急妨悶不食等證然氣之所逆者實也實者瀉之故以檳榔沉香之破氣快膈峻利之品可升可降者以之為君而以烏藥之宣行十二經氣分者助之其所以致氣之逆者虛也若元氣充足經脈流行何有前證故以人參輔其不逮否則氣暫降而鬱暫開不久又閉矣是以古人每相需而行也若純實無虛者即可去參加枳殼在用者神而明之耳導氣湯導氣湯醫寒疝災吳萸川楝木香茴煎時卻用長流水理氣疏肝邪可追導氣湯川楝子四錢木香三錢茴香二錢淡吳萸一錢長流水煎治陰濕之氣積於肝絡復為寒邪所襲則成疝疾或囊冷結硬如石或引睪丸而痛名為寒疝夫疝雖有寒水筋血氣狐㿗之不同而其病總不離乎肝以肝之經脈絡陰器抵少腹之故然疝雖皆因寒而起但寒鬱則化火且肝臟又有相火內寄故治疝之藥每每寒熱並行須審其熱重熱輕而治之如此方之治寒疝仍以川楝子為君者想亦寒鬱化熱之故川楝苦寒能導泄厥陰之熱從小水下行亦為寒聚於外熱蓄於中痞堅之處必有伏陽也肺邪盛則侮脾故以木香之辛溫疏肝和脾通理上下諸氣肝與腎俱在下焦古人有乙癸同源之論疝病固為肝邪未有不波及於腎者故以茴香之併入肝腎暖丹田而祛冷氣吳萸則獨入厥陰除寒燥濕而降逆耳天台烏藥散天台烏藥散青檳川楝良薑巴豆仁茴木二香和酒服小腸疝氣積寒凝天台烏藥散烏藥良薑木香茴香鹽水炒青皮各五錢檳榔二枚川楝子十枚先以巴豆七十粒微打破同川楝麩炒黑去麩及巴豆同餘藥為末酒下一錢治小腸疝氣牽引臍腹疼痛陰凝成積等證夫治疝之法皆不外暖下祛寒逐濕行氣然陰寒之氣若與厥陰之或血或痰凝結為積者又非前藥所能卒除則必以推蕩之品從其性而溫下之方能有效方中烏藥木香辛溫香烈善行善散能上能下以宣氣中之滯茴香暖下而祛寒良薑溫中而止痛青皮入肝破氣檳榔導積下行其妙用在巴豆與川楝二味同炒去巴豆不用但取其盪滌攻堅剛猛直前之性味同川楝入肝導之下行又不欲其直下之意一如用兵之法巴楝欽點之上將也青檳前導之先鋒也烏藥木香為偏裨之將茴香良薑為守營之官立方之神真戰無不克也疝氣方丹溪疝氣方醫少腹疼寒凝血聚兩相成吳萸枳殼山查炭荔核山梔共研吞疝氣方吳茱萸炒枳殼黑山梔查炭荔枝核煅等分為末空心長流水送服二錢治疝氣疼痛此治疝之因寒而血滯者也夫肝為藏血之地寒則氣不行而血凝澀故以吳萸溫肝逐寒枳殼行氣破滯山查散瘀行積得隨吳萸枳殼以成其功然痞堅之處必有伏陽況又有相火內郁故以山梔直清其火使之屈曲下行荔核辛溫祛寒散滯且其形類睪丸能協諸藥同入肝腎故假之以為引也為末服者恐湯劑不能搜滌故以藥之形質用長流水送服取其直至下焦以治其病耳此又治疝之一法也蘇合香丸局方蘇合香丸犀角安丁沉香附木香傳乳香冰麝辰砂術氣閉痰迷中惡干蘇合香丸犀角鎊研末沉香另研香附丁香木香各一兩乳香白朮各一兩麝香冰片各一錢安息香二兩用無灰酒熬膏蘇合油二兩和入安息膏內右藥為細末入研藥和勻用安息膏加白蜜和藥為丸以飛硃砂一兩為衣蠟殼封固每服一丸開水下治諸中卒暴昏迷痰壅氣閉不省人事以及鬼魅惡氣時行瘴癘等證夫中之為病有中風中寒中暑中濕中痰中氣中食中惡種種不同其病狀大都相似其治法且無論其何邪所中務須先辨其閉脫兩途其閉者雖亦見肢厥脈伏而其兩手必握固二便必閉塞口痙不開兩目直視此為邪氣驟加正氣被遏不得不用芳香開竅之品以治其標或蘇合牛黃至寶紫雪之類審其寒熱別其邪正而擇用之庶幾經隧通而正氣復然後再治其致病之由所因之病若脫證則純屬乎虛雖病狀亦與諸中相似但手撒口開眼合汗出如珠小便不禁全見五絕之候此為本實先撥故景岳有非風之名若一辨其脫證無論其為有邪無邪急以人參桂附之品回陽固本治之尚且不暇何可再以開泄之藥耗散真氣乎須待其根本漸固正氣漸回然後再察其六淫七情或內或外而緩調之則庶乎可也此方彙集諸香以開其閉而以犀角解其毒白朮白蜜匡其正硃砂闢其邪性偏於香似乎治邪中氣閉者為宜耳至寶丹局方至寶丹為卒中方諸般內閉效非常朱雄玳珀犀牛角冰麝牛黃安息香至寶丹犀角琥珀硃砂雄黃玳瑁各一兩牛黃五錢金箔五十張麝香冰片各一錢水安息一兩用無灰酒熬成膏和藥末為丸蠟護每粒三分治一切卒中痧氛瘴氣或痰熱內閉或蠱毒水毒以及小兒癇痙等證牙關緊急先須用此開關然後可以進藥者夫內閉一證卻亦有風痰寒熱之不同如蘇合丸之偏於溫玉樞丹之偏於瀉牛黃紫雪之偏於涼雖各有不同其大要皆不外乎芳香開氣解毒除邪之意用者均可隨證投之此方似亦略偏於涼但不似牛黃紫雪之過於寒故其治痧氛瘴氣蠱毒水毒觀其用藥亦似乎解毒之功長於開竅與玉樞丹有兩相上下之勢玉樞丹之攻毒以剛猛之品至寶丹之解毒用鎮化之功一則猛而一則寬亦在醫者之善用耳方中犀角牛黃皆秉清靈之氣有涼解之功玳瑁金箔之出於水硃砂雄黃之產于山皆得寶氣而可以解毒鎮邪冰麝安息芳香開竅闢鬼通神領諸藥以成其功拯逆濟危故得謂之至寶也紅靈丹紅靈丹藥是仙傳霍亂時邪痧疫干冰麝朱雄金與月牙硝礞石煅須燃紅靈丹飛硃砂一兩當門子三錢梅片三錢牙硝一兩月石六錢飛腰黃六錢煅礞石四錢真金箔五十張專治時瘟急痧霍亂絞腸腹痛面青手冷並四時感冒內閉不通等證夫痧氛之氣亦因地之所蒸而出故其為病也盛於夏秋之時所謂方上之氣高於岑樓不可見也而人於夏月之時陽氣外浮陰不內守在此蒸騰氣交之中最易受邪故方上穢濁積垢之氣隨地而升者亦因人之虛而感受焉但氣屬無形必藉身中之痰濁以為依附然後得以逞其威而成負固不服之勢方中用冰片麝香以開其竅朱雄金箔以鎮其邪二石之除垢豁痰牙硝之瀉熱破積於是無形之邪氣從茲解散有形之濁垢盡得蠲除立方之旨美善兼收是以修合制送者於此最多而服食靈驗者亦於此最捷也小烏沉湯局方小烏沉湯是局方血瘀刺痛氣為殃先煎香附甘烏藥磨入沉香熱服良小烏沉湯香附甘草烏藥磨沉香衝入服之治氣閃血瘀心腹刺痛等證夫閃氣一證因氣機偶為阻滯或跌僕或折挫氣道一阻血亦不行經絡之中即為之痛如針刺之狀者然氣滯為無形雖阻而無跡其痛不常在故痛久不去者必挾絡中之血瘀結不行乃能如此是以治此者必先通絡中之血而治血又必先理氣以血不自行氣行則血行也此方全不用血藥但以香附烏藥辛苦而溫芳香而燥專行氣分之品可宣可散沉香之降氣上至天而下至泉使表裡上下無一毫留著自然血自行而痛自消矣用甘草者痛則筋脈急而正氣傷以和中而緩急也四七湯金匱名半夏厚朴湯四七湯原金匱方茯苓夏樸紫蘇姜咽中痰結難吞吐降逆宣中化吉祥四七湯半夏一升厚朴三兩茯苓四兩蘇葉二兩生薑五兩治七情氣鬱痰涎結聚或咽中如有炙臠咯不出咽不下胸滿喘急或咳或嘔或攻衝作痛半夏茯苓化痰散結厚朴入脾以行胸腹之氣紫蘇達肺以行肌表之氣氣順則痰除故陳無擇三因方以此四味而治七情鬱結之證金匱加生薑者亦取其散逆宣中通徹表裡痰可行而鬱可解也旋覆代赭湯仲景旋覆代赭湯參草生薑半夏和大棗傷寒汗下病難除噫氣時升胸腹飽旋覆代赭湯旋覆花三兩代赭石一兩人參二兩甘草三兩半夏半升生薑五兩大棗十二枚治傷寒發汗若吐若下解後心下痞硬噫氣不除之證夫傷寒既云解後則無邪可知但既經發汗吐下則正虛亦可知正虛無邪而心下痞硬者其必因素有之痰涎虛而不化遏鬱氣道而不通故時欲噫氣以伸之旋覆花能斡旋胸腹之氣軟堅化痰而以半夏之辛溫散結者協助之虛則氣上逆故以代赭之重以鎮之然治病必求其本痞硬噫氣等疾皆由正虛而來故必以人參甘草補脾而安正然後痰可消結可除且旋覆半夏之功益彰其效耳用薑棗者病因傷寒汗吐下後而得則表氣必傷藉之以和營衛也理血之劑血者陰也賴飲食之甘旨生長津液變化而為赤者也理者調理之以復其常度也凡人在母腹中即賴母腹中之血以為護養及至一離母腹即謂之後天故自有生以來莫不賴此脾胃水穀以為生氣生血之源人之一身氣血而已氣陽而血陰衛乃氣之所發營乃血之所流兩者相併不悖一有偏勝則病起矣內經有云營者水穀之精也調和於五藏灑陳於六腑乃能入於脈也生化於心總統於脾藏受於肝宣布於肺施泄於腎灌溉一身目得之而能視耳得之而能聽手得之而能攝掌得之而能握足得之而能步出入升降濡潤宣通靡不由此也注之於脈充則滑而少則澀生旺則諸經恃此長養衰竭則百脈由此空虛血盛則形盛血弱則形衰血者難成而易虧可不謹養乎陰氣一傷諸變立至妄行於上則吐衄妄行於下則腸風衰涸於內則虛勞枯槁於外則消瘦移熱膀胱則溺血陰虛陽搏則崩中濕蒸熱瘀則血痢火極似水則色黑熱勝於陰發為瘡瘍濕滯於血則為癮疹凝澀於皮膚則為冷痹蓄血在上則善忘蓄血在下則如狂跌僕損傷則瘀惡內聚此皆失於攝養變為諸病者故彙集十餘方為一門其於或補養或調經皆於各門中互錄學者前後參觀可也犀角地黃湯濟生犀角地黃芍藥丹血瘀胃熱外生斑傷寒溫疫邪乾血對證施方不用刪犀角地黃湯鮮生地一兩五錢白芍一兩丹皮犀角各二錢五分治時邪溫疫胃火熱盛吐血衄血漱血便血蓄血如狂漱水不欲咽及陽毒發斑等證夫為邪迫血妄行一證不特吐與衄之當分即吐與咳亦宜細辨咽與喉二管各自不同喉在前而咽在後喉通肺而咽通胃故吐血出於胃咳血出於肺衄血出於經所謂衄者因經中之血走而不守隨氣而行火氣急迫故隨經直犯清道上腦而出於鼻也其存胃中者為守營之血守而不走或胃虛不能攝血或為火逼故嘔吐從咽中而出也其從肺竅而出於喉者亦因火載血上故為咳為嗽也是以吐血之熱在腑咳血之熱在臟衄血之熱在經三者各不相同其為火迫則一也至於便血溺血蓄血等證各有虛實成病之源又不可概作火論犀角大寒而屬水其角稟至高輕靈之性能清心肺胃家之邪熱下歸於腎協之以丹皮辛苦而寒退血中之伏火犀角之寒治其源也丹皮之寒疏其流也源流既清則血自不妄行然血既妄行營必傷而陰必耗故加生地芍藥以養陰而護營也代抵當丸代抵當丸歸尾桃穿山生地大黃硝更添肉桂蜜丸子結散瘀消腹不高代抵當丸大黃四兩生地歸尾桃仁甲片元明粉各一兩肉桂三錢蜜丸治傷寒太陽病熱在下焦經病傳腑少腹硬滿小便自利其人如狂以太陽隨經瘀熱在裡必有蓄血用此以代仲景抵當湯丸峻攻之一法夫太陽為多血之經故熱在下焦傳入膀胱之腑者最多蓄血此方與桃仁承氣所異者一則膀胱之熱已傳於胃而有譫語等證故用承氣表未解故用桂枝一則瘀熱在裡未傳於胃表證已解故用抵當原方但用水蛭虻蟲桃仁大黃四味後人恐其太峻故制此方以代之大黃元明粉推蕩瘀熱宿垢行於大腸有熱除血散之意而以桃仁歸尾生地潤以通之肉桂熱以動之穿山甲引之以達瘀所而成其功使所結之邪或消或解或導歸大腸或出自膀胱病去則已耳槐花散本事槐花散服可涼瘀側柏黑荊枳殼居四味相和米飲下腸風臟毒頓消除槐花散槐花側柏葉炒黑荊芥炒枳殼等分為末每服三錢米飲下治腸風臟毒下血之證腸風者下血新鮮直出四射皆由便前而來或風客腸中或火淫金燥以致灼傷陰絡故血為之逼入腸中而疾出也臟毒者下血瘀晦點滴而下無論便前便後皆然此皆由於濕熱蘊結或陰毒之氣久而釀成以致守常之血因留著之邪潰裂而出則滲入腸中而泄矣然二者之血與痔漏之血各自不同腸風臟毒之血出於腸臟之間痔漏之血出於肛門蝕孔處治法亦稍有異同也槐花稟天地至陰之性疏肝瀉熱能涼大腸側柏葉生而向西稟金兌之氣苦寒芳香能入血分養陰燥濕最涼血分之熱荊芥散瘀搜風枳殼寬腸利氣四味所入之處俱可相及宜乎腸風臟毒等病皆可治耳秦艽白朮丸東垣秦艽白朮出東垣痔血艱難痛不寬歸尾桃仁皂角子地榆枳澤面為丸秦艽白朮丸秦艽白朮歸尾酒洗桃仁研各一兩枳實麵炒皂角子燒存性澤瀉各五錢地榆三錢麵糊丸治痔漏膿血雜出大便燥結痛不可忍之證經云飽食遠行經脈橫解腸澼為痔或醉飽入房酒熱留著或忍精不泄流注篡間病乃作矣初起者謂之痔其證有或內或外之不同大抵皆由鬱結之氣蘊釀腸間濕蒸熱瘀其毒留著肛門而生諸痔也宜內服散瘀解毒外敷涼血消腫之品即不然潰久不愈則成漏管矣正氣日虛遇勞則發管不去則漏終不除治法與初起者略有分別此方以秦艽入陽明潤燥宣風能行能散白朮健脾勝濕不特能利腰臍之血結且可使離經之血仍統於脾而協之以歸尾桃仁之破血潤燥枳實皂角之導滯寬腸澤瀉以滲濕地榆以涼瘀丸以緩之亦不欲其速化之意立方之法不愧為四大家之一耳外用地榆炭炒黑和冰片研末摻之極效小薊飲子小薊飲子滑蒲黃藕節山梔生地當竹葉木通甘草等血淋熱結下焦殃小薊飲子小薊炒黑蒲黃藕節滑石木通生地黃炒黑山梔淡竹葉當歸甘草各五分治下焦結熱而成血淋夫淋之為病或膏或砂或石或氣或勞種種不同血者亦其一也必小便閉澀淋瀝而下治此者固當分別然治病必求其本疏流必清其源若不清其源而徒治其流無益也大抵血淋一證無不皆自心與小腸積熱而來心為生血之臟小腸為傳導之腑或心移熱於小腸小腸移熱於膀胱有不搏血下滲而為淋者乎山梔木通竹葉清心火下達小腸所謂清其源也滑石利竅分消濕熱從膀胱而出所謂疏其流也但所瘀之血決不能復返本原瘀不去則病終不能瘳故以小薊藕節退熱散瘀然恐瘀去則新血益傷故以炒黑蒲黃止之生地養之當歸能使瘀者去而新者生引諸血各歸其所當歸之經用甘草者甘以緩其急且以瀉其火也導赤散錢乙導赤散中生地黃草梢竹葉木通良小腸濕熱因心火淋痛難當口舌瘡導赤散生地木通甘草梢淡竹葉等分煎治小腸有火溺赤淋痛口糜舌瘡等證夫淋與濁不必分為二證但察其痛與不痛以及精道溺道之分則寒熱虛實自可瞭然於胸中其從精道而出者除敗精瘀濁阻塞竅道痛則不通外皆屬乎虛或因勞而發者則為勞淋或氣虛下陷時發時止者則為氣淋或腎虛不固精不能藏所出如膏如油者則為膏淋至於砂淋石淋血淋等證悉從溺道而來皆屬小腸膀胱之病大抵因濕熱而致者十常八九因虛寒而成者十無一二然亦有脾虛濕濁下注一證亦出於溺道如婦人之白帶白濁之類但又不可作虛證治統而論之淋之為病一切虛實寒熱無不有傷於陰故此方以生地滋養陰血木通清利濕熱甘草梢達腎莖而止痛淡竹葉清肺熱以下行所謂水出高源源清則流自潔矣此為陰虛濕熱成淋者設也復元活血湯復元活血是柴歸花粉桃紅山甲煨甘草大黃鬚酒浸損傷瘀結痛能開復元活血湯柴胡五錢當歸花粉甘草炙甲片紅花各二錢桃仁五十粒去皮尖研大黃一兩酒浸治跌僕損傷或從高下墜惡血留於兩脅疼痛不可忍者夫跌打損傷一證必有瘀血積於兩脅間以肝為藏血之臟其經行於兩脅故無論何經之傷治法皆不離於肝且跌僕一證其痛皆在腰脅間尤為明證故此方以柴胡之專入肝膽者宣其氣道行其鬱結而以酒浸大黃使其性不致直下隨柴胡之出表入里以成搜剔之功當歸能行血中之氣使血各歸其經甲片可逐絡中之瘀使血各從其散血瘀之處必有伏陽故以花粉清之痛盛之時氣脈必急故以甘草緩之桃仁之破瘀紅花之活血去者去生者生痛自舒而元自復矣四烏湯四烏湯本是成方烏藥還須香附良歸地芍芎甘草等血中氣滯痛難當四烏湯生地當歸白芍川芎烏藥香附甘草治血中氣滯小腹急痛小腹者肝臟所居之所肝經所到之處為藏血之地但血陰而氣陽陽動而陰靜血因氣行氣為血帥由是知血中有氣然後可以調和於五臟灑陳於六腑而後入於脈也若血中之氣一滯則血亦不流為痛為疝為癥瘕諸病均由來矣治法仍宜於血中行氣故以四物湯之養血活血能補能宣者以之為君而以烏藥香附通行十二經之氣上下表里無所不到引領四物為之先聲用甘草者緩其急而和其中使氣血各復其常也十灰散一方薄荷改荷葉十灰散內十般灰茅柏櫚丹茜薄煨二薊梔黃各炒黑妄行諸血遏其危十灰散大薊小薊側柏葉薄荷茜草根茅根山梔大黃丹皮棕櫚皮各等分各燒灰存性紙裹蓋地上一夕食遠服二三錢童便調下治一切吐血咯血不止先用此遏之夫吐血咯血固有陽虛陰虛之分虛火實火之別學者固當預為體察而適遇卒然暴起之證又不得不用急則治標之法以遏其勢然血之所以暴湧者姑無論其屬虛屬實莫不皆由氣火上升所致丹溪所謂氣有餘即是火即不足之證亦成上實下虛之勢火者南方之色凡火之勝者必以水濟之水之色黑故此方彙集諸涼血澀血散血行血之品各燒灰存性使之涼者涼澀者澀散者散行者行由各本質而化為北方之色即寓以水勝火之意用童便調服者取其鹹寒下行降火甚速血之上逆者以下行為順耳花蕊石散局方花蕊石散治血積陰寒凝滯血常失硫黃同和煅成丹童便送之效乃捷花蕊石散花蕊石五兩硫黃二兩上二味同入陽城罐內鹽泥封固煅一伏時研如面每用二錢食遠童便調服治陽虛血凝瘀積壅聚胸膈作痛以及婦人產後血逆血暈胞衣不下或子死腹中俱宜用此重劑竭之使瘀血化為黃水然後以獨參湯調之夫花蕊石散為破血之峻劑功專化血為水而世畏其峻罕能用之葛可久言暴血成升斗者宜花蕊石散若病久涉虛及肝腎二家之血非其所宜與前之十灰散寒熱天淵不可不別當知十灰散專主火炎上湧之血倘誤用以治陰邪迫激之證為害猶輕若誤用花蕊石散治血熱妄行之病為患莫測況血熱妄行者十常八九陰邪迫激者十僅一二所以舉世醫者病者俱畏之如蠍遂致置而不講乃致一切陰邪暴湧之血悉皆委之莫救豈其命耶此方以花蕊石化其既瘀之血硫黃補下焦之火以祛陰邪童便有降下之功且以制二石之悍性耳四生丸妄行血熱四生丸側柏須鮮荷葉元生地再加生艾汁四般共搗服之安四生丸鮮側柏葉鮮荷葉鮮生地鮮艾葉四味共搗汁服之治熱伏陰分血為熱逼而妄行者此即仿金匱柏葉湯之意凡吐血一證熱傷陽絡者當清其火勞傷陽絡者當理其虛有熱伏陰分用寒涼直折其熱而熱仍不解者則必以辛溫芳香之品從血分以宣發其邪使熱自陰出陽然後清之泄之乃為得當如艾葉荷葉雖所入臟腑主治各有不同而性味氣質大都相似芳香入血辛苦而溫且其葉皆有解散之機從此陰中伏熱渙散不留而以側柏生地直清其血況側柏之涼仍寓香燥之意恐留不盡之邪生地之涼乃有安撫之功防有虛羸之失皆用汁者取其新鮮力專之意由是知古方雖簡必有深意存焉學者不可草草忽之也烏金丸烏金丸治婦人瘀血結癥瘕痛不除香附木香莪朮桂五靈乳沒共延胡紅蘇烏藥歸桃配黑豆還須酒煮之豆汁熬膏丸和蜜外須蠟殼謹扶持烏金丸香附四兩童便一盞牛膝一兩五錢同炒去牛膝官桂五靈脂延胡當歸醋炒桃仁去皮尖烏藥各一兩莪朮一兩乳香去油沒藥去油木香各五錢黑豆一升煮汁紅花蘇木各二兩酒五碗將紅花蘇木煎四碗去渣並豆汁熬成膏和蜜為丸每丸重二錢蠟殼為衣治婦人血結癥瘕瘀痛經閉血滯氣滯等證夫婦人血閉之證皆由氣滯不行所致故方中仍以香附為君佐以木香通行表裡上下一切諸氣而再以大隊行血破瘀之藥繼之自能盪滌無餘不留纖翳然既結而成積非湯劑可能速除故用丸以緩之耳黃土湯金匱先便後血黃土湯阿膠朮附地黃襄黃芩甘草龍肝伏脾臟虛衰血失常黃土湯甘草乾地黃白朮附子炮阿膠黃芩各三兩灶中黃土半斤金匱治下血先便後血此遠血也黃土湯主之夫下血一證其源各自不同金匱雖有遠血近血之分而總不出虛實兩途與寒熱之分而已然熱者多實寒者多虛尤為確切凡人身之血皆賴脾臟以為主持方能統御一身周行百脈若脾土一虛即失其統御之權於是得熱則妄行得寒則凝澀皆可離經而下血為之不守也此方因脾臟虛寒不能統血其色或淡白或瘀晦隨便而下故以黃土溫燥入脾合白朮附子以復健行之氣阿膠地黃甘草以益脫竭之血而又慮辛溫之品轉為血病之災故又以黃芩之苦寒防其太過所謂王者之師貴有節制也祛風之劑風者六淫之首百病之長其性則善行數變其病則出入無方故聖人之避風如避矢石一有不謹則邪氣乘之是以上古聖人之教下也皆謂虛邪賊風避之有時但風之客於人也重者為之中輕者為之感冒即中風一證固有表裡臟腑經絡之不同其因虛而得則一也然風有凜冽之寒風此風中即有寒氣所為風送寒來寒隨風入有客賊之風如春時之西風夏時之北風如經所云從前來者為實邪從後來者為虛邪從所不勝來者為賊邪從所勝來者為微邪此等之風皆可乘虛為患者也又如春夏之風風中無寒此乃鼓盪之和風即所謂吹面不寒楊柳風者是也此等之風皆不能獨傷人且中風一證又有南北之不同北方風氣剛勁地高多寒多真中之病南方風氣柔弱地卑多濕多類中之殃類中固所因不一真中亦治法不同總之中之為病無論其為真為類皆急暴之病其來也既驟非延緩可以濟事必須先辨其閉脫兩途大抵邪盛者多見閉證正虛者多見脫證閉者如兩手握固兩目直視二便閉塞口噤不開如此之證即可開之泄之表之里之望其邪去正安若一見脫證或手撒口開或二便自遺或汗出眼合或涎沫不攝如此之證急用固本之法尚恐不暇豈能再及於風哉略述其大概如此小續命湯千金小續命湯桂附芎麻黃參芍杏防風芩甘防己加薑棗真中風邪表實同小續命湯防風一錢二分桂枝麻黃人參杏仁去尖研川芎酒洗白芍酒炒炙甘草黃芩酒炒防己各八分附子四分加薑棗煎治中風卒起或不省人事神氣潰亂或筋脈拘急半身不遂或語言謇澀口眼喎斜以及剛柔二痙一切中風之屬於表實而無里證者皆可增損用之夫風之中人也雖有從前從後所中之不同太陽陽明經絡之各異然太陽主一身之表為寒水之經且風中有寒物從其類故中經必多始自太陽中腑必歸於胃中臟必歸於心也但大風之來無不營衛皆受此時止可分其在經在腑在臟三者之間又不必拘拘乎在營在衛而論如此方所治之不省人事神氣潰亂者乃邪氣驟加正氣不守之象筋脈拘急者筋得寒則收引也半身不遂者乘人所稟陰陽之偏勝氣血之盈虧以致虛邪客於身半也語言謇澀者風中於絡而舌本強也口眼喎斜者受邪之處反緩正氣為邪所引而急也方中用麻黃桂枝防風防己大隊入太陽之經祛風逐濕者以開其表邪壅於外則裡氣不宣里既不宣則鬱而為熱故以杏仁利之黃芩清之而邪之所湊其氣必虛故以人參甘草益氣而調中白芍川芎護營而和血用附子者既可助補藥之力又能濟麻黃以行表也薑棗為引者亦假之以和營衛耳三生飲三生飲是附烏星補正還宜加人參少用木香理氣滯中風昏憒不知人三生飲生南星一兩生川烏去皮生附子各五錢去皮木香二錢每服一兩加人參一兩煎治中風卒然昏憒不省人事痰涎壅盛語言謇澀等證夫中風之為病大抵陽氣虛者為多而陽虛之人必多痰濕肌體雖豐其經絡隧道之氣壅滯故一中於風即見其素有之本病而為以前諸證是以東垣有云凡人年逾四旬氣衰之際或憂喜忿怒傷其氣者多有此證壯歲之時無有也若肥盛者則間有之亦是形盛氣衰而如此耳當此之時豈尋常藥餌所能通達於上下哉急以三生飲一兩取其行經逐風治痰有斬關奪門之勢然必以人參兩許駕馭其間以助真氣然後南星之辛烈散風除痰烏頭附子之辛熱行經絡逐風寒各奏其功加木香以理其氣使之上下表裡無一毫壅滯自然邪自去而正不傷乃為妙法耳地黃飲子河間地黃飲子斛蓯蓉桂附苓萸菖遠冬戟味薄荷薑棗引風痱言謇足難從地黃飲子熟地巴戟去心山茱萸肉蓯蓉酒浸附子炮官桂石斛茯苓石菖蒲遠志麥冬五味子等分每服五錢入薄荷少許薑棗煎服治中風舌喑不能言足廢不能行此少陰氣厥不至名曰風痱急當溫之夫中風一證有真中有類中真中者真為風邪所中也類中者不離陰虛陽虛兩條如腎中真陽虛者多痰多濕真陰虛者多火多熱陽虛者多暴脫之證陰虛者多火盛之證其神昏不語擊僕偏枯等證與真中風似是而實非學者不得不詳審而施治也此方所云少陰氣厥不至氣者陽也其為腎臟陽虛無疑矣故方中以熟地巴戟山萸蓯蓉之類大補腎臟之不足而以桂附之辛熱協四味以溫養真陽但真陽下虛必有浮陽上僭故以石斛麥冬清之火載痰升故以茯苓滲之然痰火上浮必多堵塞竅道菖蒲遠志能交通上下而宣竅辟邪五味以收其耗散之氣使正有攸歸薄荷以搜其不盡之邪使風無留著用薑棗者和其營衛匡正除邪耳牽正散改容膏口眼喎斜牽正散陽明風中邪干漫殭蠶白附蠍全投酒服二錢功可贊尚有改容膏外塗蓖麻冰片共捶爛或加附子與乾薑溫散追風速除患牽正散白附子殭蠶全蠍等分為末每二錢酒調服治中風口眼喎斜無他證者夫中風口眼喎斜一證金匱有言邪氣反緩正氣即急正氣引邪喎僻不遂數語尤注謂其受邪之處筋脈不用而緩無邪之處正氣獨治而急是以左喎者邪反在右右喎者邪反在左也然足陽明之脈挾口環唇足太陽之脈起於目內眥足少陽之脈起於目外眥則中風一證無不皆自三陽而來然二氣貫於一身不必分左血右氣但左右者陰陽之道路緣人之稟賦各有所偏於是左右不能兩協其平偏弊相仍外邪乘襲而病作矣此方所治口眼喎斜無他證者其為風邪在經而無表裡之證可知故以全蠍色青善走者獨入肝經風氣通於肝為搜風之主藥白附之辛散能治頭面之風殭蠶之清虛能解絡中之風三者皆治風之專藥用酒調服以行其經所為同氣相求衰之以屬也改容膏蓖麻子一兩冰片三分共搗為膏寒月加乾薑附子各一錢左喎貼右右喎貼左即正或用鱔魚血調塗或用蜣螂搗敷蓖麻鱔血蜣螂皆追風拔毒冰片以開其竅薑附以溫其寒治法不越乎此凡人之眼耳口鼻皆在於上何以耳鼻不喎而獨喎於口目以風為陽邪陽主動口目常動故風生焉耳鼻常靜故風息焉由是觀之則中風口眼喎斜之義思過半矣活絡丹活絡丹中用膽星二烏乳沒地龍尋酒丸酒下能通絡風血痰涎閉在經活絡丹川烏草烏各炮去皮臍各六兩膽星六兩乳香去油沒藥去油各三兩三錢地龍洗焙乾三兩三錢酒丸酒下治中風手足不仁日久不愈經絡中有濕痰死血腿臂間忽有一二點痛夫風之中於經也留而不去則與絡中之津液氣血渾合不分由是衛氣失其常道絡中之血亦凝而不行絡中之津液即結而為痰經絡中一有濕痰死血即不仁且不用腿臂間痛所由來也然治絡一法較治腑治臟為難非湯劑可以盪滌必須用峻利之品為丸以搜逐之故以川烏草烏直達病所通行經絡散風邪逐寒濕而膽星即隨其所到之處建祛風豁痰之功乳沒之芳香通絡活血行瘀蚯蚓之蠕動善穿用為引導用酒丸酒下雖欲其緩而仍欲其行也蠲痹湯嚴氏蠲痹湯醫風氣痹羌防草芍共歸耆薑黃薑棗同煎服體痛筋攣手足痱蠲痹湯黃耆當歸酒洗赤芍酒炒羌活防風片子姜黃酒炒炙甘草加薑棗煎治中風項背拘急手足冷痹腰膝沉重舉動艱難等證夫風痹一證有痹於筋骨肌肉經絡營衛種種之不同其痹於筋骨者另已論之矣然邪之所入無不先自營衛經絡肌肉而及於筋骨也故當乘其初入之時和營衛通經絡散風啟閉則痹著之邪自可渙然解釋矣此方用黃耆益衛氣而以防風羌活之善走者輔之使之補而不滯行而不泄且兩功並建相得益彰歸芍和營血而以片子薑黃之走血行氣能除寒而燥濕者佐之然後三氣之邪自無留著之處甘草和諸藥而緩中補虛薑棗通營衛而生津達腠故此方之治痹非關肝腎虛筋骨為病者服之效如桴鼓立方之意真所謂盡美耳獨活寄生湯千金千金獨活寄生湯四物參苓辛草防膝仲秦艽肉桂等風寒濕痹下虛方獨活寄生湯獨活桑寄生秦艽防風細辛當歸酒洗芍藥酒炒川芎酒洗熟地黃杜仲薑汁炒牛膝人參茯苓甘草桂心各等分每服四錢治肝腎兩虛風濕內攻腰膝作痛冷痹無力屈伸不仁等證此亦肝腎虛而三氣乘襲也故以熟地牛膝杜仲寄生補肝益腎壯骨強筋歸芍川芎和營養血所謂治風先治血血行風自滅也參苓甘草益氣扶脾又所謂祛邪先補正正旺則邪自除也然病因肝腎先虛其邪必乘虛深入故以獨活細辛之入腎經能搜伏風使之外出桂心能入肝腎血分而祛寒秦艽防風為風藥卒徒周行肌表且又風能勝濕耳清空膏東垣清空膏法治頭風偏正頭風火上攻芎草羌防柴上散芩連降下用茶沖清空膏酒炒黃芩酒炒黃連羌活防風各一兩柴胡七錢川芎五錢炙甘草一兩五錢為末每服三錢茶調如膏白湯送下治偏正頭痛年深不愈及風濕熱上壅頭目腦中苦痛不止而成頭風病夫頭風一證有新久之不同偏正之各異且病情有因風因寒因火因濕因痰因血虛因氣虛之分而治法亦當各因而別大抵淺而近者名頭痛深而遠者為頭風新者多寒多實久者多火多虛總之此病之始無不因風而來以風氣通於肝肝之氣最易上升故治此者無論何因皆不能不用風藥以高巔之上惟風可到也然肝有相火內寄一召外風即風火相燃隨氣而升不待久郁而火已成也故無論何因苦降之藥亦不可少是以東垣此方用羌防柴芎之入肝搜風者上行而解散其邪即以酒炒芩連之苦寒先升後降以逐其火甘草緩急調中協和各藥用茶者取其稟至清之氣能除上焦之濁垢下行耳清震湯河間古法河間清震湯升麻荷葉術須蒼雷頭風病頭鳴響壯熱憎寒面目張清震湯升麻蒼朮各五錢荷葉一枚煎服治雷頭風頭面疙瘩腫痛或鳴響憎寒壯熱狀如傷寒此亦時溫疫邪之一端也凡溫疫一證為天地厲氣所鍾故其氣之襲人也有表裡寒熱上下之不同而其間皆有毒厲之氣在焉若寒疫之來雖在上在表用藥固當升散但升散之中務須寓以辟邪解毒之治如升麻之性陽味甘氣升能解百毒而宣散外邪蒼朮辛溫雄壯燥濕強脾能闢除瘴癧之氣亦能解散外邪且二味皆入陽明是以疫癘之氣無論在表在裡皆至陽明以胃為中土萬物所歸故即屬裡屬火者又須犀角羚羊之類加之以清邪解毒也荷葉色青氣香形仰象震能助胃中清陽上行甘溫辛散以升發之合同前二味使邪從上越且固胃氣使邪不傳裡耳烏頭湯金匱烏頭湯為金匱方黃耆甘草芍麻黃病由歷節伸舒痛逐濕行痹更助陽烏頭湯麻黃芍藥黃耆炙甘草各三兩烏頭五枚㕮咀另以蜜二升煎取一升即出烏頭右四味以水三升煮取一升去滓內蜜於中更煎之服七合不知盡服之治病歷節不可屈伸疼痛以及腳氣疼痛等證尤注云此方治寒濕歷節之正法也夫寒濕之邪非麻黃烏頭不能去而病在筋骨又非如皮毛之邪可一汗而散者故以黃耆之補白芍之收甘草之緩牽制二物俾得深入而去留邪如衛瓘監鍾鄧入蜀使其成功而不及於亂乃制方之要妙也讀者若能將前後諸方反覆詳玩融會貫通自然胸有成竹臨證不難效驗耳稀涎散通關散稀涎散子吐風痰皂角還須共白礬若用開關吹鼻嚏細辛牙皂合成丹稀涎散皂角四挺去皮弦炙白礬一兩共為末溫水調下五分治中風暴僕痰涎壅盛氣閉不通可先用此令微吐稀涎續進他藥亦治喉風痰閉等證夫風痰壅盛於上有升無降最為急候當此之時化之則不可化降之又不能降惟有用吐法引而越之最為捷徑且吐之一法自古有之故仲景傷寒論中瓜蒂散梔子鼓湯尚分別虛實而用何況中風暴僕痰涎壅盛以及喉風卒發等證皆起於一時無暇緩治哉凡人咽喉二竅關係一身喉通於肺以司呼吸咽通於胃以納水穀若一旦風痰暴壅其不致氣閉而絕谷者幾希矣方中用皂角辛鹹而溫無微不入無竅不達有斬關奪門之功具搜風滌垢之用協白礬之酸苦湧泄使風痰皆從上散閉可通而食可進矣通關散細辛牙皂各等分為末吹鼻取嚏此亦治中風閉證之一法也凡邪氣驟加正氣被遏經隧不通肢厥脈絕此時不特藥力所不能達且亦不能進惟有取嚏一法先開其關使肺氣一通則諸臟之氣皆通然後方可用藥施治二味皆辛散之品俱能開竅均可上行合之為散以搐鼻中一取嚏而關即通也虎骨四斤丸方名虎骨四斤丸下部虛寒三氣干牛膝木瓜並附子天麻共和肉蓯乾虎骨四斤丸木瓜天麻牛膝肉蓯蓉用酒洗去腐各一斤附子炮二兩虎脛骨一具酥炙上四味以醇酒五升浸春五夏三秋七冬十日取出焙乾切片爆燥同附子虎骨為細末用浸藥酒打糊為丸如梧子大每服五七十丸食前鹽湯臨臥時用浸藥酒送下浸藥酒完以陳酒服之治肝腎虛寒而挾風濕足膝疼痛等證夫風寒濕之邪固皆必乘虛而受然痹之一證何以下傷肝腎而不上及心肺者以肝主風腎為寒水之臟同氣相求物各從其類也況肝腎素虛者乎蓋肝腎同居下部肝主一身之筋腎主一身之骨故肝腎一病即見足膝疼痛等證方以蓯蓉牛膝補肝而益腎虎骨天麻健骨而搜風附子通閉治寒木瓜舒筋祛濕用酒浸酒丸酒下者取其行經絡開痹著之意耳祛寒之劑寒者六淫之一於時為冬於五行為水於二氣則屬陰但六氣之中惟寒為最厲觀夫君子貴陽賤陰之說故易與天地准坤之初六曰履霜堅冰至懼其陰長也其於人也亦然若身中之陽氣不足則不特外寒乘虛襲入而陽虛即寒從中生仲景為醫方之祖以傷寒為大病蓋寒為陰慘肅殺之氣恐其陰盛陽衰生氣漸絕特立各方以垂於後凡寒在表者當宜溫散寒在裡者可與溫宣其他一切雜病之因寒而起或虛或實之不同或氣或血之各別皆可因此類推不過治寒諸法之中皆當顧護元陽為主所謂陽氣者若天與日失其所則折壽而不彰道家有分陽不盡則不死分陰不盡則不仙之語並可參悟茲集除發表之外特採治寒各方而切於時用者均列於後理中湯仲景附子理中湯枳實理中湯理中湯主理中鄉甘草人參術黑姜腹痛陰寒肢厥冷或加附子可扶陽原方加入苓和枳枳實理中名號良寒實結胸痛欲絕中虛挾滯妙非常理中湯白朮陳壁土炒二兩人參炮姜炙甘草各一兩治傷寒太陰病自利不渴寒多而嘔腹痛便溏脈沉無力或厥冷拘急或結胸吐蛔及感寒霍亂等證此脾陽虛而寒邪傷內也夫脾陽不足則失其健運之常因之寒凝濕聚然必其為太陰寒濕方可用此方法否則自利嘔痛等證亦有火邪為患者故醫者當望聞問切四者合闡庶無差之毫釐繆以千里之失若表裡寒熱虛實既分又當明其病之標本如以上諸病雖系寒凝濕聚皆因脾陽不足而來則陽衰為本寒濕為標是以方中但用參朮甘草大補脾元加炮姜之溫中守而不走者以復其陽和自然陽長陰消正旺邪除耳如寒邪盛者本方加附子一枚名附子理中湯因乾薑之守而不走不足以祛散其寒故加附子之性剛善行者以協濟之本方加茯苓枳實各一兩名枳實理中湯治寒實結胸胸膈高起手不可近者夫寒為無形之邪溫之自去若挾身中有形之痰濕互結不散則為實矣故必以枳實之破氣下痰茯苓之分消利濕乃為得當耳四逆湯仲景四逆湯中姜附甘三陰吐利四肢寒脈微欲絕陽將竭加入人參正氣全四逆湯附子生用一枚乾薑一兩甘草一兩煎成冷服治三陰傷寒身痛腹痛下利清穀惡寒無汗四肢厥冷或反不惡寒面赤煩躁裡寒外熱或乾嘔或咽痛脈沉微細欲絕之證此治直中寒邪之證也理中湯因中焦陽虛寒凝濕聚其來也漸其治亦可從緩且其見證虛象居多故用藥亦純歸溫補此為寒邪直中其來也驟所見之證自表至里皆寒邪充徹之象此時無暇固本不得不用急則治標之法盛則逼陽於外而見假熱等證故以生附子之大辛大熱解散表裡之寒邪不留纖芥仍以乾薑之守而協濟之用甘草者一則恐薑附之僭一則寓補正安中之意耳煎成冷服者寒盛於中逼陽於上熱飲則格拒不納所謂熱因寒用治寒以熱涼而行之也四逆加人參湯治證同前而為裡虛者固本耳當歸四逆湯仲景當歸四逆加吳茱萸生薑湯仲聖當歸四逆湯辛通桂芍棗甘良久寒加入姜萸等發表溫中肝病康當歸四逆湯當歸桂枝芍藥細辛各三兩炙甘草木通各二兩大棗二十五枚擘治厥陰傷寒手足厥冷脈細欲絕者柯韻伯云此治厥陰傷寒發散表邪之劑也厥陰居兩陰交盡名曰陰之絕陽外傷於寒則陰陽之氣不相順接故手足厥冷脈微欲絕然相火居於厥陰之位雖寒傷於外里仍有熱故先厥者後必發熱因厥陰為藏血之地故以當歸為君養血之中仍寓辛苦溫宣之意協桂枝達表以散寒邪肝苦急以甘緩之故用甘草大棗之甘肝欲散以辛散之故用細辛之辛內有相火故用芍藥木通之寒且行且泄況桂枝得歸芍生血於營細辛同甘草行氣於衛如是則營氣得至於手太陰而脈自不絕衛氣行於四末則手足自溫矣若其人內有久寒則相火亦不足故加吳萸之辛熱通達厥陰之臟生薑之辛散自里達表清酒以溫經絡此又治厥陰內外兩傷於寒之一法也真武湯仲景真武湯能壯腎陽茯苓朮芍附生薑少陰腹痛陰寒盛水氣汪洋病勢猖真武湯附子一枚炮白朮二兩炒茯苓白芍炒生薑各三兩治少陰傷寒腹痛小便不利四肢沉重疼痛自下利者此為有水氣或咳或嘔或小便不利等證另有加減之法夫腎象為坎一陽居於二陰之中人之真陰真陽皆寓於此若人之真陰耗竭陰虛火動即真火化為邪火龍雷之勢莫可底止或真陽衰微陽虛陰勝即真水亦化為邪水其汪洋之勢浩浩難當況可更加外寒侵奪者哉故水動於裡而見腹痛下利小便不利水溢於表而見四肢沉重疼痛真武北方水神能鎮攝真陽祛除邪水故君以大辛大熱之附子直入腎經奠安陰中之陽水本潤下逆則上行故用白芍之酸苦以收炎上之氣然後以生薑之辛散之於外茯苓之淡滲之於下白朮之扶土勝濕宣之於中使少陰之樞機有主則開闔得宜小便得利下利自止腹中四肢之邪均解矣大建中湯金匱大建中湯參與姜蜀椒煎好入飴糖胸中寒氣衝皮起嘔吐頻仍痛莫當大建中湯蜀椒炒二合乾薑四兩人參二兩煎去滓內飴糖一升微煎溫服治心胸中大寒痛嘔不能飲食腹中寒氣上衝皮起出見有頭足上下痛而不可觸近者夫陽受氣於胸中胸中之陽不足則陰寒得以乘之為痛為嘔所由來也然寒為無形之邪必賴有形之物或痰或血或食或蟲以為依附否則雖滿痛而決不拒按以至手不可近也但痰血蟲食均有見證可察如此證之上衝皮起出見有頭足之形可見非痰非血非食其為蟲痛也無疑而蛔動入膈者皆因臟寒而來故治法必先溫建其中臟而後蛔可安寒可除用人參飴糖補中以乾薑之辛熱守而不走以復其陽更用蜀椒之大辛大熱上至肺而下至腎逐寒暖胃散積殺蟲自然蟲去正安法之盡善者也小建中湯仲景黃耆建中湯小建中湯芍藥多桂甘薑棗納飴和中虛腹痛肝邪急增入黃耆補力優小建中湯桂枝生薑各三兩芍藥六兩甘草一兩大棗十二枚飴糖一升後入溫服治傷寒陽脈澀陰脈弦腹中急痛以及傷寒二三日必悸而煩金匱又治虛勞裡急悸衄腹中痛夢失精四肢痠疼手足煩熱咽乾口燥等證合三條觀之則知此方之治中虛木賊之病可知然前二條既冠以傷寒二字則知其肝脾雖病於裡而外寒仍留於表之意後一條則純是肝脾為患肝有相火故現出總總諸證桂枝得生薑可以散表桂枝得白芍可以平肝是以仲景桂枝湯一方外散風邪而救表內伐肝木以防脾足見仲景之方並不拘定用法但此方因土虛木克起見故治法必以補脾為先脾欲緩急食甘以緩之故以飴糖大棗甘草之甘緩小小建其中臟然後桂枝生薑白芍出表入里隨病勢而各奏其長況生薑大棗有協和營衛之妙白芍甘草具安脾止痛之神立方之意真亦神化極矣黃耆建中湯即本方加黃耆一兩金匱治虛勞裡急諸不足而裡急者即如上之裡虛脈急腹中引痛之象亦肝脾之病也虛勞諸不足者陰陽形氣俱不足也故加黃耆內益元氣外固表陽自然充虛塞空正氣旺而諸邪自退耳厚朴溫中湯厚朴溫中陳草苓乾薑草蔻木香勻生薑和胃兼除痛脹滿因寒用卻靈厚朴溫中湯厚朴薑汁炒陳皮去白炙甘草木香草蔻乾薑茯苓生薑煎服治脾胃虛寒心腹脹滿及秋冬客寒犯胃時作疼痛等證夫寒邪之傷人也為無形之邪若無有形之痰血食積互結則亦不過為痞滿為嘔吐即疼痛亦不致拒按也故以厚朴溫中散滿者為君凡人之氣得寒則凝而行遲故以木香草蔻之芳香辛烈入脾臟以行諸氣脾惡濕故用乾薑陳皮以燥之茯苓以滲之脾欲緩故以甘草緩之加生薑者取其溫中散逆除嘔也以上諸藥皆入脾胃不特可以溫中且能散表用之貴得其宜耳理陰煎景岳新方熱陣理陰煎血弱中虛寒氣綿歸地炮姜甘草炙或加桂附在人添理陰煎熟地五錢當歸三錢炙甘草一錢炮姜一錢方後另有加減法治營陰虛弱寒氣內乘或腹痛嘔吐或久虛瀉痢以及婦人經遲血滯等證此理中湯之變方也理中者理中焦之陽故用參術此則理中焦之陰故用歸地凡人之臟腑各有陰陽倘二氣不能兩協其平則有勝負而為病矣中焦陽氣不足而受寒者固前人論之屢矣中焦陰血不足而受寒者其方未多見故景岳理陰煎一方實為最切於時用者也方中用歸地補養陰血即以炮姜溫中逐寒然恐其剛燥太盛故以甘草之和中補土緩以監之且歸地得炮姜不特不見其滯而補陰之力愈見其功故凡血虛之盛者若用一派陰柔膩藥非惟血不能生即陽氣亦從茲敗壞是以溫補一法得陽生陰長之理為萬世之準繩也半硫丸二味黑錫丹陽虛便閉半硫丸薑汁糊成老者安上盛下虛宜黑錫鉛硫二味妙通玄半硫丸半夏倭硫黃等分生薑汁糊丸治老人命門火衰胃逆不降濁陰凝聚大便閉結等證夫大便不通一證其源各異有邪實成閉者熱則當清寒則當溫血枯而不能潤澤者宜歸地之屬增水行舟氣虛而無力運送者宜參耆之類助元推蕩此為命火衰微胃濁不降而致故以半夏和胃而通陰陽硫黃益火消陰潤腸滑便然後胃與大腸皆得復其常所謂六腑皆以通為用也二味黑錫丹黑鉛硫黃各二兩將鉛溶化漸入硫黃俟結成片傾地上出火毒研至無聲為度治腎虛根本不固上盛下虛頭目眩暈以及痰喘氣促息微不續等證鉛稟北方水色鹹寒入腎鎮逆養陰硫助命火之陽辛潤通腸固真導濁二味凝合成胎使之水火交戀於腎中陰陽互根於下部真古人之立方皆屬不可思議耳黑錫丹局方局方黑錫用鉛硫茴木沉香補骨投肉蔻金鈴陽起石蘆巴桂附下寒收黑錫丹黑鉛二兩硫黃二兩肉桂製附子各五錢木香沉香小茴故紙陽起石水飛川楝子葫蘆巴酒浸炒肉果麵裹煨以上各一兩用新鐵銚先將鉛熔化下硫黃末提起以木杵擂極細末放地土上退火氣同餘藥研一日至黑光色為度酒糊丸如桐子大陰乾入布袋內擦出光瑩每服四十丸空心薑湯下女人艾湯下或棗湯下治真元虛憊陽氣不固膀胱冷氣逆沖夜多小便男子精冷遺泄婦人白帶虛寒以及一切陰證陰毒服之大能升降陰陽墜痰定喘夫腎為坎象一陽居於二陰之間人之真陰真陽皆寓於此一有偏勝則病變百出矣如真陽虛乏者不特寒從外來且寒自內生盛則逼陽於上或遺脫於下種種變證莫可枚舉然欲補真陽之火必先回護真陰故硫黃黑鉛兩味皆能入腎一補火而一補水以之同炒使之水火交戀陰陽互根之意而後一派補腎壯陽之藥暖下焦逐寒濕真陽返本陰液無傷寒則氣滯故以木香理之虛則氣泄故以肉果固之用川楝者以肝腎同居下焦肝有相火內寄雖寒盛於下恐肝家內郁之火不淨耳故此方治寒疝一證亦甚得宜丁香柿蒂湯丁香柿蒂胃寒宜呃逆頻仍取用醫須入人參扶正氣生薑散結自神奇丁香柿蒂湯丁香柿蒂各二錢人參一錢生薑五片治呃逆因寒而起者夫呃逆一證其聲短促連續不斷之象雖其證有火有寒皆能所致然無不皆自胃腑而來者以胃氣下行為順上行為逆或邪搏胃中則失其下降之令即上出於口而為呃矣昔人有謂腎病者究竟臟氣不能上至於口必因於胃而出也亦猶咳之一證雖有五臟之分然亦總不離於肺也方中以丁香溫胃祛寒補火生土柿蒂苦溫降氣生薑散逆疏邪二味皆胃經之藥用人參者以祛邪必先補正然後邪退正安且人參入胃鎮守於中於是前三味之功益臻效驗耳九轉靈砂丹九轉靈砂是妙丹汞硫二味煉成難下虛上盛痰多喘服用參湯氣可還九轉靈砂丹水銀三兩硫黃三兩上二味用文火炒成砂子入水火鼎中煉成為末米飲送服一錢或用參湯更妙治諸虛錮冷上盛下虛或眩暈喘促或痰涎壅塞一切真氣上逆脫絕等證此方用水銀硫黃二味亦猶黑錫丹中黑鉛硫黃之意水銀色黑質重能入腎家為陰中之陰硫黃入腎補火為陰中之陽二味交煉成丹有陰陽互根之象故能鎮逆返元扶危濟急真不愧名稱其實也況又以人參之大力煎湯送下引至下焦而成其功乎
