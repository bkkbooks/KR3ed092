body:
  text: 卷一補養之劑補者補其不足也養者養其生氣也蓋人稟天地之和氣以生陰陽本兩協其平自無偏勝之弊得以盡終其天年然天地有五運六氣之不齊寒暑水旱之乖戾於是則陰陽不得其平有亢害承製之理則人之所稟於天地者亦失其和而致其偏矣人身中陰陽既不能兩協其平此勝則彼負彼盛則此衰勝負相乘盛衰相侮而禍患即隨之以生不特外感六淫之邪乘虛相襲且陽虛者寒動於中陰虛者熱生於內疾病夭折之所由來也故造物者特生此草木金石稟天地之偏氣以生者而為之補偏救弊焉雖然此特言其稟賦之偏勝而言者也至若自有生以來或因飲酒嗜欲耗其真陰真陽或因飢飽勞役傷其臟腑營衛種種變幻無不皆由虛而得之如久虛不復則生氣日退病勢日進其不至於喪亡者幾希矣全在醫者察其不足之所處而填補之觀其生氣之所在而培養之如是則致其平而復其常雖有大風苛毒莫之能傷正氣復而邪不幹所謂聖人不治已病治未病也茲故彙集補養各方以居其首六味地黃丸錢氏桂附八味丸知柏八味丸八仙長壽丸杞菊地黃丸金匱腎氣丸參麥地黃丸六味丸為補法先三陰虧損病相兼地黃八兩山山四苓澤丹皮三數添益火更宜加桂附陽強知柏制燎炎八仙長壽增冬味目疾肝虛杞菊賢金匱有方名腎氣車牛桂附水邪堅原方加入洋參麥壯水清金上下填六味地黃丸熟地八兩山茱萸四兩懷山藥四兩澤瀉三兩丹皮三兩茯苓三兩此方大補肝脾腎三臟真陰不足精血虧損等證古人用補必兼瀉邪邪去則補乃得力故以熟地大補腎臟之精血為君必以澤瀉分導腎與膀胱之邪濁為佐山萸之補肝固精即以丹皮能清泄厥陰少陽血分相火者繼之山藥養脾陰茯苓滲脾濕相和相濟不燥不寒乃王道之方也本方加肉桂製附子各一兩名桂附八味丸治命門真陽不足虛羸少氣等症以桂附加入六味方中便能溫養陰中之陽王冰所謂益火之原以消陰翳也本方加黃柏知母各一兩名知柏八味丸治命門真水不足相火炎熾等證以知柏加入六味方中便能資助陰中之陰王冰所謂壯水之主以制陽光也本方加五味子二兩麥冬三兩名八仙長壽丸治肺腎陰虧虛損勞嗽等證麥冬養陰保肺更加五味子使之金水相生斂其耗散宜乎可治以上等證而有長壽之名也本方加枸杞子甘菊各三兩名杞菊地黃丸治肝虛目疾等證枸杞子溫潤補肝甘菊花搜風明目合之六味為乙癸同源之治凡肝腎不足而有目疾者皆可用之本方加桂附各一兩懷牛膝車前子各三兩名金匱腎氣丸治脾腎真陽大虛水邪上泛肚腹脹大四肢浮腫小便不利已成水鼓等證夫腎中火衰真陽不足者即真水亦化為邪水於是水邪泛濫自下而中以及於上肺脾腎三臟俱病斯時若但治肺脾一如遏其流而不治其源也故以桂附合地黃等溫腎中之少火以御陰邪則真水得以安其位然既化之邪水不得不驅故以車前牛膝協苓瀉等以導其邪水列試治水諸方取效之速無以出其右者本方加西洋參麥冬各三兩名參麥地黃丸治金水兩虧骨蒸勞熱等證地黃丸本長於壯水加參麥則兼以清金凡陰虛火旺肺中津液受灼者於此取法焉四君子湯五味異功散六君子湯香砂六君湯星附六君湯歸芍六君湯烏蠍六君湯四獸飲四君補氣首方推脾肺虛衰聽主裁參朮甘苓薑棗合若加陳夏六君來香砂加入六君子氣滯虛寒脘痛開星附六君風病取和營須配芍當歸風痰類中脾虛疾烏蠍六君可濟危更有一方四獸飲六君草果與烏梅四君子湯人參二錢制冬朮二錢茯苓三錢甘草一錢生薑一片大棗二枚治脾肺氣虛中土衰弱以致食少便溏體瘦神倦或氣短息微皮聚毛落等證人參大補肺脾元氣為君白朮補脾燥濕為臣以脾喜溫燥土旺即可生金故肺脾兩虛者尤當以補脾為急脾為後天之源四臟皆賴其蔭庇不獨肺也而又佐以茯苓滲肺脾之濕濁下行然後參術之功益彰其效此亦猶六味丸補瀉兼行之意然必施之以甘草而能兩協其平引以薑棗大和營衛各呈其妙是以謂之君子也四君子加陳皮一錢名五味異功散治脾胃中氣不足食少困倦之證夫脾中之陽法天之健流走周身運行不息若脾陽不足則遠化無權故食少脾主四肢四肢為諸陽之本陽氣虛則不能充於四末故困倦脾虛則濕勝故於四君子中加陳皮燥濕利氣以順其性之所喜而助其流動之功若濕盛痰多者再加半夏二錢以行其痰名六君子湯六君子加香附二錢砂仁五分名香砂六君湯治前證因寒滯內加脘腹作痛等證脾喜溫燥而惡寒濕得濕則滯得寒亦滯滯則氣機不為流暢脘腹等處為之作痛矣故以香附砂仁之辛溫香燥散寒導滯理氣宣中於是六君之功補瀉互奏耳六君子加制南星一錢白附子一錢名星附六君湯治風痰乘虛襲入陽明久不愈而成頭風目風等證夫胃者土也五臟六腑之海也萬物所歸風屬木故風邪最喜乘之陽明之經行於前上於頭面痰者不特風襲而已有風客則愈張其幟耳故以六君子補正氣化痰濕以固其本南星白附入陽明祛風豁痰以治其標不啻雙管齊下六君子加當歸二錢白芍一錢名歸芍六君湯治婦人經水不調色淡而晦由脾虛濕盛所致脾統一身之血脾虛則血不調不調之血與濕邪相合渾而不分一如良民化為盜賊合汙而下不特經色淡晦且帶濁等證亦由是而來雖為婦人經病而治病必求於本若不補脾逐濕何以杜其將來故仍以六君子為君加當歸以和其血使瘀者去而新者得有所歸白芍通補奇經護營斂液有安脾御木之能且可濟半夏陳皮之燥性耳六君子加制川烏五分全蠍尾一條名烏蠍六君湯治中風痰盛口目歪斜語聲不出由乎脾胃虛而得者六君具補正之功烏蠍擅搜風之力相成相濟兩擅其長余義見風門諸方六君子加烏梅肉一枚草果五分名四獸飲治脾胃正氣大虛瘧久不愈等證夫瘧邪皆由正氣所化化盡則止其有病久邪已化盡而瘧猶不止者皆由正氣之虛陽虛則生寒寒則陽氣中餒然陽氣不能終餒故不久便回回則寒去熱生而義見陰虛生熱之象矣待陰陽和而寒熱自止此等寒熱皆從中虛餒怯而來若一助正氣陽自充而寒不生且不用服藥亦可愈瘧即一切符咒鎮壓諸法並非真有邪怪亦所以助病人之陽氣使不中餒之意草果入脾助陽散寒烏梅入肝存陰斂液加於六君中助正氣而和陰陽因虛久瘧豈有不愈者哉余又見瘧門諸方四物湯坎離丸膠艾四物湯艾附暖宮丸玉燭散佛手散八珍湯十全大補湯四物湯為血藥宗當歸地芍與川芎坎離丸治陰虛火知柏相兼四物同膠艾湯中膠艾草仍連四物合煎濃有名艾附暖宮者二味加之四物中調胃全方合四物子和玉燭散瘀通芎歸二味和為散産後胎前藥力洪四物四君相合用八珍雙補法頗雄黃耆肉桂頻加入方見十全大補功四物湯當歸二錢酒炒生地黃三錢白芍二錢川芎一錢半治一切營血虛滯及婦人經水不調偏於陰分不足者夫人之所賴以生者血與氣耳而醫家之所以補偏救弊者亦惟血與氣耳故一切補氣諸方皆從四君化出一切補血諸方又當從此四物而化也補氣者當求之脾肺補血者當求之肝腎地黃入腎壯水補陰白芍入肝斂陰益血二味為補血之正藥然血虛多滯經脈隧道不能滑利通暢又恐地芍純陰之性無溫養流動之機故必加以當歸川芎辛香溫潤能養血而行血中之氣者以流動之總之此方乃調理一切血證是其所長若純屬陰虛血少宜靜不宜動者則歸芎之走竄行散又非所宜也本方加知母黃柏各一錢名知柏四物湯蜜丸名坎離丸丹溪治陰血虛滯相火獨旺咳血等證以地芍壯水知柏退陽有血證故用當歸引諸血各歸其所當歸之經川芎能行血中之氣自然氣順血調不虛不滯矣然畢竟陰虛火旺之病川芎究屬辛香之物似又不宜用者審之本方加阿膠一錢艾葉一錢甘草五分名膠艾四物湯治衝任虧損經血短少虛寒作痛等症沖為血海為血脈衝聚之區任主胞胎有胎元任載之意合之督脈皆起下極同源而異流與夫帶脈之橫圍於腰者皆屬奇經而無配偶也然婦人之病隸於八脈者為多故古人有通補奇經之法為治婦人之範圍阿膠補血液以達於肺肝使左右升降之道路潤澤自如艾葉暖命門而通於衝任使奇經上下之循環賴其溫養甘草協和諸藥通補咸宜合之四物調理血分之藥亦可為婦人通補奇經之一法歟本方加艾葉一錢制香附二錢醋糊丸名艾附暖宮丸治婦人經水不調臨行作痛子宮虛冷不能孕育等證凡婦人調經一法首先理氣以氣順則血亦順也夫血氣者喜溫而惡寒寒則艱於生育溫則易於成孕故方中以香附理氣分艾葉暖子宮合四物而用宜乎可治以上諸證也余義見婦人門諸方本方當歸白芍換歸尾赤芍加大黃芒硝各一錢半甘草一錢名玉燭散治經閉腹痛拒按脈來沉弦有力之證夫經閉有虛實之分虛者由乎血虛固當補養實者皆由血瘀瘀則熱熱則血愈堅故不得不以大黃芒硝之入血軟堅者以峻下之瘀不去則新不生又恐硝黃性急故又以甘草緩之即調胃之意然血瘀經閉倘無腹痛拒按等證又不可用之本方單用當歸川芎二味名佛手散治婦人因血虛感冒風寒或胎動下血或子死腹中均可以此參酌施治當歸川芎二味皆辛苦性溫芳香質潤雖調血仍能理氣其走竄之力解散為多故凡血分一切風寒與胎前産後一切氣血不順等證皆可治之本方合四君子名八珍湯治氣血兩虛將成虛損之證細閲方意止能調理尋常一切氣血不足之證若真正氣血大虛陰陽並竭之證似又不宜再以歸芎之辛散擾陰地芍之陰寒礙陽耳八珍加黃耆二錢肉桂五分名十全大補湯治營衛兩虛氣血不足凡屬癰疽潰後因虛不斂者皆可用之八珍並補氣血之功固無論矣而又加黃耆助正氣以益衛肉桂溫血脈而和營且各藥得溫養之力則補性愈足見效愈多非惟陽虛可溫即陰虛者亦可溫以無陽則陰無以生故一切有形之物皆屬於陰莫不生於春夏而殺於秋冬也凡遇人之真陰虧損欲成癆瘵等證總宜以甘溫之品收效或虛之盛者即炮薑肉桂亦可加於大隊補藥之中自有神效若僅以苦寒柔靜一切滋潤之藥久久服之不特陰不能生而陽和生氣日漸喪亡不至陽氣同歸於盡不止耳每記為人治陰虛內熱一證屢用甘寒潤靜之劑而熱仍不退於原方中加入炮姜五分其熱頓退神乎其神因録之以助學者之參悟歸脾湯濟生歸脾參朮與黃耆歸草茯神遠志宜酸棗木香龍眼肉蠲除思慮益心脾歸脾湯人參二錢制冬朮二錢茯神三錢炒棗仁二錢龍眼肉二錢炙黃耆一錢半當歸二錢酒洗遠志一錢木香五分甘草五分治思慮過度勞傷心脾以致血不歸經而為健忘不寐怔忡等證夫心為生血之臟而藏神勞即氣散陽氣外張而神不寧故用棗仁之酸以收之茯神之靜以寧之遠志泄心熱而寧心神思則脾氣結故用木香行氣滯舒脾郁流利上中二焦清宮除道然後參耆朮草龍眼等大隊補益心脾之品以成厥功繼之以當歸引諸血各歸其所當歸之經也原方有生薑大棗似與此方未合訒庵集解中亦未解出故刪之當歸補血湯東垣當歸補血是成方五倍黃耆煎和嘗血脫脈洪勞役致東垣治法細參詳當歸補血湯炙黃耆一兩酒洗當歸二錢治煩勞傷陽氣火妄動陰血不能寧靜脈洪身熱而成脫竭之證凡病有真假脈亦有真假即如脈洪身熱一證一望而知其為火邪陽亢矣而脫血之後每亦如之以陽無所附浮散於外也全在醫者細心詳察辨其舌苔之黃白潤燥口渴之欲冷欲熱其大要猶在於小便如真熱者必短赤假熱者必清長胸次瞭然用藥自無毫釐千里之誤如果大脫血之後而見此等脈證不特陰血告匱而陽氣亦欲散亡斯時也有形之血不能速生無形之氣所當急固故以黃耆大補肺脾元氣而能固外者為君蓋此時陽氣已去里而越表恐一時固里無及不得不從衛外以挽留之當歸益血和營二味合之便能陽生陰長使傷殘之血亦各歸其經以自固耳非區區補血滋膩之藥所可同日語也大補陰丸丹溪大補陰丸治水虧火炎勞熱致虛羸地黃龜板兼知柏豬脊脂膏蜜和為大補陰丸黃柏二兩鹽水炒知母二兩鹽水炒熟地四兩炙龜板四兩豬脊髓和蜜為丸鹽湯送下治腎水虧極相火獨旺而為夢遺骨蒸勞瘵等證夫相火之有餘皆由腎水之不足故以熟地大滋腎水為君然火有餘則少火化為壯火壯火食氣若僅以滋水配陽之法何足以殺其猖獗之勢故必須黃柏知母之苦寒入腎能直清下焦之火者以折服之龜為北方之神其性善藏取其甘寒益腎介類潛陽之意則龍雷之火自能潛藏勿用豬為水畜用骨髓者取其能通腎命以有形之精髓而補之也和蜜為丸者欲其入下焦緩以奏功也玉屏風散玉屏風散最為靈耆朮防風鼎足形表弱汗多兼感冒藥雖相惡效相成玉屏風散制冬朮二兩炙黃耆一兩防風一兩為末每服三錢治中虛衛陽不振表疏自汗易感風寒等證大凡表虛不能衛外者皆當先建立中氣故以白朮之補脾建中者為君以脾旺則四臟之氣皆得受蔭表自固而邪不幹而復以黃耆固表益衛得防風之善行善走者相畏相使其功益彰則黃耆自不慮其固邪防風亦不慮其散表此散中寓補補內兼疏顧名思義之妙實後學所不及耳天王補心丹天王補心柏子仁二冬歸地與三參桔苓遠志硃砂蜜棗味酸收血自生天王補心丹生地四兩酒洗人參五錢元參五錢丹參五錢茯苓五錢桔梗五錢遠志五錢棗仁一兩炒柏子仁一兩炒研去油天冬一兩炒麥冬一兩炒當歸一兩酒洗五味子一兩炙蜜丸彈子大硃砂為衣臥時燈心湯下一丸治思慮過度心血不足而成健忘怔忡等證夫心為離火中含真水凡誦讀吟詠思慮過度傷其離中之陰者則必以真水相濟之故以生地元參壯腎水二冬以滋水之上源當歸丹參雖能入心補血畢竟是行走之品必得人參之大力駕馭其間方有陽生陰長之妙茯苓遠志泄心熱而寧心神去痰化濕清宮除道使補藥得力但思慮過度則心氣為之鬱結故以柏子仁之芳香潤澤入心者以舒其神暢其膈棗仁五味收其耗散之氣桔梗引諸藥上行而入心衣以硃砂取其重以鎮虛逆寒以降浮陽且其色赤屬離內含陰汞與人心同氣相求同類相從之物也百合固金湯趙氏百合固金二地黃麥冬貝母桔甘良元參芍藥當歸配喘咳痰紅肺受殃百合固金湯百合一錢生熟地各三錢麥冬一錢半白芍一錢炒當歸一錢貝母一錢生甘草一錢元參八分桔梗八分治腎水不足虛火刑金而致咳嗽痰血等證百合色白其形象肺故能獨入金家為保肺寧神清金潤燥之品又肺腎為子母之臟醫貫所謂母藏子宮子隱母胎故水虛則金受火刑地黃元參壯水之主麥冬貝母清肺之煩白芍平肝以保肺當歸引血以歸經甘桔本為成方可以利咽喉而宣上部之結熱也四陰煎景嶽新方妙立四陰煎保肺清金制火炎生地麥冬白芍草沙參百合茯苓兼四陰煎生地三錢麥冬二錢白芍一錢百合一錢沙參二錢生甘草一錢茯苓一錢半治陰虛勞損相火刑金乾咳津枯等證生地滋腎水參麥養肺陰白芍之色白微酸能入肺而助其收斂百合之甘寒且苦能益金而兼可清神茯苓以降其濁痰甘草以散其虛熱名曰四陰者取其地四生金也資生丸仲淳資主丸內麥查陳苡芡蓮連蔻四君藿朴桔山神澤扁脾虛濕熱補而清仲淳資生丸人參三兩白朮三兩茯苓一兩五錢炙甘草五錢陳皮二兩山藥一兩五錢建蓮一兩去心芡實一兩五錢苡米三錢扁豆一兩神麯二兩查肉二兩麥芽一兩五錢厚朴一兩蔻仁三錢五分藿香五錢澤瀉三錢五分桔梗五錢川連三錢五分為末水泛丸治脾胃氣虛濕熱蘊結以及小兒疳積腹脹面黃肌瘦久瀉久痢凡一切脾胃不足者悉宜服之天地之大德曰生欲資生者必先助其脾胃故以四君子補脾益胃合之山藥蓮肉扁豆芡實之屬以協助之但脾者喜燥而惡濕善運而不停故以陳皮白蔻香燥以舒之苓澤苡米淡滲以利之查曲麥芽助其消導藿香厚朴假以溫中桔梗以引清氣上行黃連能使濕熱下降如是則脾復其常可以資助生氣矣人參固本丸人參固本治虛勞天麥門冬保肺高生熟地黃滋腎水參扶脾胃助中焦人參固本丸人參二兩天冬炒麥冬炒生地熟地各四兩蜜丸治肺腎陰虛勞熱等證夫虛勞一證有陰虛陽虛之分其由於陰虛者皆始於腎而終於肺以腎水不足則虛火凌逼肺金金受火刑不能生水於是腎愈虛金愈燥煎熬焚灼不至同歸於盡不止也故以二地滋腎水二冬保肺金然二地二冬皆重濁滋膩有質而無氣凡天下形質之物有氣則能動無氣則不能動譬之天氣也主動地質也主靜然地亦有時而動者皆質中有氣耳故恐二地二冬雖有補腎保肺之能而不能使金水相生循環上下不得不賴人參之氣厚力足者從中而贊助之且脾胃者中流砥柱肺腎陰虛之盛者總宜以甘藥補中使上下受蔭耳壽脾煎景嶽壽脾煎法是新方血脫脾虛七氣傷參朮甘蓮山藥遠當歸酸棗炮乾薑壽脾煎白朮山藥各二錢當歸炙草各一錢棗仁一錢半遠志五分炮姜一錢蓮肉二十粒去心炒人參三錢治憂思鬱結脾土困敗以致不能攝血或從便出或從嘔吐或誤用攻伐涼劑致損脾陽以及婦人無火崩淋等證夫脾為統血之臟司健運之職所以灑陳於臟腑經絡者也若脾臟一虛則血無統攝而諸病作矣然血者得熱則行得寒則凝故失血一證有屬於寒者有屬於熱者又須辨其色之明晦病之久暫脈之有力無力審察精詳自無遺誤此方以參朮甘草大補脾中元氣病因虛而不能統攝故以山藥蓮肉補而兼固憂思鬱結則傷脾脾傷則肝亦不能藏聚故以遠志解鬱以舒之棗仁斂肝以藏之用炮姜者不特參術得之而有力且能引參術之力同歸血分耳發表之劑表者里之對也發者升之散之汗之使在表之邪由外而解不傳於裡也人之稟賦充實則不特內邪不起即六淫之邪亦何自而來若臟腑一有所虧則邪乘虛而入於是六淫之邪各從其所合而入客之如寒邪之來也必傷其陽凡人之背為陽太陽為陽中之陽其經行於背陽虛寒客故見頭項強痛等證即可為太陽之表也又如風也暑也火也皆屬陽邪陽邪者最易傷陰是風暑火三氣外來必先犯肺肺為陰或為咳嗽鼻塞或為喘促自汗或為身熱刺痛皆可為肺之表證也濕兼四氣皆可合化上下表里皆可感受或霧露受於上焦或水濕受於下部或雨汗之氣客於肌膚三者皆可謂之表病也惟內飲酒漿脾虛停濕者為之裡濕耳六淫之中獨燥不為重病內經有云清氣大來燥之盛也不過秋金微寒之氣感之令人津液收束肌膚枯槁之意故經亦無秋傷於燥之文須知六淫之金燥與陰虛之火燥為不同耳夫表者營衛所常行猶都治之有城郭也六淫者天地所常變猶外來之寇盜也如寇盜之來必由城郭而入即知六淫之來亦必由表而入也故善治者治皮毛其次治肌肉其次治血脈若此失治病必由表而里由腑而臟成不治者多矣故以發表之劑居其二麻黃湯仲景麻黃湯法治傷寒邪斂營中汗不宣甘草杏仁麻桂等用方加減在人權麻黃湯麻黃三兩去節桂枝二兩杏仁七十枚去皮尖甘草一兩炙治寒傷太陽之表過衛入營血脈凝斂無汗惡寒發熱身疼頭項強痛脈浮而緊等證麻黃辛溫中空外達善行肌表衛分為發汗之主藥桂枝辛溫發散色赤入營協同麻黃入營分解散寒邪隨麻黃而出衛汗之即已然寒主凝斂表既壅遏則裡氣不舒故太陽傷寒表不解者每見喘促上氣等證肺主一身之氣下行為順上行為逆杏仁入肺苦溫能降辛溫能散用之為佐以助麻黃之不逮又恐麻桂之性猛以致汗多亡陽故必監以甘草之甘緩濟其直往無前之勢庶可邪解而正不傷乃為立方之善耳桂枝湯仲景陽旦湯風傷自汗桂枝湯營弱衛強表證方薑棗桂甘白芍藥方中進退法精詳加芩金匱名陽旦表證難除裡熱張或合柴胡或各半作歌未便盡包藏桂枝湯桂枝芍藥生薑各三兩炙甘草二兩大棗十二枚治風傷太陽之表發熱自汗惡風頭項強痛脈來浮緩浮弱等證夫風為陽邪性喜疏泄故一傷太陽之表即入於營營血為其擾攘而不寧則自汗出而邪仍不解此風中仍有寒氣所謂三冬凜冽之風否則焉能即傷太陽之表而有頭項強痛發熱惡風等證若春夏之風其氣和緩即傷之亦不過頭痛鼻塞咳嗽發熱為肺之表耳即如麻黃湯之治寒傷營寒中亦有風邪若無風邪寒氣何能過衛入營故風者善行數變寒不能獨傷人必風以動其先引而入之乃能為病由是觀之亦不必拘定桂枝湯治風傷衛麻黃湯治寒傷營為成法也總之麻黃湯治寒多風少寒氣之重者也栓枝湯治風多寒少寒氣之輕者也故此方以桂枝入營散寒隨生薑外出於衛微微汗出使寒去即風亦去營中本為風邪擾攘恐桂枝生薑之過於辛散故以白芍護陰而斂營甘草和中而緩急大棗以養脾陰以脾者營之源且與生薑合用又可以和營衛致津液也陽旦湯即桂枝湯加黃芩治産後風數十日不解頭微疼惡寒時時有熱心下悶乾嘔汗出等證即此觀之雖産後中風至數十日之久表證尚在者仍可與桂枝湯因內有鬱熱故加黃芩以清之此亦臨時加減法也至於桂枝湯內一切或然之證一切加減之法不能詳載讀者當細觀原文大青龍湯仲景湯名取義大青龍表盛胸煩汗不通麻杏甘膏薑棗桂疏邪解熱妙無窮大青龍湯麻黃桂枝甘草各二兩杏仁四十粒去皮尖石膏雞子大一塊生薑三兩大棗十二枚治太陽病風寒外盛陽氣內郁表不解而無汗煩躁發熱惡寒頭疼身痛等證夫邪之來也正氣不與之兩立必發熱以拒之而人稟陰陽之氣各有偏勝不同陽盛之人外為風寒驟加則陽氣內鬱而不伸故見躁煩不寧之象然陽氣抑鬱何由得汗雖用麻黃桂枝表亦終不能解一若亢龍有悔欲雨何來必以石膏之甘寒清其內煩解其鬱熱使其陽氣暴伸表裡通暢然後雲行雨施一汗而解也先哲每謂石膏可以解肌殊不知甘寒質重之物止有清裡之能不過熱除表解之意皆由前人鑿分桂枝湯治風傷衛麻黃湯治寒傷營大青龍湯治風寒兩傷營衛均為解表之方遂致後人誤會者多耳此方即麻黃湯之變劑因其內有鬱熱故加石膏欲其和營衛致律液故用薑棗學者神而明之自可得其理矣小青龍湯仲景小小青龍最有功風寒束表飲停胸細辛半夏甘和味薑桂麻黃芍藥同小青龍湯麻黃去節桂枝芍藥酒炒細辛炙甘草乾薑各三兩半夏半升五味子半升治傷寒表不解心下有水氣乾嘔而咳或渴或利等證前方因內有鬱熱而表不解此方因內有水氣而表不解然水氣不除肺氣壅遏營衛不通雖發表何由得汗故用麻黃桂枝解其表必以細辛乾薑半夏等辛燥之品散其胸中之水使之隨汗而出金匱所謂腰以上者當發汗即內經之開鬼門也水飲內蓄肺必逆而上行而見喘促上氣等證肺苦氣上逆急食酸以收之以甘緩之故以白芍五味子甘草三味一以防肺氣之耗散一則緩麻桂薑辛之剛猛也名小青龍者以龍為水族大則可以興雲致雨飛騰於宇宙之間小則亦能治水驅邪潛隱於波濤之內耳梔子豉湯仲景梔子豉湯邪在胸陽明初病熱留中懊憹煩擾全憑吐大便微溏莫與逢梔子豉湯梔子十四枚淡豆豉四合先煎梔子後納豉再煎服令微吐治太陽表證已罷欲傳胃腑邪入於胸尚未及於腑者故用吐法以宣散其邪所謂在上者因而越之是也又治傷寒誤用汗吐下後津液重傷邪乘虛入因致虛煩不眠心中結痛等證梔子色赤入心苦寒能降善引上焦心肺之煩熱屈曲下行以之先煎取其性之和緩豆豉用黑豆蒸冖八音而成其氣香而化腐其性涼而成熱其味甘而變苦故其治能除熱化腐宣發上焦之邪用之作吐似亦宜然且以之後入者欲其猛悍恐久煎則力過耳麻黃附子細辛湯仲景麻黃附子細辛湯腎弱陽虛寒外傷發熱脈沉表證具溫經解外妙無雙麻黃附子細辛湯麻黃細辛各二兩附子一枚炮先煮麻黃去沫再納後二味治少陰陽虛寒邪外至始得之身發熱而脈沉者夫太陽與少陰為表裡少陰之陽虛則里不固里不固則表益虛故寒邪由太陽之經不傳於腑竟入於臟然雖入臟而邪仍未離乎經故仍發熱若全入於臟則但惡寒而不發熱矣但雖發熱不得為太陽之表證以太陽之表必有頭項強痛脈浮等證此不但不頭項強痛脈亦不浮而反沉則便知太陽之邪離經入臟之樞紐急乘此時用附子以助少陰之陽細辛以散少陰之邪麻黃以達太陽之表邪自表而及里者仍由里而還表此亦表裡相通之一理耳柴葛解肌湯節庵節庵柴葛解肌湯邪在三陽熱勢張芩芍桔甘羌活芷石膏大棗與生薑柴葛解肌湯柴胡葛根羌活白芷黃芩白芍桔梗甘草石膏各等分加薑棗煎服治三陽合病風邪外客表不解而里有熱者故以柴胡解少陽之表葛根白芷解陽明之表羌活解太陽之表如是則表邪無容足之地矣然表邪盛者內必鬱而為熱熱則必傷陰故以石膏黃芩清其熱芍藥甘草護其陰桔梗能升能降可導可宣使內外不留余蘊耳用薑棗者亦不過藉其和營衛致律液通表裡而邪去正安也人參敗毒散活人人參敗毒散為奇枳桔柴前羌獨宜草薄芎苓姜作引表邪時疫總堪醫人參敗毒散人參羌活獨活柴胡前胡枳殼桔梗川芎茯苓各一兩甘草五錢薄荷少許生薑三片治感受時邪憎寒壯熱及傷寒傷風傷濕疫癘瘴瘧並痢疾初起表未解者悉可用之凡時邪疫癘皆天地異氣所鍾必乘人之虛者而襲之故方中必先以人參為補正卻邪地步然後羌活走表以散遊邪獨活行里以宣伏邪柴胡桔梗散熱升清枳殼前胡消痰降氣川芎芳香以行血中之氣茯苓淡滲以利氣中之濕甘草協和各藥使之不爭生薑闢穢祛邪令其無滯於是各建其長以收全功皆賴人參之大力駕馭其間耳至於治痢用此者此喻氏逆流挽舟之法以邪從表而陷里仍使里而出表也川芎茶調散局方川芎茶調散羌芷荊防細薄草為使須知食後服之宜偏正頭風皆賴此川芎茶調散薄荷八錢川芎荊芥各四錢羌活白芷炙甘草各二錢防風一錢半細辛一錢共為末每服三錢食後茶調下治風邪上攻留而不去則成頭風或偏或正作止無時盛則憎寒壯熱或肝風上乘頭目暈眩等證夫頭痛久而不愈即為頭風頭風久必害眼者以目為肝竅風氣通於肝若風熱相灼則肝腎所聚之精華漸致耗損故目亦漸致失明斯時如不先去風熱徒與滋水柔肝無益也故以薄荷之辛香能清利頭目搜風散熱者以之為君川芎荊芥皆能內行肝膽外散風邪其辛香走竄之性用之治上無往不宜故以為臣羌防散太陽之風白芷散陽明之風以病在於巔惟風可到也以之為佐細辛宣邪達竅甘草和藥緩中茶性苦寒能清上而降下以之為使也食後服者欲其留戀於上勿使速下耳達原飲又可達原飲子朴檳芩白芍知甘草果仁邪伏膜原瘟疫發疏邪宣壅急先行若然邪化三陽證柴葛羌防加法靈入里轉成胃腑實硝黃承氣用皆能達原飲檳榔二錢川朴一錢草果仁五分知母一錢芍藥一錢黃芩一錢甘草五分吳氏以此方治瘟疫初起邪伏膜原尚未傳變之證夫疫乃天地之癘氣中之者必從口鼻而入最易傳染最易傳變屬溫者居多屬寒者間有似與伏邪不同伏邪者乃四時之正邪如冬傷於寒春必病溫之類凡正邪皆可伏而後發發則自內而至外初起尚未化熱每見胸痞噁心舌白口渴不欲引飲脈數溺黃等象此時未見表裡形證表裡之藥均不可用當與宣疏一法化其伏邪然後隨證治之此方以檳榔厚朴能消能磨疏利宣散之品以破其伏邪使其速化更以草果辛烈氣雄之物直達伏邪盤結之處而搜逐之然邪既盛於裡內必鬱而成熱故以黃芩清上焦芍藥清中焦知母清下焦且能預保津液於未傷之時加甘草者以濟前三味之猛以緩後三味之寒也合觀此方以之治伏邪初起者甚宜似覺治瘟疫為未當耳銀翹散鞠通辛涼平劑銀翹散甘桔牛蒡豆豉淡芥穗薄荷竹葉蘆時溫表熱殊堪贊銀翹散銀花連翹各一兩桔梗薄荷各六錢甘草淡豆豉各五錢牛蒡子六錢荊芥穗竹葉各四錢上杵為散每服六錢鮮葦根煎湯香氣大出即取服治風溫溫熱一切四時溫邪病從外來初起身熱而渴不惡寒邪全在表者此方吳氏溫病條辨中之首方所治之溫病與瘟疫之瘟不同而又與伏邪之溫病有別此但言四時之溫邪病於表而客於肺者故以辛涼之劑輕解上焦銀花連翹薄荷荊芥皆辛涼之品輕揚解散清利上焦者也豆豉宣胸化腐牛蒡利膈清咽竹葉蘆根清肺胃之熱而下達桔梗甘草解胸膈之結而上行此淮陰吳氏特開客氣溫邪之一端實前人所未發耳普濟消毒飲東垣普濟消毒芩連草藍根桔勃升柴好元翹陳薄鼠黏蠶瘟疫時行頭大保普濟消毒飲酒芩酒川連各五錢陳皮去白生甘草元參各二錢連翹板藍根馬勃鼠黏子薄荷各一錢殭蠶升麻各七分柴胡桔梗各二錢為末湯調時時服之或蜜拌為丸噙化治大頭天行初覺憎寒壯熱漸次頭目腫脹喘促上氣咽喉不利口渴舌燥等證夫疫者乃天地癘氣所鍾故染而病也其狀相同甚則一方皆染有若役使之然然疫病種種不同總不離乖戾惡毒之氣而解毒者必以清即如此證之大頭溫其邪之客於上焦者可知故以酒炒芩連之苦寒降其上部之熱邪又恐芩連性降病有所遺再以升柴舉之不使其速下殭蠶馬勃解毒而消腫鼠元甘桔利膈以清咽藍根解疫毒以清熱橘紅宣肺滯而行痰連翹薄荷皆能輕解上焦消風散熱合之為方豈不名稱其實哉蒼耳散鼻淵蒼耳散能疏白芷辛夷與薄荷為末蔥茶湯送下升清達竅病能休蒼耳散白芷一兩薄荷辛夷各五錢蒼耳子炒二錢五分為末食前蔥茶湯調下二錢治鼻淵證濁涕不止時時下流乃熱灼於腦而液下滲為涕也經有云膽移熱於腦則辛頞鼻淵以膽火最易上升而其經又絡於腦也然病雖悉由熱致但清者即化而為濁病在上焦不得不用辛香上達之品以解散之若徒以苦寒清降之品服之不特濁不能化即上熱亦不能遽除故以白芷辛溫香燥入陽明而疏邪勝濕者為君陽明之脈絡於腦而挾於鼻白芷又治頭面之疾也薄荷散風熱於上焦辛夷宣濁邪於清竅蒼耳之疏風散熱能上通腦頂外達皮膚所以成其升散之力引以蔥茶調服蔥可升清陽而上達茶乃引熱勢以下行其濁自降耳然此方總嫌其辛散之藥多苦降之藥少不如用藿香葉淨末豬膽汁泛丸服之愈為妙也攻裡之劑里者表之對也攻者攻下之使邪從里解也夫人之病也不在於表即在於里表有經絡營衛之不同里有臟腑胸腹之或異凡六淫之邪初客於表者既有解表方法列之於前矣倘表病不除而傳於裡者則尤當審其寒熱虛實而施治之寒者當溫熱者當清虛者當扶正以化邪實者可宣導而攻下里之寒熱虛實既明還須察其兼證或挾痰挾食挾血之類皆得謂之裡證不必拘拘乎表病傳裡方為里也此門皆以里之屬實而可攻下者録之其他里之屬虛寒屬雜病者散見各門大承氣湯仲景小承氣湯調胃承氣湯大承氣湯朴實黃芒硝化入用須詳去硝乃是小承氣調胃硝黃甘草嘗大承氣湯大黃四兩酒洗芒硝三合厚朴半斤枳實五枚先煎朴實將熟內大黃煮二三沸傾碗內和芒硝服得利則止治陽明病熱邪入里轉成胃實不大便發熱譫語自汗出不惡寒痞滿燥實全見里證以及雜病三焦大熱脈來沉實有力者夫六淫之入里也無形之邪必依有形之物以為固結故胃者土也萬物所歸是以熱邪一入於胃無所復傳即挾胃中之滓穢互相團結而成可下之證然此方須上中下三焦痞滿燥實全見者方可用之以大黃之走下焦血分蕩滌邪熱者為君又恐其直下之性除其下而遺其上故必以酒洗之但大黃雖能攻積推陳不能軟堅潤燥所有胃中堅結之燥屎仍不能除故必以芒硝鹹寒潤下之品軟堅潤燥乃克有成枳實厚朴苦降破上中二焦之氣以承順之為硝黃之先導而後痞滿燥結全消耳此之謂大承氣湯也小承氣湯大黃四兩厚朴二兩薑汁炒枳實二枚麩炒治陽明病譫語潮熱不大便胃有實熱痞滿而喘邪盛於上中二焦無燥屎堅結者故但以大黃蕩胃實枳朴泄痞滿則上中之邪自可蠲除無須芒硝之鹹寒復傷其下焦之陰血耳調胃承氣湯大黃酒浸芒硝各一兩炙甘草五錢治陽明病不惡寒反惡熱口渴便祕滿腹拒按中下焦燥實之證故但以大黃除熱蕩實芒硝潤下軟堅加炙甘草者緩其急而和其中不用枳朴者恐傷上焦氣分大黃用酒浸者欲減其苦寒速下之性而微下之令胃和則愈耳大陷胸湯仲景大陷胸湯黃與硝因加甘遂力為超水邪熱陷相團結病發於陽誤下高大陷胸湯大黃二兩芒硝一升甘遂一錢為末先煮大黃去滓內芒硝煮一二沸內甘遂末溫服治太陽病表邪不解而反下之熱陷於裡其人表有水飲停胸以致水熱互結心下滿而硬痛手不可近不大便舌上燥而渴成結胸胃實之證以甘遂之行水直達所結之處而破其澼囊大黃蕩滌邪熱芒硝咸潤軟堅三者皆峻下之品非表邪盡除內有水熱互結者不可用之小陷胸湯仲景小陷胸湯治結胸熱痰互結在膻中黃連半夏瓜蔞子先哲名方妙義通小陷胸湯黃連一兩半夏半升瓜蔞一枚治小結胸正在心下按之則痛脈浮滑痰熱互結之證前方因水熱互結而成胃實不大便硬滿而痛不可近者故非大下不除此則因痰熱互結未成胃實觀其脈浮滑知其邪在上焦故但以半夏之辛溫散結豁痰瓜蔞之甘寒潤燥滌垢黃連之苦寒降火泄熱此方以之治傷寒亦可以之治雜病亦可即表未解而里有痰熱者皆可兼而用之十棗湯仲景十棗湯攻水結邪縱橫上下證多乖芫花戟遂肥元棗審病投方事必諧十棗湯芫花炒黑甘遂大戟各等分大棗十枚先煮棗去滓內前藥末強人服一錢虛人五分或棗肉為丸病不除者再服得快下利糜粥自養治太陽中風表證已解惟內蓄水邪浩浩莫御下利嘔逆汗出心下痞硬滿引脅下痛者此必素有伏飲在內因病而激發所致觀其表證已解則知不因誤下並非水熱互結而成胃實之比故不用大黃芒硝蕩熱軟堅但以芫花甘遂大戟三味峻攻水邪之品而直下之然水邪所結脾氣必虛故治水者必先補脾以土旺則自能勝水脾健則始可運行且甘緩制其峻下之性此其用大棗之意歟凡雜病水鼓證正不甚虛者皆可用之三物備急丸仲景三物備急丸最猛大黃巴豆乾姜勇食停腸胃脹難消冷熱諸邪腹中痛三物備急丸巴豆霜大黃乾薑等分蜜丸小豆大每服二三丸治食停腸胃冷熱不調腹脹氣急滿痛欲死及中惡客忤卒暴諸病汪訒庵曰大黃苦寒以下熱結巴霜辛熱以下寒結加乾薑之辛以宣散之然皆峻厲之物非急證不可浪投更衣丸更衣丸子藥三般蘆薈硃砂古法傳搗爛麥冬相配合津枯便閉頓時寬更衣丸真上好蘆薈二兩麥冬一兩搗爛為丸硃砂一兩為衣治燥火有餘津枯便閉之證蘆薈木之脂也味苦性寒陽明厥陰藥也專能泄熱降火潤燥通腸而以麥冬之寒滑多脂者助之其便有不立通者乎用硃砂為衣者鎮其浮游之火而復其離內之陰耳芍藥湯潔古治痢須知芍藥湯檳榔歸芍共三黃木香肉桂和甘草理氣行瘀無後殃芍藥湯芍藥一兩歸尾黃芩黃連各五錢大黃三錢木香檳榔炙甘草各二錢肉桂一錢半每服五錢痢不減加大黃治下痢膿血稠黏腹痛後重邪滯交結者夫痢之為病固有寒熱之分然熱者多而寒者少總不離邪滯蘊結以致腸胃之氣不宣釀為膿血稠黏之屬雖有赤白之分寒熱之別而初起治法皆可通因通用故劉河間有云行血則便膿自愈調氣則後重自除二語足為治痢之大法此方用大黃之蕩滌邪滯木香檳榔之理氣當歸肉桂之行血病多因濕熱而起故用芩連之苦寒以燥濕清熱用芍藥甘草者緩其急而和其脾仿小建中之意小小建其中氣耳至若因病加減之法則又在於臨時制宜也大黃附子湯金匱大黃附子仲師方脅下寒凝痛莫當共合細辛三種藥功專溫下妙非常大黃附子湯大黃三兩附子三枚細辛二兩治脅下偏痛發熱其脈弦緊此陰寒成聚偏著一處雖有發熱亦是陽氣被郁所致是以非溫不能散其寒非下不能去其積故以附子細辛之辛熱善走者搜散之而後大黃得以行其積也大柴胡湯仲景大柴胡湯表裡行少陽邪熱結陽明生軍枳芍黃芩夏薑棗和營衛亦平大柴胡湯柴胡八兩半夏半升芍藥三兩生薑五兩大棗十二枚擘枳實四枚大黃二兩酒浸黃芩三兩治少陽傷寒結熱在裡復往來寒熱者以此兩解之汪訒庵曰此少陽陽明藥也表證未除故用柴胡以解表里證燥實故用大黃枳實以攻裡芍藥安脾斂陰黃芩退熱解渴半夏和胃止嘔姜辛散而棗甘緩以調營衛而行津液此表裡皆治下劑之緩者也溫脾湯千金溫脾參附與乾薑甘草當歸硝大黃寒熱並行治寒積千金立法細參詳溫脾湯人參甘草當歸乾薑附子大黃芒硝此亦治寒積之一法也凡積之所成無不由於正氣之虛故以參甘以培其氣當歸以養其血使氣血復其常度則邪去而正乃不傷病因寒起故以薑附之辛熱使其走者走守者守祛寒散結纖悉無遺而後硝黃導之由胃入腸何患乎病不去哉玉樞丹即紫金錠紫金錠與玉樞同瘴癘時邪內不通戟麝山茨五倍子千金霜末和朱雄玉樞丹山茨菰二兩千金霜一兩五倍子二兩大戟末一兩五錢當門子三錢硃砂四錢上腰黃二錢水飛糯米濃飲糊丸木臼杵千下作一錢一錠治時邪閉結結胸發狂惡痧瘴瘧中惡溫疫喉風赤腫中風諸癇牙關緊閉以及小兒急慢驚風等證夫時疫一證為天地厲氣所鍾中挾惡毒之氣其中於人也必乘其虛者而襲之但易於傳染病狀相似與六淫之邪為病自有不同人身中氣血周流清而無滯即六淫外來之邪尚與之勢不兩立焉能與此乖戾不正之氣為伍哉故一受此氣氣血頓為拂逆多見霍亂內閉急暴等證盛則大吐大瀉正氣不守而卒死者有之是以治法必以猛藥開泄為之撥亂反正若紅靈蘇合至寶之類尚嫌緩不濟事故方中以毒攻毒之品居其大半山茨茹辛寒有毒功專瀉熱散結千金子辛溫有毒攻專行水破血導滯通腸大戟辛苦而寒能通能散專主逐水行瘀三者功用相仿皆能以毒攻毒闢蠱除邪然疫毒之邪散漫不定恐攻不勝攻逐不勝逐故以五倍子酸鹹性澀者斂而降之使之歸聚不散然後三者之力方可各展其長但疫毒之來元氣為之驟閉且恐藥餌有所不受故必用麝香以開其閉硃砂雄黃皆稟土之精氣結成俱能辟惡鎮邪以疫毒既自土中而出仍以土中之精華解化之所謂百毒遇土則化況又假寶氣以鎮邪乎檳芍順氣湯又可檳芍順氣湯又可疫邪下痢常常有大黃枳朴與生薑裡熱苔黃內多火檳芍順氣湯檳榔芍藥枳實厚朴大黃生薑煎服治下痢膿血發熱口渴心腹痞滿嘔而不食此疫痢兼證最為危急夫疫邪之染於人也踞於膜原附近於胃及其化也或從表解或從里解隨其所在而治之此證下痢既見膿血勢不得不用因勢利導之法故方藥與潔古芍藥湯兩相倣佛檳榔枳朴以行其氣大黃以蕩其血如是則便膿後重均得蠲除但疫毒最易耗陰故加芍藥以護其營陰疫邪散漫惟恐下不勝下下之而仍不能盡除者故於苦寒直下之中復加生薑之辛溫解散通神辟惡以搜散漫之邪為之先導倘痢愈而疫未盡瘥再以治疫之法治之可也
