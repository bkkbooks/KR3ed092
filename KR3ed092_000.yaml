body:
  text: 自序孟子云離婁之明公輸子之巧不以規矩不能成方圓師曠之聰不以六律不能正五音百工技藝且然況於醫道乎且醫之為道秉天地造化之權掌疾病死生之柄昔範文正有不為良相即為良醫之説以相能濟天下之安危醫可救一方之疾苦故良相良醫雖出處異殊其用心則一也由此觀之醫豈小道哉但習醫者當先明藥性之性味察方法之異宜然後運古方治今病亦猶成方圓者不可廢規矩正五音者不可廢六律考古今本草一書不無汗牛充棟其間不失之繁即失之隘求其確切簡明而易讀者誠為難覯歲丁亥手輯本草便讀兩本已命大兒校對抄録使之習誦因念藥雖出於醫手方多法於古人故凡以醫道鳴世者無不皆以古方為範圍而以嘆成方之不可不讀也茲集匯録古今成方二百餘首皆為世所常用同道所習尚者編為歌訣其方下各加注疏使讀者知病之所來方之所自非敢即以此為醫家之規矩六律不過為初學便於誦讀使胸中略有成竹庶可見病思源不無小補如為高者必因丘陵為下者必因川澤讀此兩書者亦此之謂歟光緒三十年歲甲辰仲春武進張秉成兆嘉氏自序於存誠堂
